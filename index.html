<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>鐵血騎士 IRONCLAD — Boss Showcase</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;font-family:'Segoe UI',sans-serif}
#c{display:block;margin:0 auto}
#ui{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  padding:6px 4px 14px;
  display:flex;gap:4px;justify-content:center;
  background:linear-gradient(transparent,rgba(0,0,0,.95));
  z-index:100;
}
.sb{
  position:relative;flex:1;height:66px;
  border:2px solid rgba(255,200,80,.65);border-radius:10px;
  background:linear-gradient(165deg,rgba(25,15,3,.97),rgba(55,35,7,.97));
  color:#f0c040;font-size:8px;font-weight:800;
  cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  text-align:center;user-select:none;-webkit-tap-highlight-color:transparent;
  box-shadow:0 0 12px rgba(255,160,0,.28), inset 0 1px 0 rgba(255,220,100,.15);
  transition:border-color .15s,box-shadow .15s;
}
.sb:active:not(.cd){transform:scale(.96);box-shadow:0 0 20px rgba(255,180,0,.55)}
.sb.cd{cursor:not-allowed;border-color:rgba(100,75,25,.4);color:rgba(130,100,20,.5);box-shadow:none}
.sb .ico{font-size:19px;line-height:1;filter:drop-shadow(0 0 4px rgba(255,200,0,.6))}
.sb .lbl{font-size:7.5px;letter-spacing:.3px}
.sb .cdov{position:absolute;left:0;bottom:0;width:100%;height:0;background:rgba(0,0,0,.78);pointer-events:none}
.sb .cdt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(255,200,100,.9);pointer-events:none;display:none}
.sb.cd .cdt{display:block}
#hb{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:260px;z-index:100;text-align:center;pointer-events:none;
}
#hl{
  color:#f0c040;font-size:11px;font-weight:800;letter-spacing:3px;
  text-shadow:0 0 12px rgba(255,150,0,.9),0 0 24px rgba(255,80,0,.4);
  margin-bottom:5px;
}
#ht{
  height:14px;background:rgba(0,0,0,.7);
  border:2px solid rgba(255,140,0,.55);border-radius:8px;
  overflow:hidden;box-shadow:0 0 14px rgba(255,100,0,.45),inset 0 2px 4px rgba(0,0,0,.5);
}
#hf{
  height:100%;
  background:linear-gradient(90deg,#c00,#f40,#f80,#fca000);
  border-radius:6px;transition:width .5s cubic-bezier(.25,.46,.45,.94);
  box-shadow:0 0 12px rgba(255,100,0,.8);
  position:relative;overflow:hidden;
}
#hf::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:hpShine 2.5s infinite;
}
@keyframes hpShine{to{left:200%}}
#stateLbl{
  position:fixed;top:40px;left:50%;transform:translateX(-50%);
  color:rgba(255,200,80,.55);font-size:9px;font-weight:700;letter-spacing:2px;
  text-shadow:0 0 8px rgba(255,150,0,.4);z-index:100;pointer-events:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hb">
  <div id="hl">⚔ 鐵血騎士 IRONCLAD ⚔</div>
  <div id="ht"><div id="hf" style="width:100%"></div></div>
</div>
<div id="stateLbl" id="sl"></div>
<div id="ui">
  <button class="sb" id="b0" onclick="cast(0)">
    <span class="ico">🛡</span><span class="lbl">持盾衝刺</span>
    <div class="cdov" id="o0"></div><div class="cdt" id="t0"></div>
  </button>
  <button class="sb" id="b1" onclick="cast(1)">
    <span class="ico">⚔</span><span class="lbl">長矛橫掃</span>
    <div class="cdov" id="o1"></div><div class="cdt" id="t1"></div>
  </button>
  <button class="sb" id="b2" onclick="cast(2)">
    <span class="ico">🗡</span><span class="lbl">長矛直刺</span>
    <div class="cdov" id="o2"></div><div class="cdt" id="t2"></div>
  </button>
  <button class="sb" id="b3" onclick="cast(3)">
    <span class="ico">☄</span><span class="lbl">飛天大操</span>
    <div class="cdov" id="o3"></div><div class="cdt" id="t3"></div>
  </button>
  <button class="sb" id="b4" onclick="cast(4)">
    <span class="ico">✨</span><span class="lbl">回血法陣</span>
    <div class="cdov" id="o4"></div><div class="cdt" id="t4"></div>
  </button>
</div>
<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════════════
//  CANVAS & RESIZE
// ═══════════════════════════════════════════════════════════════════════════════
const cv = document.getElementById('c');
const g  = cv.getContext('2d');
let W, H, GY;   // GY = ground Y
function resize() {
  W  = cv.width  = Math.min(window.innerWidth, 480);
  H  = cv.height = window.innerHeight - 84;
  GY = Math.floor(H * 0.71);
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════════════════════════
//  GLOBAL TIME
// ═══════════════════════════════════════════════════════════════════════════════
let T  = 0;   // seconds since start
let dt = 0;   // delta time in ms
let _lastT = performance.now();

// ═══════════════════════════════════════════════════════════════════════════════
//  MATH HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
const PI  = Math.PI;
const TAU = PI * 2;
const sin = Math.sin;
const cos = Math.cos;
const abs = Math.abs;
const sqrt = Math.sqrt;
const floor = Math.floor;
const round = Math.round;
const max = Math.max;
const min = Math.min;
function lp(a, b, t)     { return a + (b - a) * t; }
function clamp(v, lo, hi){ return v < lo ? lo : (v > hi ? hi : v); }
function smoothstep(a, b, t){ const k = clamp((t-a)/(b-a),0,1); return k*k*(3-2*k); }
function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }
function easeInCubic(t)  { return t*t*t; }
function easeInOutCubic(t){ return t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function easeOutBack(t)  { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
function angleDist(a,b)  { let d=((b-a)%TAU+TAU)%TAU; return d>PI?d-TAU:d; }
function lerpAngle(a,b,t){ return a + angleDist(a,b)*t; }
function rrect(x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y);g.lineTo(x+w-r,y);g.quadraticCurveTo(x+w,y,x+w,y+r);
  g.lineTo(x+w,y+h-r);g.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  g.lineTo(x+r,y+h);g.quadraticCurveTo(x,y+h,x,y+h-r);
  g.lineTo(x,y+r);g.quadraticCurveTo(x,y,x+r,y);
  g.closePath();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SCREEN SHAKE
// ═══════════════════════════════════════════════════════════════════════════════
const SHK = {x:0,y:0,pow:0,life:0,maxLife:1,trauma:0};
function addTrauma(amt){ SHK.trauma = min(1, SHK.trauma + amt); }
function updateShake(){
  SHK.trauma = max(0, SHK.trauma - dt * .0014);
  const s2 = SHK.trauma * SHK.trauma;
  if (s2 < .001) { SHK.x = SHK.y = 0; return; }
  SHK.x = 28 * s2 * (Math.random()-.5) * 2;
  SHK.y = 28 * s2 * (Math.random()-.5) * 2;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  PARTICLE SYSTEM  (object pool)
// ═══════════════════════════════════════════════════════════════════════════════
const POOL_SIZE = 1200;
const pool = [];
let poolHead = 0;
for (let i = 0; i < POOL_SIZE; i++) pool.push({active:false});

function getPart() {
  // find next inactive slot (circular)
  for (let i = 0; i < POOL_SIZE; i++) {
    const idx = (poolHead + i) % POOL_SIZE;
    if (!pool[idx].active) { poolHead = idx; return pool[idx]; }
  }
  return pool[poolHead % POOL_SIZE]; // overwrite oldest
}

function spawnPart(x,y,vx,vy,life,r,col,glow,grav,shrink,alpha){
  const p = getPart();
  p.active=true; p.x=x; p.y=y; p.vx=vx; p.vy=vy;
  p.life=life; p.ml=life; p.r=r; p.col=col;
  p.glow=glow||null; p.grav=grav||0; p.shrink=shrink||1; p.alpha=alpha||1;
  p.rot=Math.random()*TAU; p.rotV=(Math.random()-.5)*.08;
}
function spawnBurst(x,y,n,sMin,sMax,life,rMin,rMax,cols,glow,grav,spreadY){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU, s=sMin+Math.random()*(sMax-sMin);
    const spreadMult = spreadY||1;
    spawnPart(x,y,
      cos(a)*s, sin(a)*s*spreadMult,
      life+Math.random()*life*.6,
      rMin+Math.random()*(rMax-rMin),
      cols[floor(Math.random()*cols.length)],
      glow, grav||.14, .98);
  }
}
function spawnDust(x,y,dir,n){
  for(let i=0;i<n;i++){
    spawnPart(x+(Math.random()-.5)*16, y,
      dir*(1.5+Math.random()*5.5), -(Math.random()*1.8+.3),
      260+Math.random()*320, 2+Math.random()*3.5,
      `hsl(${25+floor(Math.random()*15)},35%,${35+floor(Math.random()*20)}%)`,
      null, .07);
  }
}
function spawnSpark(x,y,n,spd,col,life){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU;
    spawnPart(x,y,cos(a)*spd*(0.5+Math.random()),sin(a)*spd*(0.5+Math.random()),
      life||200+Math.random()*200, 1.5+Math.random()*2, col||'#fff',
      col||'rgba(255,255,200,.8)', .12, .94);
  }
}
function spawnTrail(x,y,col,r,life){
  spawnPart(x,y,0,0,life||120,r||3,col,'rgba(255,200,100,.5)',0,.90);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SHOCKWAVE RINGS
// ═══════════════════════════════════════════════════════════════════════════════
const WAVES=[];
function spawnWave(x,y,maxR,col,dur,w){
  WAVES.push({x,y,r:0,maxR,col,life:dur,ml:dur,lw:w||5});
}
// ═══════════════════════════════════════════════════════════════════════════════
//  GROUND CRACKS
// ═══════════════════════════════════════════════════════════════════════════════
const CRACKS=[];
function spawnCracks(cx,cy,count){
  for(let i=0;i<count;i++){
    const baseAng=(i/count)*TAU+(Math.random()-.5)*.5;
    const totalLen=55+Math.random()*120;
    const pts=[{x:cx,y:cy}];
    let bx=cx,by=cy,ba=baseAng;
    const segs=4+floor(Math.random()*4);
    for(let s=0;s<segs;s++){
      const sl=(totalLen/segs)*(.55+Math.random()*.9);
      bx+=cos(ba)*sl; by+=sin(ba)*sl;
      pts.push({x:bx,y:by});
      ba+=(Math.random()-.5)*.8;
      // sub-branches
      if(Math.random()<.4){
        const bpts=[{x:bx,y:by}];
        let bbx=bx,bby=by,bba=ba+(Math.random()-.5)*1.2;
        for(let ss=0;ss<2;ss++){
          const bsl=sl*(.3+Math.random()*.4);
          bbx+=cos(bba)*bsl; bby+=sin(bba)*bsl;
          bpts.push({x:bbx,y:bby}); bba+=(Math.random()-.5)*.6;
        }
        CRACKS.push({pts:bpts,life:4000,ml:4000,w:.8+Math.random()*1.4,branch:true});
      }
    }
    CRACKS.push({pts,life:4500,ml:4500,w:1.6+Math.random()*2.8,branch:false});
  }
}
// ═══════════════════════════════════════════════════════════════════════════════
//  HEAL ORBS
// ═══════════════════════════════════════════════════════════════════════════════
const ORBS=[];
function spawnOrb(x,y,size){
  ORBS.push({x,y,vx:(Math.random()-.5)*1.5,vy:-(1.2+Math.random()*2.5),
    life:1400+Math.random()*900,ml:2200,r:size||(2+Math.random()*3.8),
    hue:120+floor(Math.random()*40),phase:Math.random()*TAU});
}
// ═══════════════════════════════════════════════════════════════════════════════
//  GHOST AFTERIMAGES
// ═══════════════════════════════════════════════════════════════════════════════
const GHOSTS=[];
// ═══════════════════════════════════════════════════════════════════════════════
//  SWEEP ARC
// ═══════════════════════════════════════════════════════════════════════════════
let SWEEP_ARC=null;
function spawnSweepArc(cx,cy,r,aStart,aEnd,dur){
  SWEEP_ARC={cx,cy,r,aStart,aEnd,life:dur,ml:dur,prog:0};
}
// ═══════════════════════════════════════════════════════════════════════════════
//  WARNING CIRCLE
// ═══════════════════════════════════════════════════════════════════════════════
let WARN=null;
function spawnWarn(x,y,r,dur){ WARN={x,y,r,life:dur,ml:dur}; }
// ═══════════════════════════════════════════════════════════════════════════════
//  METEOR
// ═══════════════════════════════════════════════════════════════════════════════
let METEOR=null;
// ═══════════════════════════════════════════════════════════════════════════════
//  HEAL CIRCLE
// ═══════════════════════════════════════════════════════════════════════════════
let HEAL_CIRCLE=null;
// ═══════════════════════════════════════════════════════════════════════════════
//  THRUST FLASH
// ═══════════════════════════════════════════════════════════════════════════════
let TFLASH=null;
// ═══════════════════════════════════════════════════════════════════════════════
//  LANDING SHOCKWAVE RING (for dash)
// ═══════════════════════════════════════════════════════════════════════════════
let DASH_WAVE=null;

// ═══════════════════════════════════════════════════════════════════════════════
//  COOLDOWN SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
const CD_DUR=[4200,5800,3800,9500,7500];
let cdLeft=[0,0,0,0,0], cdTotal=[0,0,0,0,0];
let HP=100, HP_TGT=100;
function updateCD(){
  for(let i=0;i<5;i++){
    if(cdLeft[i]>0){
      cdLeft[i]-=dt;
      if(cdLeft[i]<=0){
        cdLeft[i]=0;
        document.getElementById('b'+i).classList.remove('cd');
        document.getElementById('o'+i).style.height='0%';
        document.getElementById('t'+i).textContent='';
      }else{
        document.getElementById('o'+i).style.height=(cdLeft[i]/cdTotal[i]*100)+'%';
        document.getElementById('t'+i).textContent=(cdLeft[i]/1000).toFixed(1);
      }
    }
  }
  // HP smooth
  HP=lp(HP,HP_TGT,dt*.008);
  document.getElementById('hf').style.width=clamp(HP,0,100)+'%';
}
function cast(i){
  if(cdLeft[i]>0||KN.state!=='idle')return;
  cdLeft[i]=cdTotal[i]=CD_DUR[i];
  document.getElementById('b'+i).classList.add('cd');
  [startDash,startSweep,startThrust,startMeteor,startHeal][i]();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  ENVIRONMENT  — stars, clouds, ground
// ═══════════════════════════════════════════════════════════════════════════════
const STARS=Array.from({length:110},()=>({
  x:Math.random(),y:Math.random()*.68,
  r:Math.random()*1.8+.25,
  tw:Math.random()*TAU,spd:Math.random()*.9+.15,
  hue:floor(Math.random()*60+200),
}));
const CLOUDS=Array.from({length:7},()=>({
  x:Math.random(),y:Math.random()*.42+.01,
  w:Math.random()*210+95,h:Math.random()*52+18,
  spd:Math.random()*.000046+.000016,
  alpha:Math.random()*.20+.04,
  hue:floor(Math.random()*40+260),
}));
// Distant mountain silhouette points
const MOUNTAINS=[];
(()=>{
  let mx=0;
  while(mx<500){
    const pw=35+Math.random()*60;
    const ph=GY*.18+Math.random()*GY*.28;
    MOUNTAINS.push({x:mx,w:pw,h:ph});
    mx+=pw*.7+Math.random()*20;
  }
})();
// Floating embers
const EMBERS=Array.from({length:30},()=>({
  x:Math.random(),y:Math.random()*.7+.2,
  r:Math.random()*2+.5,
  vx:(Math.random()-.5)*.002,vy:-Math.random()*.001-.0002,
  life:Math.random()*TAU,hue:floor(Math.random()*30+10),
}));

function drawBackground(){
  // Sky gradient
  const sky=g.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#020008');sky.addColorStop(.35,'#0e0525');
  sky.addColorStop(.7,'#1e0830');sky.addColorStop(1,'#2a0a1a');
  g.fillStyle=sky;g.fillRect(0,0,W,GY);

  // Nebula layers
  const neb1=g.createRadialGradient(W*.28,GY*.38,5,W*.28,GY*.38,W*.48);
  neb1.addColorStop(0,'rgba(60,0,100,.22)');neb1.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=neb1;g.fillRect(0,0,W,GY);
  const neb2=g.createRadialGradient(W*.75,GY*.55,5,W*.75,GY*.55,W*.38);
  neb2.addColorStop(0,'rgba(80,10,60,.18)');neb2.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=neb2;g.fillRect(0,0,W,GY);

  // Stars
  for(const s of STARS){
    s.tw+=s.spd*.024;
    const a=.25+.75*abs(sin(s.tw));
    if(s.r>1.2){
      g.shadowBlur=8;g.shadowColor=`hsl(${s.hue},80%,80%)`;
    }
    g.fillStyle=`hsla(${s.hue},70%,88%,${a})`;
    g.beginPath();g.arc(s.x*W,s.y*GY,s.r,0,TAU);g.fill();
    g.shadowBlur=0;
  }

  // Moon
  const moonX=W*.82,moonY=GY*.14,moonR=22;
  const moonGlow=g.createRadialGradient(moonX,moonY,0,moonX,moonY,moonR*3.5);
  moonGlow.addColorStop(0,'rgba(200,180,255,.18)');moonGlow.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=moonGlow;g.fillRect(moonX-moonR*3.5,moonY-moonR*3.5,moonR*7,moonR*7);
  const moonFill=g.createRadialGradient(moonX-moonR*.3,moonY-moonR*.3,1,moonX,moonY,moonR);
  moonFill.addColorStop(0,'#f0eaff');moonFill.addColorStop(.6,'#c8b8f0');moonFill.addColorStop(1,'#8060c0');
  g.fillStyle=moonFill;g.beginPath();g.arc(moonX,moonY,moonR,0,TAU);g.fill();
  g.fillStyle='rgba(0,0,0,.35)';g.beginPath();
  g.arc(moonX+moonR*.3,moonY-moonR*.1,moonR*.88,0,TAU);g.fill();

  // Clouds
  for(const c of CLOUDS){
    c.x+=c.spd;if(c.x>1.3)c.x=-0.28;
    const cg=g.createRadialGradient(c.x*W,c.y*GY,0,c.x*W,c.y*GY,c.w/2);
    cg.addColorStop(0,`hsla(${c.hue},60%,55%,${c.alpha})`);
    cg.addColorStop(.5,`hsla(${c.hue},45%,35%,${c.alpha*.5})`);
    cg.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=cg;g.beginPath();
    g.ellipse(c.x*W,c.y*GY,c.w/2,c.h/2,0,0,TAU);g.fill();
  }

  // Mountain silhouettes
  g.fillStyle='rgba(8,2,18,.85)';
  g.beginPath();g.moveTo(0,GY);
  for(const m of MOUNTAINS){
    g.lineTo(m.x,GY-m.h*.4);
    g.quadraticCurveTo(m.x+m.w*.5,GY-m.h,m.x+m.w,GY-m.h*.35);
  }
  g.lineTo(W+50,GY);g.closePath();g.fill();

  // Floating embers
  for(const e of EMBERS){
    e.x+=e.vx;e.y+=e.vy;e.life+=.02;
    if(e.x<0)e.x=1;if(e.x>1)e.x=0;
    if(e.y<0){e.y=.9;e.x=Math.random();}
    const ea=(.4+.6*abs(sin(e.life)))*(.6+.4*e.y);
    g.fillStyle=`hsla(${e.hue},95%,65%,${ea})`;
    g.shadowBlur=6;g.shadowColor=`hsl(${e.hue},95%,55%)`;
    g.beginPath();g.arc(e.x*W,e.y*GY,e.r,0,TAU);g.fill();
    g.shadowBlur=0;
  }
}

function drawGround(){
  // Subsurface glow (magma beneath)
  const subGlow=g.createLinearGradient(0,GY-8,0,GY+40);
  subGlow.addColorStop(0,'rgba(255,80,0,.06)');
  subGlow.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=subGlow;g.fillRect(0,GY-8,W,48);

  // Main ground fill
  const gnd=g.createLinearGradient(0,GY,0,H);
  gnd.addColorStop(0,'#1c0b06');gnd.addColorStop(.25,'#240d08');
  gnd.addColorStop(.7,'#160804');gnd.addColorStop(1,'#0a0402');
  g.fillStyle=gnd;g.fillRect(0,GY,W,H-GY);

  // Stone tiles
  const tw=44,th=21,cols=ceil(W/tw)+2,rows=5;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const tx=(c-(r%2)*.5)*tw-tw,ty=GY+r*th;
      const seed=(c*1237+r*3119)%17;
      const shade=.78+seed*.012;
      const rVal=round(56*shade),gVal=round(28*shade),bVal=round(12*shade);
      g.fillStyle=`rgb(${rVal},${gVal},${bVal})`;
      g.fillRect(tx,ty,tw-1,th-1);
      // Subtle tile shading
      const tileShade=g.createLinearGradient(tx,ty,tx,ty+th);
      tileShade.addColorStop(0,'rgba(255,255,255,.04)');
      tileShade.addColorStop(1,'rgba(0,0,0,.12)');
      g.fillStyle=tileShade;g.fillRect(tx,ty,tw-1,th-1);
      // Grout lines
      g.strokeStyle='rgba(6,3,1,.7)';g.lineWidth=.9;g.strokeRect(tx,ty,tw-1,th-1);
      // Edge bevel highlight
      g.strokeStyle='rgba(120,60,25,.3)';g.lineWidth=.5;
      g.beginPath();g.moveTo(tx,ty);g.lineTo(tx+tw-2,ty);g.stroke();
    }
  }

  // Ground edge glow line
  const eg=g.createLinearGradient(0,0,W,0);
  eg.addColorStop(0,'rgba(255,80,0,0)');eg.addColorStop(.18,'rgba(255,110,20,.7)');
  eg.addColorStop(.5,'rgba(255,130,25,.92)');eg.addColorStop(.82,'rgba(255,110,20,.7)');
  eg.addColorStop(1,'rgba(255,80,0,0)');
  g.fillStyle=eg;g.fillRect(0,GY-2.5,W,5);
  g.shadowBlur=18;g.shadowColor='rgba(255,80,0,.45)';
  g.fillRect(0,GY-1,W,2);g.shadowBlur=0;

  // Ground AO (ambient occlusion near top)
  const ao=g.createLinearGradient(0,GY,0,GY+36);
  ao.addColorStop(0,'rgba(0,0,0,.55)');ao.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=ao;g.fillRect(0,GY,W,36);
}
function ceil(x){return Math.ceil(x);}

// ═══════════════════════════════════════════════════════════════════════════════
//  DRAWING HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
// Draw a segment from A to B with half-widths wA, wB.
// Returns {nx,ny} = the left-side normal of the segment direction.
function seg(ax,ay,bx,by,wA,wB,fill,stroke,sw){
  const dx=bx-ax,dy=by-ay,len=sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len,ny=dx/len;
  g.beginPath();
  g.moveTo(ax+nx*wA,ay+ny*wA);
  g.lineTo(bx+nx*wB,by+ny*wB);
  g.lineTo(bx-nx*wB,by-ny*wB);
  g.lineTo(ax-nx*wA,ay-ny*wA);
  g.closePath();
  if(fill){g.fillStyle=fill;g.fill();}
  if(stroke){g.strokeStyle=stroke;g.lineWidth=sw||1.8;g.stroke();}
  return {nx,ny};
}
// Side-lit gradient for a limb segment
function limbGrad(ax,ay,bx,by,wA,hi,mid,dark){
  const dx=bx-ax,dy=by-ay,len=sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len*wA,ny=dx/len*wA;
  const grd=g.createLinearGradient(ax+nx,ay+ny,ax-nx,ay-ny);
  grd.addColorStop(0,dark);grd.addColorStop(.12,hi);
  grd.addColorStop(.52,mid);grd.addColorStop(1,dark);
  return grd;
}
// Draw a gold band (decorative ring around a segment)
function goldBand(cx,cy,ang,hw,hh,bright){
  g.save();g.translate(cx,cy);g.rotate(ang);
  const b=bright||1;
  const bg=g.createLinearGradient(-hw,-hh,hw,hh);
  bg.addColorStop(0,`rgba(${round(80*b)},${round(60*b)},0,.5)`);
  bg.addColorStop(.35,`rgba(${round(220*b)},${round(170*b)},${round(20*b)},1)`);
  bg.addColorStop(.65,`rgba(${round(255*b)},${round(210*b)},${round(60*b)},1)`);
  bg.addColorStop(1,`rgba(${round(80*b)},${round(60*b)},0,.5)`);
  g.fillStyle=bg;
  rrect(-hw,-hh,hw*2,hh*2,min(hw,hh)*.4);g.fill();
  g.restore();
}
// Rivet
function rivet(x,y,r){
  const rg=g.createRadialGradient(x-r*.3,y-r*.3,0,x,y,r);
  rg.addColorStop(0,'#fff8b0');rg.addColorStop(.5,'#c8a020');rg.addColorStop(1,'#5a3a00');
  g.fillStyle=rg;g.beginPath();g.arc(x,y,r,0,TAU);g.fill();
}
// Glow circle
function glowCirc(x,y,r,col,blur){
  g.shadowBlur=blur||20;g.shadowColor=col;
  g.fillStyle=col;g.beginPath();g.arc(x,y,r,0,TAU);g.fill();
  g.shadowBlur=0;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SKELETON JOINT SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
// Each joint: cur=current angle(world), tgt=target angle, spd=lerp speed,
//             len=bone length from this pivot to child pivot
// World convention: angle=0 → right, angle=-PI/2 → up, angle=PI/2 → down
// X mirroring for facing: X component = cos(angle)*len*FACING
// Y component always = sin(angle)*len (gravity is always down)
function J(angle,len,spd){ return {cur:angle,tgt:angle,spd:spd||9,len}; }

const SK={
  // ── SPINE (upward chain) ──
  spL: J(-PI/2, 22, 10),   // spine lower
  spM: J(-PI/2, 24, 10),   // spine mid
  spH: J(-PI/2, 22, 10),   // spine high (chest)
  nk:  J(-PI/2, 14, 13),   // neck
  // ── LEFT ARM (shield) ──
  lCl: J( PI*.58, 17, 11), // left clavicle
  lUA: J( PI*.68, 36, 10), // left upper arm
  lFA: J( PI*.46, 29, 10), // left forearm
  lHd: J( PI*.50, 13, 10), // left hand
  // ── RIGHT ARM (spear) ──
  rCl: J(-PI*.58, 17, 11), // right clavicle
  rUA: J(-PI*.68, 36, 10), // right upper arm
  rFA: J(-PI*.46, 29, 10), // right forearm
  rHd: J(-PI*.50, 13, 10), // right hand
  // ── SPEAR (chain from rHd) ──
  spA: J(-PI*.55, 46, 13), // spear lower shaft
  spB: J(-PI*.55, 56, 13), // spear upper shaft
  // ── LEFT LEG ──
  lTh: J( PI/2+.10, 39, 10), // left thigh
  lSh: J( PI/2+.05, 34, 10), // left shin
  lAk: J( PI/2-.10, 17, 10), // left ankle
  lTo: J(-.05,        9, 10), // left toe
  // ── RIGHT LEG ──
  rTh: J( PI/2-.10, 39, 10),
  rSh: J( PI/2-.05, 34, 10),
  rAk: J( PI/2+.10, 17, 10),
  rTo: J( .05,        9, 10),
};

// IDLE pose reference
const IDLE={
  spL:-PI/2, spM:-PI/2, spH:-PI/2, nk:-PI/2,
  lCl: PI*.58, lUA: PI*.68, lFA: PI*.46, lHd: PI*.50,
  rCl:-PI*.58, rUA:-PI*.68, rFA:-PI*.46, rHd:-PI*.50,
  spA:-PI*.55, spB:-PI*.55,
  lTh: PI/2+.10, lSh: PI/2+.05, lAk: PI/2-.10, lTo:-.05,
  rTh: PI/2-.10, rSh: PI/2-.05, rAk: PI/2+.10, rTo: .05,
};
function setPose(obj){ for(const k in obj){ if(SK[k]) SK[k].tgt=obj[k]; } }
function setIdle()   { setPose(IDLE); }
function setSpeeds(s){ for(const k in SK) SK[k].spd=s; }
function lerpSK(m){
  const mm=m||1;
  for(const k in SK){
    const j=SK[k],kk=clamp(j.spd*mm*dt/1000,0,1);
    j.cur=lp(j.cur,j.tgt,kk);
  }
}

// ── World Joint Positions (computed by FK each frame) ──
const JP={};  // key → {x,y}

// FK: compute all JP from pelvis world position + lean + squat
// FACING = +1 (right) or -1 (left)
let FACING=1;
function runFK(pelX,pelY,lean,squat){
  const F=FACING;
  const pX=pelX, pY=pelY+(squat||0);
  JP.pel={x:pX,y:pY};

  // Helper: extend from (ox,oy) in direction angle, length len
  // X is mirrored by F; Y is not
  function ext(ox,oy,angle,length){
    return{ x:ox+cos(angle)*length*F, y:oy+sin(angle)*length };
  }

  // SPINE (upward) — lean tilts only X component
  const leanX = (lean||0);
  // spineL starts at pelvis
  JP.spL=ext(pX,pY, SK.spL.cur+leanX*.85, SK.spL.len);
  JP.spM=ext(JP.spL.x,JP.spL.y, SK.spM.cur+leanX*.55, SK.spM.len);
  JP.spH=ext(JP.spM.x,JP.spM.y, SK.spH.cur+leanX*.30, SK.spH.len);
  JP.nk =ext(JP.spH.x,JP.spH.y, SK.nk.cur+leanX*.15, SK.nk.len);
  JP.head={x:JP.nk.x,y:JP.nk.y};

  // SHOULDERS (offset from spH)
  JP.lSh={x:JP.spH.x - F*21, y:JP.spH.y+4};
  JP.rSh={x:JP.spH.x + F*21, y:JP.spH.y+4};

  // LEFT ARM (shield side — always on the "non-dominant" side)
  JP.lCl=ext(JP.lSh.x,JP.lSh.y, SK.lCl.cur, SK.lCl.len);
  JP.lEl=ext(JP.lCl.x,JP.lCl.y, SK.lUA.cur, SK.lUA.len);
  JP.lWr=ext(JP.lEl.x,JP.lEl.y, SK.lFA.cur, SK.lFA.len);
  JP.lHn=ext(JP.lWr.x,JP.lWr.y, SK.lHd.cur, SK.lHd.len);

  // RIGHT ARM (spear side)
  JP.rCl=ext(JP.rSh.x,JP.rSh.y, SK.rCl.cur, SK.rCl.len);
  JP.rEl=ext(JP.rCl.x,JP.rCl.y, SK.rUA.cur, SK.rUA.len);
  JP.rWr=ext(JP.rEl.x,JP.rEl.y, SK.rFA.cur, SK.rFA.len);
  JP.rHn=ext(JP.rWr.x,JP.rWr.y, SK.rHd.cur, SK.rHd.len);

  // SPEAR chain from right hand
  JP.spAe=ext(JP.rHn.x,JP.rHn.y, SK.spA.cur, SK.spA.len);
  JP.spBe=ext(JP.spAe.x,JP.spAe.y, SK.spB.cur, SK.spB.len);
  // Blade tip extends further in same shaft direction
  const sdx=JP.spBe.x-JP.spAe.x, sdy=JP.spBe.y-JP.spAe.y;
  const sl=sqrt(sdx*sdx+sdy*sdy)||1;
  JP.spTp={x:JP.spBe.x+(sdx/sl)*66, y:JP.spBe.y+(sdy/sl)*66};

  // LEFT LEG (hip offset = -F*14 from pelvis)
  const lhx=pX-F*14,lhy=pY;
  JP.lHp={x:lhx,y:lhy};
  JP.lKn={x:lhx+cos(SK.lTh.cur)*SK.lTh.len, y:lhy+sin(SK.lTh.cur)*SK.lTh.len};
  JP.lAn={x:JP.lKn.x+cos(SK.lSh.cur)*SK.lSh.len, y:JP.lKn.y+sin(SK.lSh.cur)*SK.lSh.len};
  JP.lHl={x:JP.lAn.x+cos(SK.lAk.cur)*SK.lAk.len, y:JP.lAn.y+sin(SK.lAk.cur)*SK.lAk.len};
  JP.lTe={x:JP.lHl.x+cos(SK.lTo.cur)*SK.lTo.len, y:JP.lHl.y+sin(SK.lTo.cur)*SK.lTo.len};

  // RIGHT LEG
  const rhx=pX+F*14,rhy=pY;
  JP.rHp={x:rhx,y:rhy};
  JP.rKn={x:rhx+cos(SK.rTh.cur)*SK.rTh.len, y:rhy+sin(SK.rTh.cur)*SK.rTh.len};
  JP.rAn={x:JP.rKn.x+cos(SK.rSh.cur)*SK.rSh.len, y:JP.rKn.y+sin(SK.rSh.cur)*SK.rSh.len};
  JP.rHl={x:JP.rAn.x+cos(SK.rAk.cur)*SK.rAk.len, y:JP.rAn.y+sin(SK.rAk.cur)*SK.rAk.len};
  JP.rTe={x:JP.rHl.x+cos(SK.rTo.cur)*SK.rTo.len, y:JP.rHl.y+sin(SK.rTo.cur)*SK.rTo.len};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  KNIGHT RENDERER  — draws every bone segment with high-detail armor
// ═══════════════════════════════════════════════════════════════════════════════
// Global knight position (foot contact)
const KN={
  x:0,y:0,          // world foot position
  facing:1,visible:true,
  state:'idle',phase:0,phaseT:0,stateT:0,
  lean:0,squat:0,    // trunk lean & squat (used by FK)
};

function drawKnight(){
  const F=FACING;

  // Ground shadow
  const sh=g.createRadialGradient(KN.x,KN.y,2,KN.x,KN.y,56);
  sh.addColorStop(0,'rgba(0,0,0,.58)');sh.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=sh;g.beginPath();g.ellipse(KN.x,KN.y,56,13,0,0,TAU);g.fill();

  // Draw order (back→front):
  // 1. Back leg
  // 2. Spear arm (behind torso when facing right)
  // 3. Torso (kilt, belt, chest, pauldrons)
  // 4. Shield arm (in front of torso)
  // 5. Front leg
  // 6. Helmet
  if(F>=0){
    drawLeg(JP.lHp,JP.lKn,JP.lAn,JP.lHl,JP.lTe,.68); // back
    drawSpearArm();
    drawTorso();
    drawShieldArm();
    drawLeg(JP.rHp,JP.rKn,JP.rAn,JP.rHl,JP.rTe,1.0); // front
  }else{
    drawLeg(JP.rHp,JP.rKn,JP.rAn,JP.rHl,JP.rTe,.68);
    drawSpearArm();
    drawTorso();
    drawShieldArm();
    drawLeg(JP.lHp,JP.lKn,JP.lAn,JP.lHl,JP.lTe,1.0);
  }
  drawHelmet();
}

// ── LEG ─────────────────────────────────────────────────────────────────────
function drawLeg(hip,knee,ankle,heel,toe,bright){
  const d=bright,
    hiCol=`rgba(${round(145*d)},${round(145*d)},${round(148*d)},1)`,
    midCol=`rgba(${round(88*d)},${round(88*d)},${round(90*d)},1)`,
    darkCol=`rgba(${round(22*d)},${round(22*d)},${round(24*d)},1)`;

  // ── THIGH ──
  const thGrd=limbGrad(hip.x,hip.y,knee.x,knee.y,13,hiCol,midCol,darkCol);
  const {nx:tnx,ny:tny}=seg(hip.x,hip.y,knee.x,knee.y,13,11,thGrd,'#141414',2);
  // Highlight edge
  g.strokeStyle=`rgba(255,255,255,${.16*d})`;g.lineWidth=1.6;
  g.beginPath();
  g.moveTo(hip.x+tnx*13*.45,hip.y+tny*13*.45);
  g.lineTo(knee.x+tnx*11*.45,knee.y+tny*11*.45);
  g.stroke();
  // Thigh armor overlay (extra plate)
  const tmx=(hip.x+knee.x)*.5,tmy=(hip.y+knee.y)*.5;
  const tpg=g.createLinearGradient(tmx+tnx*13,tmy+tny*13,tmx-tnx*13,tmy-tny*13);
  tpg.addColorStop(0,`rgba(200,200,205,${.12*d})`);
  tpg.addColorStop(.4,`rgba(160,160,165,${.20*d})`);
  tpg.addColorStop(1,`rgba(10,10,12,0)`);
  const tdx=knee.x-hip.x,tdy=knee.y-hip.y,tl=sqrt(tdx*tdx+tdy*tdy)||1;
  g.beginPath();
  g.moveTo(hip.x+tnx*11+tdx/tl*4,hip.y+tny*11+tdy/tl*4);
  g.lineTo(hip.x-tnx*11+tdx/tl*4,hip.y-tny*11+tdy/tl*4);
  g.lineTo(knee.x-tnx*10-tdx/tl*4,knee.y-tny*10-tdy/tl*4);
  g.lineTo(knee.x+tnx*10-tdx/tl*4,knee.y+tny*10-tdy/tl*4);
  g.closePath();g.fillStyle=tpg;g.fill();
  // Gold top trim
  goldBand(hip.x+tnx*0,hip.y+tny*0,Math.atan2(tny,-tnx),12,3.5,d);

  // ── KNEE CAP ──
  const kg=g.createRadialGradient(knee.x-1.5,knee.y-2,0,knee.x,knee.y,10.5);
  kg.addColorStop(0,`rgba(${round(230*d)},${round(185*d)},${round(35*d)},1)`);
  kg.addColorStop(.55,`rgba(${round(200*d)},${round(155*d)},${round(28*d)},1)`);
  kg.addColorStop(1,`rgba(${round(80*d)},${round(60*d)},${round(8*d)},1)`);
  g.fillStyle=kg;
  g.shadowBlur=d>0.8?7:0;g.shadowColor=`rgba(220,170,30,${.55*d})`;
  g.beginPath();g.arc(knee.x,knee.y,10.5,0,TAU);g.fill();g.shadowBlur=0;
  g.fillStyle=`rgba(24,24,26,${d})`;g.beginPath();g.arc(knee.x,knee.y,5.5,0,TAU);g.fill();
  g.fillStyle=`rgba(255,215,80,${.45*d})`;g.beginPath();g.arc(knee.x-2,knee.y-2.5,2.8,0,TAU);g.fill();

  // ── SHIN ──
  const shGrd=limbGrad(knee.x,knee.y,ankle.x,ankle.y,11,hiCol,midCol,darkCol);
  const {nx:snx,ny:sny}=seg(knee.x,knee.y,ankle.x,ankle.y,11,9.5,shGrd,'#141414',1.8);
  g.strokeStyle=`rgba(255,255,255,${.12*d})`;g.lineWidth=1.4;
  g.beginPath();
  g.moveTo(knee.x+snx*11*.4,knee.y+sny*11*.4);
  g.lineTo(ankle.x+snx*9.5*.4,ankle.y+sny*9.5*.4);
  g.stroke();
  // Shin guard ridge line
  const sdx=ankle.x-knee.x,sdy=ankle.y-knee.y,sl=sqrt(sdx*sdx+sdy*sdy)||1;
  g.strokeStyle=`rgba(255,255,255,${.09*d})`;g.lineWidth=1.2;
  g.beginPath();
  g.moveTo(knee.x+sdx/sl*6,knee.y+sdy/sl*6);
  g.lineTo(ankle.x-sdx/sl*5,ankle.y-sdy/sl*5);
  g.stroke();
  // Gold shin band
  goldBand(knee.x+sdx*.28,knee.y+sdy*.28,Math.atan2(sny,-snx)+PI/2,10,4,d);

  // ── ANKLE / BOOT CUFF ──
  const akGrd=limbGrad(ankle.x,ankle.y,heel.x,heel.y,10,hiCol,midCol,darkCol);
  seg(ankle.x,ankle.y,heel.x,heel.y,10,12,akGrd,'#141414',1.8);
  goldBand(ankle.x,ankle.y,Math.atan2(heel.y-ankle.y,heel.x-ankle.x)+PI/2,11,4.5,d);

  // ── BOOT BODY ──
  const fdx=heel.x-ankle.x,fdy=heel.y-ankle.y,fl=sqrt(fdx*fdx+fdy*fdy)||1;
  const fnx=-fdy/fl,fny=fdx/fl;
  const bootFill=`rgba(${round(34*d)},${round(28*d)},${round(24*d)},1)`;
  g.fillStyle=bootFill;
  g.beginPath();
  g.moveTo(heel.x+fnx*12,heel.y+fny*12);
  g.lineTo(heel.x-fnx*12,heel.y-fny*12);
  g.lineTo(toe.x-fnx*8,toe.y-fny*8);
  g.quadraticCurveTo(toe.x+fdx/fl*14-fnx*4,toe.y+fdy/fl*14-fny*4,
                     toe.x+fdx/fl*16,toe.y+fdy/fl*16);
  g.quadraticCurveTo(toe.x+fdx/fl*14+fnx*4,toe.y+fdy/fl*14+fny*4,
                     toe.x+fnx*8,toe.y+fny*8);
  g.closePath();g.fill();
  g.strokeStyle=`rgba(55,45,38,${d})`;g.lineWidth=1.5;g.stroke();
  // Boot toe cap (darker)
  g.fillStyle=`rgba(${round(20*d)},${round(16*d)},${round(14*d)},1)`;
  g.beginPath();g.ellipse(toe.x+fdx/fl*10,toe.y+fdy/fl*10,13,7,Math.atan2(fdy,fdx),0,TAU);
  g.fill();
  // Boot gold trim line
  goldBand(heel.x,heel.y,Math.atan2(fdy,fdx)+PI/2,12,3.5,d);
  // Boot sole
  g.fillStyle=`rgba(${round(15*d)},${round(12*d)},${round(10*d)},1)`;
  g.beginPath();
  g.moveTo(ankle.x+fnx*12,ankle.y+fny*12);
  g.lineTo(ankle.x-fnx*12,ankle.y-fny*12);
  g.lineTo(toe.x+fdx/fl*12-fnx*8,toe.y+fdy/fl*12-fny*8);
  g.lineTo(toe.x+fdx/fl*18,toe.y+fdy/fl*18);
  g.lineTo(toe.x+fdx/fl*12+fnx*8,toe.y+fdy/fl*12+fny*8);
  g.closePath();g.fill();
}

// ── TORSO ────────────────────────────────────────────────────────────────────
function drawTorso(){
  const F=FACING;
  const pel=JP.pel,spL=JP.spL,spM=JP.spM,spH=JP.spH;
  const lSh=JP.lSh,rSh=JP.rSh;

  // ── WAR KILT ──
  const kiltW=28;
  const kAngX=spL.x-pel.x,kAngY=spL.y-pel.y;
  const kA=Math.atan2(kAngY,kAngX);
  // 11 strips hanging from pelvis
  for(let i=0;i<11;i++){
    const t=(i/10-.5);
    const ox=F*t*kiltW*2,oy=abs(t)*2;
    const kx=pel.x+ox,ky=pel.y+oy;
    const sw=5.5-abs(t)*1.5;
    const stH=30+abs(sin(T*1.1+i*.7))*3.5;
    const even=i%2===0;
    const col=even?'#421e02':'#301500';
    const kgrd=g.createLinearGradient(kx-sw,ky,kx+sw,ky);
    kgrd.addColorStop(0,'rgba(0,0,0,.3)');
    kgrd.addColorStop(.3,col);kgrd.addColorStop(.7,col);
    kgrd.addColorStop(1,'rgba(0,0,0,.3)');
    g.fillStyle=kgrd;
    g.beginPath();
    g.moveTo(kx-sw,ky);g.lineTo(kx+sw,ky);
    g.lineTo(kx+sw*.75,ky+stH);g.lineTo(kx-sw*.75,ky+stH);
    g.closePath();g.fill();
    g.strokeStyle='#6a3e00';g.lineWidth=.8;g.stroke();
    // Bottom decorative edge
    g.strokeStyle='rgba(200,155,25,.7)';g.lineWidth=1;
    g.beginPath();g.moveTo(kx-sw*.75,ky+stH);g.lineTo(kx+sw*.75,ky+stH);g.stroke();
    // Rivet at top of each strip
    rivet(kx,ky+5,2.2);
  }

  // ── BELT ──
  const beltAngle=Math.atan2(spL.y-pel.y,spL.x-pel.x)+PI/2;
  const bcx=(pel.x+spL.x)*.5,bcy=(pel.y+spL.y)*.5;
  g.save();g.translate(bcx,bcy);g.rotate(beltAngle);
  const bg2=g.createLinearGradient(-30,-8,30,8);
  bg2.addColorStop(0,'#0e0500');bg2.addColorStop(.35,'#221000');
  bg2.addColorStop(.65,'#2e1600');bg2.addColorStop(1,'#0e0500');
  rrect(-30,-8,60,16,5);g.fillStyle=bg2;g.fill();
  g.strokeStyle='#c8a020';g.lineWidth=2.8;g.stroke();
  // Buckle
  g.fillStyle='#c8a020';g.fillRect(-11,-7,22,14);
  g.fillStyle='#0e0500';g.fillRect(-8,-5,16,10);
  g.fillStyle='#c8a020';g.beginPath();g.arc(0,0,4.5,0,TAU);g.fill();
  rivet(-22,0,2.5);rivet(22,0,2.5);
  g.restore();

  // ── LOWER ABDOMEN / SPINE SEGMENTS ──
  const abGrd=limbGrad(pel.x,pel.y,spL.x,spL.y,21,'#a0a0a4','#626266','#1a1a1c');
  seg(pel.x,pel.y,spL.x,spL.y,21,22,abGrd,'#141418',2.5);
  const midGrd=limbGrad(spL.x,spL.y,spM.x,spM.y,22,'#a8a8ac','#686870','#1a1a1e');
  seg(spL.x,spL.y,spM.x,spM.y,22,23,midGrd,'#141418',2.5);

  // ── BREASTPLATE ──
  // Spans spL → spH, wide and imposing
  const cpAngle=Math.atan2(spH.y-spL.y,spH.x-spL.x)+PI/2;
  const cpCX=(spL.x+spH.x)*.5,cpCY=(spL.y+spH.y)*.5;
  const cpH=sqrt((spH.x-spL.x)**2+(spH.y-spL.y)**2)+4;
  g.save();g.translate(cpCX,cpCY);g.rotate(cpAngle);
  // Main plate body
  const cpg=g.createLinearGradient(-36,-cpH/2,36,cpH/2);
  cpg.addColorStop(0,'#1a1a1e');cpg.addColorStop(.06,'#787880');
  cpg.addColorStop(.26,'#b2b2b8');cpg.addColorStop(.50,'#989898');
  cpg.addColorStop(.72,'#686870');cpg.addColorStop(.94,'#404044');
  cpg.addColorStop(1,'#1a1a1e');
  g.fillStyle=cpg;
  g.beginPath();
  g.moveTo(-36,-cpH/2+3);
  g.bezierCurveTo(-40,-cpH/2+12,-40,cpH/2-12,-35,cpH/2);
  g.lineTo(35,cpH/2);
  g.bezierCurveTo(40,cpH/2-12,40,-cpH/2+12,36,-cpH/2+3);
  g.closePath();g.fill();
  g.strokeStyle='#101012';g.lineWidth=2.8;g.stroke();

  // Chest panel grooves (etched lines)
  g.strokeStyle='rgba(0,0,0,.55)';g.lineWidth=2;
  g.beginPath();g.moveTo(0,-cpH/2+6);g.lineTo(0,cpH/2-6);g.stroke();
  g.beginPath();g.moveTo(-18,-cpH/2+16);
  g.bezierCurveTo(-25,-cpH/2+30,-25,cpH/2-16,-18,cpH/2-8);g.stroke();
  g.beginPath();g.moveTo(18,-cpH/2+16);
  g.bezierCurveTo(25,-cpH/2+30,25,cpH/2-16,18,cpH/2-8);g.stroke();
  // Highlight groove lines
  g.strokeStyle='rgba(255,255,255,.16)';g.lineWidth=1.2;
  g.beginPath();g.moveTo(-1,-cpH/2+6);g.lineTo(-1,cpH/2-6);g.stroke();
  g.beginPath();g.moveTo(-19,-cpH/2+16);
  g.bezierCurveTo(-26,-cpH/2+30,-26,cpH/2-16,-19,cpH/2-8);g.stroke();
  g.beginPath();g.moveTo(19,-cpH/2+16);
  g.bezierCurveTo(26,-cpH/2+30,26,cpH/2-16,19,cpH/2-8);g.stroke();

  // Gold border
  g.strokeStyle='#c8a020';g.lineWidth=3.2;
  g.beginPath();
  g.moveTo(-36,-cpH/2+3);
  g.bezierCurveTo(-40,-cpH/2+12,-40,cpH/2-12,-35,cpH/2);
  g.lineTo(35,cpH/2);g.bezierCurveTo(40,cpH/2-12,40,-cpH/2+12,36,-cpH/2+3);
  g.closePath();g.stroke();

  // Inner gold bevel
  g.strokeStyle='rgba(200,160,32,.4)';g.lineWidth=1.5;
  g.beginPath();
  g.moveTo(-32,-cpH/2+7);g.bezierCurveTo(-35,-cpH/2+16,-35,cpH/2-14,-31,cpH/2-4);
  g.lineTo(31,cpH/2-4);g.bezierCurveTo(35,cpH/2-14,35,-cpH/2+16,32,-cpH/2+7);
  g.closePath();g.stroke();

  // Cross emblem
  const cy0=cpH*.06;
  g.shadowBlur=12;g.shadowColor='rgba(200,160,30,.5)';
  g.strokeStyle='rgba(200,160,32,.92)';g.lineWidth=4;
  g.beginPath();g.moveTo(0,-cpH/2+14);g.lineTo(0,cpH/2-12);g.stroke();
  g.beginPath();g.moveTo(-19,cy0);g.lineTo(19,cy0);g.stroke();
  g.shadowBlur=0;

  // Chest gem
  const vb=sin(T*2.2)*.5+.5; // 0→1 pulsing
  const gemR=9;
  const gemG=g.createRadialGradient(-2,-2,0,0,0,gemR);
  gemG.addColorStop(0,'#ffffff');
  gemG.addColorStop(.25,`hsl(${round(0+vb*10)},100%,70%)`);
  gemG.addColorStop(.55,'#cc2200');
  gemG.addColorStop(1,'rgba(120,0,0,0)');
  g.shadowBlur=20+vb*12;g.shadowColor=`rgba(255,${round(vb*60)},0,.85)`;
  g.fillStyle=gemG;g.beginPath();g.arc(0,cy0,gemR,0,TAU);g.fill();
  g.shadowBlur=0;

  // Ab plates (4 rows × 2 cols)
  for(let row=0;row<4;row++){
    const ry=-cpH/2+20+row*13;
    for(const sx of[-15,15]){
      const apg=g.createLinearGradient(sx-8,ry,sx+8,ry+11);
      apg.addColorStop(0,'rgba(180,180,185,.12)');
      apg.addColorStop(.5,'rgba(120,120,125,.08)');
      apg.addColorStop(1,'rgba(0,0,0,.05)');
      rrect(sx-8,ry,16,11,3);g.fillStyle=apg;g.fill();
      g.strokeStyle='rgba(200,160,32,.28)';g.lineWidth=.9;g.stroke();
      g.strokeStyle='rgba(255,255,255,.08)';g.lineWidth=.6;
      g.beginPath();g.moveTo(sx-7,ry+1);g.lineTo(sx+7,ry+1);g.stroke();
    }
  }
  g.restore();

  // ── PAULDRONS ──
  drawPauldron(JP.lSh.x,JP.lSh.y,cpAngle,-1);
  drawPauldron(JP.rSh.x,JP.rSh.y,cpAngle, 1);
}

function drawPauldron(cx,cy,baseAng,side){
  g.save();g.translate(cx,cy);g.rotate(baseAng);
  // Main dome (ellipse)
  const pg=g.createRadialGradient(-6*side,-8,2,0,0,26);
  pg.addColorStop(0,'#b4b4b8');pg.addColorStop(.45,'#787880');
  pg.addColorStop(1,'#1e1e22');
  g.fillStyle=pg;g.beginPath();g.ellipse(0,0,26,18,0,0,TAU);g.fill();
  g.strokeStyle='#c8a020';g.lineWidth=2.8;g.stroke();
  // Inner highlight
  g.strokeStyle='rgba(255,255,255,.18)';g.lineWidth=1.5;
  g.beginPath();g.ellipse(-3*side,-4,18,11,-PI*.05,0,TAU);g.stroke();

  // 4 layered sub-plates
  for(let p=0;p<4;p++){
    const pyy=14+p*12,pw=22-p*2.5,ph=7.5-p*.6;
    const ppg=g.createLinearGradient(-pw,pyy,pw,pyy+ph*2);
    ppg.addColorStop(0,'rgba(180,180,186,.0)');
    ppg.addColorStop(.2,`rgba(${120-p*8},${120-p*8},${124-p*8},1)`);
    ppg.addColorStop(.8,`rgba(${75-p*6},${75-p*6},${78-p*6},1)`);
    ppg.addColorStop(1,'rgba(20,20,24,.0)');
    g.fillStyle=ppg;g.beginPath();g.ellipse(0,pyy,pw,ph,0,0,TAU);g.fill();
    g.strokeStyle=`rgba(180,140,20,${.55-p*.1})`;g.lineWidth=.9;g.stroke();
    // Plate ridge
    g.strokeStyle=`rgba(255,255,255,${.10-p*.02})`;g.lineWidth=.8;
    g.beginPath();g.moveTo(-pw*.8,pyy);g.lineTo(pw*.8,pyy);g.stroke();
    // Rivets on plates
    if(p<3){rivet(-pw*.6,pyy,2);rivet(pw*.6,pyy,2);}
  }

  // Shoulder spike
  g.fillStyle='#b8b8bc';
  g.beginPath();g.moveTo(-6,-16);g.lineTo(0,-36);g.lineTo(6,-16);g.closePath();g.fill();
  g.strokeStyle='#888';g.lineWidth=1;g.stroke();
  g.shadowBlur=12;g.shadowColor='rgba(200,160,32,.65)';
  const spkG=g.createRadialGradient(-1,-36,0,0,-34,5);
  spkG.addColorStop(0,'#fff8c0');spkG.addColorStop(.5,'#c8a020');spkG.addColorStop(1,'#5a3800');
  g.fillStyle=spkG;g.beginPath();g.arc(0,-36,5.5,0,TAU);g.fill();
  g.shadowBlur=0;
  rivet(0,-36,2.5);
  g.restore();
}

// ── SHIELD ARM ───────────────────────────────────────────────────────────────
function drawShieldArm(){
  const sh=JP.lSh,cl=JP.lCl,el=JP.lEl,wr=JP.lWr,hn=JP.lHn;
  // Upper arm
  const uaG=limbGrad(sh.x,sh.y,el.x,el.y,11,'#a0a0a4','#646468','#1c1c1e');
  seg(sh.x,sh.y,el.x,el.y,11,10,uaG,'#141416',2);
  // Elbow guard
  drawElbowGuard(el.x,el.y,1);
  // Forearm (vambrace — slightly wider for armor)
  const faG=limbGrad(el.x,el.y,wr.x,wr.y,10,'#9a9a9e','#606064','#1c1c1e');
  seg(el.x,el.y,wr.x,wr.y,10,9,faG,'#141416',1.8);
  // Vambrace gold band
  goldBand((el.x+wr.x)*.5,(el.y+wr.y)*.5,
    Math.atan2(wr.y-el.y,wr.x-el.x)+PI/2, 10, 3.8, 1);
  // Wrist/hand
  seg(wr.x,wr.y,hn.x,hn.y,9,10,
    limbGrad(wr.x,wr.y,hn.x,hn.y,10,'#909094','#585860','#1a1a1c'),'#141416',1.8);
  // Gauntlet
  const ghAng=Math.atan2(hn.y-wr.y,hn.x-wr.x)+PI/2;
  g.save();g.translate(hn.x,hn.y);g.rotate(ghAng);
  const ghG=g.createLinearGradient(-12,-4,12,16);
  ghG.addColorStop(0,'#1a1a1e');ghG.addColorStop(.3,'#787880');
  ghG.addColorStop(.7,'#565660');ghG.addColorStop(1,'#1a1a1e');
  rrect(-12,-4,24,19,6);g.fillStyle=ghG;g.fill();
  g.strokeStyle='#4a4a50';g.lineWidth=2;g.stroke();
  g.strokeStyle='#c8a020';g.lineWidth=1.6;
  g.beginPath();g.moveTo(-12,7);g.lineTo(12,7);g.stroke();
  rivet(-8,12,2.2);rivet(8,12,2.2);
  g.restore();
  // Shield
  const shieldAng=Math.atan2(hn.y-wr.y,hn.x-wr.x);
  drawShield(hn.x,hn.y,shieldAng);
}

function drawElbowGuard(ex,ey,bright){
  const d=bright||1;
  const eg=g.createRadialGradient(ex-2,ey-2.5,0,ex,ey,11);
  eg.addColorStop(0,`rgba(${round(240*d)},${round(190*d)},${round(40*d)},1)`);
  eg.addColorStop(.5,`rgba(${round(200*d)},${round(155*d)},${round(28*d)},1)`);
  eg.addColorStop(1,`rgba(${round(70*d)},${round(52*d)},${round(6*d)},1)`);
  g.shadowBlur=d>0.8?8:0;g.shadowColor=`rgba(220,170,30,${.55*d})`;
  g.fillStyle=eg;g.beginPath();g.arc(ex,ey,11,0,TAU);g.fill();g.shadowBlur=0;
  g.fillStyle=`rgba(22,22,26,${d})`;g.beginPath();g.arc(ex,ey,5.5,0,TAU);g.fill();
  g.fillStyle=`rgba(255,215,80,${.48*d})`;g.beginPath();g.arc(ex-2.2,ey-2.8,3,0,TAU);g.fill();
}

// ── SHIELD ────────────────────────────────────────────────────────────────────
function drawShield(hx,hy,angle){
  const F=FACING;
  // Shield face points to the left of the arm when facing right
  const shang=angle+PI*.5*F;
  g.save();g.translate(hx,hy);g.rotate(shang);
  // Shield is 62w × 94h — large imposing tower shield
  const sw=62,sh=94,sx=-sw/2,sy=-18;

  // Main body
  const shG=g.createLinearGradient(sx,sy,sx+sw,sy+sh);
  shG.addColorStop(0,'#1e1e22');shG.addColorStop(.05,'#7e7e84');
  shG.addColorStop(.28,'#b0b0b6');shG.addColorStop(.55,'#909096');
  shG.addColorStop(.80,'#5a5a60');shG.addColorStop(.96,'#323238');
  shG.addColorStop(1,'#1a1a1e');
  g.fillStyle=shG;
  g.beginPath();
  g.moveTo(sx+9,sy);g.lineTo(sx+sw-9,sy);
  g.quadraticCurveTo(sx+sw,sy,sx+sw,sy+22);
  g.lineTo(sx+sw,sy+sh*.74);
  g.quadraticCurveTo(sx+sw,sy+sh,sx+sw/2,sy+sh);
  g.quadraticCurveTo(sx,sy+sh,sx,sy+sh*.74);
  g.lineTo(sx,sy+22);
  g.quadraticCurveTo(sx,sy,sx+9,sy);
  g.closePath();g.fill();

  // Gold outer border
  g.shadowBlur=10;g.shadowColor='rgba(200,160,30,.4)';
  g.strokeStyle='#c8a020';g.lineWidth=4.8;g.stroke();g.shadowBlur=0;

  // Engraved inner bevel (dark inset)
  g.strokeStyle='rgba(0,0,0,.6)';g.lineWidth=3;
  g.beginPath();
  g.moveTo(sx+15,sy+8);g.lineTo(sx+sw-15,sy+8);
  g.lineTo(sx+sw-10,sy+sh*.72);
  g.lineTo(sx+sw/2,sy+sh-8);
  g.lineTo(sx+10,sy+sh*.72);
  g.closePath();g.stroke();
  // Inner bevel highlight
  g.strokeStyle='rgba(255,255,255,.12)';g.lineWidth=1.5;
  g.beginPath();
  g.moveTo(sx+16,sy+9);g.lineTo(sx+sw-16,sy+9);
  g.lineTo(sx+sw-11,sy+sh*.71);
  g.lineTo(sx+sw/2,sy+sh-9);
  g.lineTo(sx+11,sy+sh*.71);
  g.closePath();g.stroke();

  // Surface reflection sheen
  g.fillStyle='rgba(255,255,255,.055)';
  g.beginPath();
  g.moveTo(sx+9,sy);g.lineTo(sx+sw*.42,sy);
  g.lineTo(sx+sw*.35,sy+sh*.35);
  g.lineTo(sx+9,sy+sh*.22);
  g.closePath();g.fill();

  // CROSS (thick emblem)
  const crossY=sy+sh*.40;
  g.shadowBlur=16;g.shadowColor='rgba(200,160,30,.6)';
  g.strokeStyle='rgba(200,160,32,.94)';g.lineWidth=4.5;
  g.beginPath();g.moveTo(0,sy+10);g.lineTo(0,sy+sh-10);g.stroke();
  g.beginPath();g.moveTo(sx+11,crossY);g.lineTo(sx+sw-11,crossY);g.stroke();
  g.shadowBlur=0;

  // CENTER BOSS
  const bossR=18;
  const bossG=g.createRadialGradient(-3,-3,0,0,0,bossR);
  bossG.addColorStop(0,'#fff8b0');bossG.addColorStop(.35,'#d4a820');
  bossG.addColorStop(.75,'#8a6010');bossG.addColorStop(1,'#3a2800');
  g.shadowBlur=18;g.shadowColor='rgba(200,160,30,.55)';
  g.fillStyle=bossG;g.beginPath();g.arc(0,crossY,bossR,0,TAU);g.fill();
  g.strokeStyle='#c8a020';g.lineWidth=2.5;g.stroke();g.shadowBlur=0;
  // Boss face decoration
  g.strokeStyle='rgba(100,75,10,.7)';g.lineWidth=1.5;
  g.beginPath();g.arc(0,crossY,bossR*.65,0,TAU);g.stroke();
  g.fillStyle='rgba(255,240,130,.52)';g.beginPath();g.arc(-3.5,crossY-4,5.5,0,TAU);g.fill();

  // Rivets at corners & midpoints
  for(const [rx,ry] of[
    [-24,12],[24,12],[-25,sh*.74],[25,sh*.74],
    [0,5],[0,sh-9],[-22,sh*.42],[22,sh*.42]
  ]){ rivet(rx,sy+ry,4.2); }

  g.restore();
}

// ── SPEAR ─────────────────────────────────────────────────────────────────────
function drawSpear(){
  const p0=JP.rHn, p1=JP.spAe, p2=JP.spBe, p3=JP.spTp;

  // Shaft segment A (hand → spAe)
  drawShaftSeg(p0.x,p0.y,p1.x,p1.y,7,6.5);
  goldBand(p1.x,p1.y, Math.atan2(p2.y-p1.y,p2.x-p1.x), 7, 9, 1);

  // Shaft segment B (spAe → spBe) with 4 gold bands
  drawShaftSeg(p1.x,p1.y,p2.x,p2.y,6.5,6);
  const ub=[.22,.46,.68,.88];
  for(const u of ub){
    goldBand(lp(p1.x,p2.x,u),lp(p1.y,p2.y,u),
      Math.atan2(p2.y-p1.y,p2.x-p1.x), 6.5, 8.5, 1);
  }

  // Pre-tip collar
  goldBand(p2.x,p2.y, Math.atan2(p3.y-p2.y,p3.x-p2.x), 9, 12, 1.05);

  // Tip blade
  drawSpearBlade(p2.x,p2.y,p3.x,p3.y);

  // Butt cap
  const bAng=Math.atan2(p0.y-p1.y,p0.x-p1.x);
  g.save();g.translate(p0.x,p0.y);g.rotate(bAng);
  const bcG=g.createLinearGradient(-6,0,6,18);
  bcG.addColorStop(0,'#c8a020');bcG.addColorStop(.5,'#e8c040');bcG.addColorStop(1,'#8a6010');
  g.fillStyle=bcG;
  g.beginPath();g.moveTo(-6,0);g.lineTo(6,0);g.lineTo(4.5,20);g.lineTo(-4.5,20);g.closePath();
  g.fill();g.restore();
}
function drawShaftSeg(ax,ay,bx,by,wA,wB){
  const dx=bx-ax,dy=by-ay,len=sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len,ny=dx/len;
  // Main shaft fill
  const sG=g.createLinearGradient(ax+nx*wA,ay+ny*wA,ax-nx*wA,ay-ny*wA);
  sG.addColorStop(0,'#1c1c1e');sG.addColorStop(.12,'#d0d0d4');

function drawSpearBlade(bx,by,tx,ty){
  const dx=tx-bx,dy=ty-by,len=sqrt(dx*dx+dy*dy)||1;
  const bladeLen=68; // very long sharp blade
  const ang=Math.atan2(dy,dx);
  g.save();g.translate(bx,by);g.rotate(ang);

  // Blade body (triangle shape pointing in +X direction at rot=0)
  const bG=g.createLinearGradient(0,-18,0,18);
  bG.addColorStop(0,'#7a90a4');bG.addColorStop(.3,'#d8e8f0');
  bG.addColorStop(.6,'#eef4ff');bG.addColorStop(1,'#7a90a4');
  g.shadowBlur=20;g.shadowColor='rgba(180,210,255,.85)';
  g.fillStyle=bG;
  g.beginPath();
  g.moveTo(bladeLen,0);  // tip
  g.lineTo(0,18);        // base right
  g.lineTo(0,-18);       // base left
  g.closePath();g.fill();

  // Blade edge glow
  g.shadowColor='rgba(200,225,255,.95)';g.shadowBlur=28;
  g.strokeStyle='rgba(210,235,255,.80)';g.lineWidth=2.8;
  g.beginPath();g.moveTo(0,0);g.lineTo(bladeLen,0);g.stroke();
  g.shadowBlur=0;

  // Blade face highlight (left facet)
  g.fillStyle='rgba(255,255,255,.62)';
  g.beginPath();g.moveTo(bladeLen,0);g.lineTo(0,-18);g.lineTo(0,-4);g.closePath();g.fill();

  // Blade fuller (central groove)
  g.strokeStyle='rgba(100,130,160,.45)';g.lineWidth=3;
  g.beginPath();g.moveTo(bladeLen*.1,0);g.lineTo(bladeLen*.85,0);g.stroke();

  // Blood groove highlight
  g.strokeStyle='rgba(255,255,255,.18)';g.lineWidth=1;
  g.beginPath();g.moveTo(bladeLen*.1,1);g.lineTo(bladeLen*.85,1);g.stroke();

  // Serrated edge (subtle notches)
  g.strokeStyle='rgba(150,180,210,.25)';g.lineWidth=1.2;
  for(let i=0;i<6;i++){
    const px=bladeLen*.15+i*(bladeLen*.12);
    g.beginPath();g.moveTo(px,14);g.lineTo(px+5,18);g.stroke();
  }
  g.restore();
}

// ── HELMET ────────────────────────────────────────────────────────────────────
function drawHelmet(){
  const nk=JP.nk;
  const spH=JP.spH;
  const baseAng=Math.atan2(nk.y-spH.y,nk.x-spH.x)+PI/2;
  const hcx=nk.x,hcy=nk.y-5;
  const F=FACING;
  g.save();g.translate(hcx,hcy);g.rotate(baseAng);

  // ── NECK GUARD ──
  const ngG=g.createLinearGradient(-14,0,14,0);
  ngG.addColorStop(0,'#181818');ngG.addColorStop(.4,'#5c5c60');ngG.addColorStop(1,'#181818');
  rrect(-14,-3,28,24,5);g.fillStyle=ngG;g.fill();
  g.strokeStyle='#464648';g.lineWidth=2;g.stroke();
  // Neck guard rings
  for(let i=0;i<5;i++){
    g.strokeStyle=`rgba(200,160,32,${.42-i*.07})`;g.lineWidth=1.1;
    g.beginPath();g.moveTo(-14,-2+i*5);g.lineTo(14,-2+i*5);g.stroke();
  }

  // ── DOME ──
  const domG=g.createLinearGradient(-36,-82,36,6);
  domG.addColorStop(0,'#1c1c20');domG.addColorStop(.06,'#727278');
  domG.addColorStop(.24,'#c0c0c6');domG.addColorStop(.50,'#909096');
  domG.addColorStop(.74,'#606066');domG.addColorStop(.94,'#383840');
  domG.addColorStop(1,'#1c1c20');
  g.fillStyle=domG;
  g.beginPath();
  g.moveTo(-36,6);
  g.bezierCurveTo(-40,-86,-40,-86,-20,-96);
  g.lineTo(0,-102);g.lineTo(20,-96);
  g.bezierCurveTo(40,-86,40,-86,36,6);
  g.closePath();g.fill();

  // Dome surface detail — vertical flutes
  g.strokeStyle='rgba(0,0,0,.38)';g.lineWidth=1.5;
  for(const fx of[-22,-10,0,10,22]){
    g.beginPath();g.moveTo(fx,-8);g.bezierCurveTo(fx,-50,fx*.8,-80,fx*.4,-98);g.stroke();
  }
  g.strokeStyle='rgba(255,255,255,.10)';g.lineWidth=.8;
  for(const fx of[-21,-9,1,11,23]){
    g.beginPath();g.moveTo(fx,-8);g.bezierCurveTo(fx,-50,fx*.8,-80,fx*.4,-98);g.stroke();
  }

  // Gold border
  g.shadowBlur=12;g.shadowColor='rgba(200,160,30,.4)';
  g.strokeStyle='#c8a020';g.lineWidth=3.2;
  g.beginPath();
  g.moveTo(-36,6);g.bezierCurveTo(-40,-86,-40,-86,-20,-96);
  g.lineTo(0,-102);g.lineTo(20,-96);
  g.bezierCurveTo(40,-86,40,-86,36,6);g.closePath();g.stroke();
  g.shadowBlur=0;

  // Brow ridge
  g.strokeStyle='rgba(200,160,32,.75)';g.lineWidth=3;
  g.beginPath();g.moveTo(-36,-40);g.lineTo(36,-40);g.stroke();
  g.strokeStyle='rgba(255,255,255,.15)';g.lineWidth=1;
  g.beginPath();g.moveTo(-35,-41);g.lineTo(35,-41);g.stroke();

  // ── CHEEK GUARDS ──
  for(const s of[-1,1]){
    const cgG=g.createLinearGradient(s*35,0,s*50,0);
    cgG.addColorStop(0,'#505058');cgG.addColorStop(.5,'#404048');cgG.addColorStop(1,'#282830');
    g.fillStyle=cgG;
    g.beginPath();
    g.moveTo(s*36,6);g.lineTo(s*50,12);g.lineTo(s*50,-36);
    g.quadraticCurveTo(s*48,-42,s*36,-40);
    g.closePath();g.fill();
    g.strokeStyle='#c8a020';g.lineWidth=2.2;g.stroke();
    // Guard rivets & lines
    for(let r=0;r<6;r++){
      g.strokeStyle=`rgba(200,160,32,${.48-r*.07})`;g.lineWidth=1;
      g.beginPath();g.moveTo(s*36,-5-r*9);g.lineTo(s*50,-5-r*9);g.stroke();
    }
    rivet(s*44,8,2.8);rivet(s*44,-32,2.8);
  }

  // ── T-VISOR ── (breathing glow)
  const vt=T*2.1;
  const vPulse=sin(vt)*.5+.5;
  const vR=round(185+65*vPulse),vG=round(28+20*vPulse);
  const vc=`rgba(${vR},${vG},0,.97)`;
  g.fillStyle=vc;g.shadowBlur=22;g.shadowColor=vc;
  g.fillRect(-29,-61,58,10);   // horizontal bar
  g.fillRect(-6.5,-75,13,42);  // vertical bar

  // Visor inner glow gradient
  const visG=g.createLinearGradient(-29,-61,29,-51);
  visG.addColorStop(0,'rgba(255,80,0,0)');
  visG.addColorStop(.5,`rgba(255,${round(160+60*vPulse)},0,1)`);
  visG.addColorStop(1,'rgba(255,80,0,0)');
  g.fillStyle=visG;g.fillRect(-29,-61,58,10);

  // Visor slot (dark interior)
  g.fillStyle='rgba(0,0,0,.82)';g.fillRect(-27,-59,54,7);
  g.fillRect(-5,-73,10,38);
  g.shadowBlur=0;

  // ── RED PLUME ── (32 strands)
  for(let p=0;p<32;p++){
    const baseLen=38+sin(p/31*PI)*34;
    const flutter=sin(T*1.55+p*.34)*.14+sin(T*2.8+p*.18)*.06;
    const spread=((p/31)-.5)*PI*1.18+flutter;
    const ang=-PI*.5+spread;
    const px=cos(ang)*baseLen, py=-100+sin(ang)*baseLen;
    const pHue=round((p/31)*22);
    const pA=.55+(p/31)*.45;
    const pW=3.8-p*.08;
    g.strokeStyle=`hsla(${pHue},100%,52%,${pA})`;
    g.lineWidth=max(.5,pW);
    g.shadowBlur=9;g.shadowColor=`hsla(${pHue},100%,45%,.65)`;
    g.lineCap='round';
    g.beginPath();g.moveTo(0,-100);
    // Slight wave on each strand
    const cpx=cos(ang+.3)*baseLen*.35,cpy=-100+sin(ang+.3)*baseLen*.35;
    g.quadraticCurveTo(cpx,cpy,px,py);
    g.stroke();
  }
  g.shadowBlur=0;g.lineCap='butt';

  // Plume base jewel
  const pjG=g.createRadialGradient(-1,-2,0,0,0,7);
  pjG.addColorStop(0,'#fff');pjG.addColorStop(.4,'#ff2200');pjG.addColorStop(1,'rgba(120,0,0,0)');
  g.shadowBlur=14;g.shadowColor='rgba(255,40,0,.8)';
  g.fillStyle=pjG;g.beginPath();g.arc(0,-100,7,0,TAU);g.fill();
  g.shadowBlur=0;

  g.restore();
}

function updateKnight(){
  KN.phaseT+=dt;KN.stateT+=dt;
  FACING=KN.facing;
  if(KN.state==='idle')  updateIdle();
  else if(KN.state==='dash')   updateDash();
  else if(KN.state==='sweep')  updateSweep();
  else if(KN.state==='thrust') updateThrust();
  else if(KN.state==='meteor') updateMeteor();
  else if(KN.state==='heal')   updateHeal();
  checkMeteorLand();
  const pelX=KN.x, pelY=KN.y-62;
  runFK(pelX,pelY,KN.lean,KN.squat);
}

function renderGroundFX(){

    g.strokeStyle=`rgba(10,5,0,${a})`;g.lineWidth=c.w*(c.branch?.55:1)*a;
    g.beginPath();g.moveTo(c.pts[0].x,c.pts[0].y);
    for(let p=1;p<c.pts.length;p++)g.lineTo(c.pts[p].x,c.pts[p].y);

    const w=WAVES[i];w.life-=dt;
    if(w.life<=0){WAVES.splice(i,1);continue;}
    const a=w.life/w.ml;w.r=w.maxR*(1-a);
    g.strokeStyle=w.col+(a*.88)+')';g.lineWidth=6*a;
    g.shadowBlur=28;g.shadowColor=w.col+'.9)';

    WARN.life-=dt;

      const a=abs(sin(T*12.5))*(WARN.life/WARN.ml);
      const pulse=sin(T*8)*.3+.7;
      g.strokeStyle=`rgba(255,0,0,${a*pulse})`;g.lineWidth=5.5;
      g.shadowBlur=30;g.shadowColor='rgba(255,0,0,.9)';
      g.setLineDash([15,8]);g.beginPath();g.arc(WARN.x,WARN.y,WARN.r,0,TAU);g.stroke();
      g.setLineDash([]);
      g.strokeStyle=`rgba(255,60,0,${a*.75})`;g.lineWidth=2.5;
      g.beginPath();g.moveTo(WARN.x-WARN.r,WARN.y);g.lineTo(WARN.x+WARN.r,WARN.y);g.stroke();
      g.beginPath();g.moveTo(WARN.x,WARN.y-WARN.r);g.lineTo(WARN.x,WARN.y+WARN.r);g.stroke();
      // Targeting diamonds
      for(let i=0;i<4;i++){
        const da=(i/4)*TAU+T*1.5;
        const dx=cos(da)*WARN.r,dy=sin(da)*WARN.r;
        g.save();g.translate(WARN.x+dx,WARN.y+dy);g.rotate(da+PI/4);
        g.fillStyle=`rgba(255,40,0,${a*.8})`;
        g.beginPath();g.moveTo(0,-6);g.lineTo(6,0);g.lineTo(0,6);g.lineTo(-6,0);g.closePath();g.fill();
        g.restore();
      }
      g.shadowBlur=0;
    }
  }
}

function renderHealCircle(){
  if(!HEAL_CIRCLE||!HEAL_CIRCLE.active)return;
  if(HEAL_CIRCLE.life<=0){HEAL_CIRCLE.active=false;return;}
  const cx=HEAL_CIRCLE.x,cy=HEAL_CIRCLE.y;
  const a=min(1,HEAL_CIRCLE.life/500);
  const ang=HEAL_CIRCLE.angle;
  const r1=66,r2=98,r3=126;
  g.save();g.globalAlpha=a;

  // Outer + inner rings
  g.shadowBlur=40;g.shadowColor='rgba(0,255,80,.92)';
  g.strokeStyle=`rgba(0,255,100,${a*.84})`;g.lineWidth=4;
  g.beginPath();g.arc(cx,cy,r3,0,TAU);g.stroke();
  g.beginPath();g.arc(cx,cy,r1,0,TAU);g.stroke();
  // Mid dashed ring
  g.setLineDash([10,7]);
  g.strokeStyle=`rgba(0,220,80,${a*.56})`;g.lineWidth=2.2;
  g.beginPath();g.arc(cx,cy,(r1+r3)/2,0,TAU);g.stroke();
  g.setLineDash([]);

  // Outer rotating rune glyphs (18 glyphs)
  g.save();g.translate(cx,cy);g.rotate(ang*.54);
  for(let i=0;i<18;i++){
    const ra=(i/18)*TAU;
    g.save();g.translate(cos(ra)*r2,sin(ra)*r2);g.rotate(ra+ang);
    g.strokeStyle=`rgba(0,245,105,${a*.96})`;g.lineWidth=2.4;
    g.shadowBlur=14;g.shadowColor='rgba(0,255,80,.88)';
    g.beginPath();g.moveTo(-7,0);g.lineTo(7,0);g.stroke();
    g.beginPath();g.moveTo(0,-10);g.lineTo(0,10);g.stroke();
    g.beginPath();g.moveTo(-6,-6);g.lineTo(6,6);g.stroke();
    g.beginPath();g.moveTo(-6,6);g.lineTo(6,-6);g.stroke();
    g.restore();
  }
  g.restore();

  // Star of David (double triangle hexagram)
  g.save();g.translate(cx,cy);g.rotate(-ang*.84);
  g.strokeStyle=`rgba(0,255,80,${a*.92})`;g.lineWidth=2.8;
  g.shadowBlur=22;g.shadowColor='rgba(0,255,100,.94)';
  for(let i=0;i<6;i++){
    const a1=(i/6)*TAU,a2=((i+2)/6)*TAU;
    g.beginPath();g.moveTo(cos(a1)*r1,sin(a1)*r1);
    g.lineTo(cos(a2)*r1,sin(a2)*r1);g.stroke();
  }
  g.restore();

  // Pentagon (inner)
  g.save();g.translate(cx,cy);g.rotate(ang*1.34);
  g.strokeStyle=`rgba(160,255,160,${a*.74})`;g.lineWidth=2.4;
  g.beginPath();
  for(let i=0;i<5;i++){
    const a2=(i/5)*TAU-PI/2;
    i===0?g.moveTo(cos(a2)*r1*.52,sin(a2)*r1*.52):g.lineTo(cos(a2)*r1*.52,sin(a2)*r1*.52);
  }
  g.closePath();g.stroke();
  g.restore();

  // Radial spokes (36)
  for(let i=0;i<36;i++){
    const a2=(i/36)*TAU+ang*.38;
    const spokeA=a*(.20+.18*abs(sin(a2*3+T*4.2)));
    g.strokeStyle=`rgba(0,255,80,${spokeA})`;g.lineWidth=1;
    g.beginPath();
    g.moveTo(cx+cos(a2)*r1,cy+sin(a2)*r1);
    g.lineTo(cx+cos(a2)*r3,cy+sin(a2)*r3);g.stroke();
  }

  // Center radial fill
  const cg=g.createRadialGradient(cx,cy,0,cx,cy,r1);
  cg.addColorStop(0,`rgba(0,255,80,${a*.28})`);cg.addColorStop(.5,`rgba(0,200,60,${a*.10})`);
  cg.addColorStop(1,'rgba(0,255,80,0)');
  g.fillStyle=cg;g.beginPath();g.arc(cx,cy,r1,0,TAU);g.fill();

  g.shadowBlur=0;g.restore();
}

function renderGhosts(){

      if(!p1||!p2)return;

    // Head
    g.fillStyle=`rgba(55,185,255,${a*.92})`;
    g.beginPath();g.arc(D.head.x,D.head.y,24,0,TAU);g.fill();
    // Arms
    gl(D.chest,D.lElbow,13);gl(D.lElbow,D.lWrist,11);
    gl(D.chest,D.rElbow,13);gl(D.rElbow,D.rWrist,11);
    // Spear line
    gl(D.rWrist,D.spearMid,9);gl(D.spearMid,D.spearTip,7);
    // Legs
    gl(D.pelvis,D.lKnee,15);gl(D.lKnee,D.lAnkle,13);gl(D.lAnkle,D.lToe,10);
    gl(D.pelvis,D.rKnee,15);gl(D.rKnee,D.rAnkle,13);gl(D.rAnkle,D.rToe,10);
    // Shield silhouette blob
    if(D.lWrist){
      g.fillStyle=`rgba(55,185,255,${a*.88})`;
      g.beginPath();g.ellipse(D.lWrist.x,D.lWrist.y,26,36,0,0,TAU);g.fill();
    }
    g.shadowBlur=0;g.lineCap='butt';g.restore();
  }
  g.globalAlpha=1;
}

function renderParticles(){
  for(let i=0;i<POOL_SIZE;i++){
    const p=pool[i];if(!p.active)continue;
    p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);p.vy+=p.grav*(dt/16);
    p.vx*=.992;p.vy*=.992;
    p.life-=dt;
    if(p.life<=0){p.active=false;continue;}
    const fa=p.life/p.ml;
    const rad=max(.2,p.r*p.shrink*(fa*.7+.3));
    g.globalAlpha=fa*p.alpha;
    if(p.glow){g.shadowBlur=12;g.shadowColor=p.glow;}
    g.fillStyle=p.col;
    g.beginPath();g.arc(p.x,p.y,rad,0,TAU);g.fill();
    g.shadowBlur=0;
  }
  g.globalAlpha=1;
}

function renderOrbs(){
  for(let i=ORBS.length-1;i>=0;i--){
    const o=ORBS[i];
    o.x+=(o.vx+sin(T*3.2+i+o.phase)*.55)*(dt/16);
    o.y+=o.vy*(dt/16);
    o.vy*=.996;
    o.life-=dt;
    if(o.life<=0){ORBS.splice(i,1);continue;}
    const fa=o.life/o.ml;
    const pulse=sin(T*4+o.phase)*.2+.8;
    g.globalAlpha=fa*pulse;
    // Orb glow aura
    const og=g.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*3);
    og.addColorStop(0,`hsla(${o.hue},100%,70%,.7)`);
    og.addColorStop(.6,`hsla(${o.hue},90%,55%,.2)`);
    og.addColorStop(1,'rgba(0,200,60,0)');
    g.fillStyle=og;g.beginPath();g.arc(o.x,o.y,o.r*3,0,TAU);g.fill();
    // Orb core
    g.shadowBlur=18;g.shadowColor=`hsla(${o.hue},100%,65%,.9)`;
    g.fillStyle=`hsla(${o.hue},100%,72%,1)`;
    g.beginPath();g.arc(o.x,o.y,o.r,0,TAU);g.fill();
    g.shadowBlur=0;
  }
  g.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════════════════
let _inited=false;
function frame(now){
  requestAnimationFrame(frame);
  dt=min(50,now-_lastT);_lastT=now;T+=dt/1000;
  if(!_inited){KN.x=W/2;KN.y=GY;_inited=true;}

  updateCD();
  updateKnight();
  updateShake();

  g.save();
  g.translate(round(SHK.x),round(SHK.y));

  // 1. Background
  drawBackground();
  drawGround();

  // 2. Ground FX (cracks, waves, warning) — below knight
  renderGroundFX();

  // 3. Heal magic circle (below knight)
  renderHealCircle();

  // 4. Sweep arc
  renderSweepArc();

  // 5. Ghost afterimages
  renderGhosts();

  // 6. Falling meteor
  renderMeteor();

  // 7. Knight
  if(KN.visible&&KN.y>-200){drawKnight();}

  // 8. Thrust impact flash
  renderThrustFlash();

  // 9. Particles on top
  renderParticles();

  // 10. Heal orbs
  renderOrbs();

  g.restore();
}
requestAnimationFrame(frame);
</script>
