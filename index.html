<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ Blade &amp; Spell</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}

#loading{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center, #150025 0%, #050010 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;
}
#loading h1{font-size:clamp(1.8rem,5vw,3rem);letter-spacing:.25em;text-transform:uppercase;
  color:#c8a0ff;margin-bottom:.5rem;text-shadow:0 0 40px #8040ff,0 0 80px #4020ff;}
#loading .sub{color:#666;font-size:.8rem;letter-spacing:.2em;margin-bottom:2.5rem;}
#bar-wrap{width:min(300px,70vw);height:3px;background:#1a1a2a;border-radius:2px;overflow:hidden;}
#bar{height:100%;background:linear-gradient(90deg,#5010ff,#c060ff,#ff80ff);width:0%;
  transition:width .25s ease;border-radius:2px;box-shadow:0 0 8px #8040ff;}
#load-status{margin-top:1.2rem;color:#555;font-size:.72rem;letter-spacing:.12em;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10;padding:14px 16px;
  display:flex;justify-content:space-between;align-items:flex-start;}
.stat-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.stat-label{font-size:.65rem;font-weight:700;letter-spacing:.1em;width:20px;}
.hp-lbl{color:#ff5555;}
.mp-lbl{color:#5599ff;}
.stat-track{height:5px;border-radius:3px;overflow:hidden;}
.hp-track{width:clamp(100px,20vw,180px);background:#2a0808;}
.mp-track{width:clamp(80px,15vw,140px);background:#080828;}
.hp-fill{height:100%;background:linear-gradient(90deg,#cc2222,#ff7070);border-radius:3px;transition:width .3s;}
.mp-fill{height:100%;background:linear-gradient(90deg,#2255cc,#7088ff);border-radius:3px;transition:width .3s;}

/* Skill icons */
#skills{position:fixed;bottom:clamp(140px,22vh,170px);left:50%;transform:translateX(-50%);
  display:flex;gap:8px;pointer-events:none;z-index:10;}
.skill{width:38px;height:38px;border:1px solid rgba(255,255,255,.2);border-radius:6px;
  background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  font-size:.9rem;position:relative;}
.skill-key{position:absolute;bottom:2px;right:3px;font-size:.45rem;color:#666;}
.skill-cd{position:absolute;inset:0;background:rgba(0,0,0,.65);border-radius:5px;
  display:none;align-items:center;justify-content:center;color:#888;font-size:.6rem;}

/* Combo */
#combo{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);
  pointer-events:none;z-index:20;text-align:center;transition:transform .2s,opacity .3s;}
#combo-main{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;letter-spacing:.15em;
  text-shadow:0 0 20px #ff8000,0 0 50px #ff4000;color:#fff;}
#combo-sub{font-size:.9rem;color:#ffaa00;letter-spacing:.3em;margin-top:.2rem;}

/* Controls hint */
#hint{position:fixed;bottom:16px;right:16px;color:#333;font-size:.65rem;
  line-height:1.9;text-align:right;pointer-events:none;z-index:10;}

/* ── Mobile ── */
#joystick-zone{position:fixed;bottom:28px;left:22px;width:120px;height:120px;
  pointer-events:all;z-index:15;display:none;}
#joy-base{width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.12);position:relative;}
#joy-knob{width:46px;height:46px;border-radius:50%;
  background:rgba(180,130,255,.45);border:1.5px solid rgba(180,130,255,.7);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 12px rgba(140,80,255,.5);}

#btns{position:fixed;bottom:28px;right:18px;display:none;flex-direction:column;
  gap:10px;align-items:flex-end;z-index:15;}
.btn-row{display:flex;gap:10px;}
.gbtn{width:52px;height:52px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.5);color:#fff;font-size:1.15rem;cursor:pointer;
  pointer-events:all;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  transition:background .12s,transform .08s;box-shadow:0 3px 12px rgba(0,0,0,.4);}
.gbtn:active,.gbtn.pressed{transform:scale(.88);}
#gb-jump{background:rgba(60,130,255,.35);border-color:rgba(60,130,255,.55);}
#gb-atk1{background:rgba(255,70,70,.3); border-color:rgba(255,70,70,.5);}
#gb-atk2{background:rgba(255,140,0,.3); border-color:rgba(255,140,0,.5);}
#gb-spell{background:rgba(60,60,255,.35);border-color:rgba(60,60,255,.6);}
#gb-roll{background:rgba(60,200,60,.3); border-color:rgba(60,200,60,.5);}

@media (hover:none) and (pointer:coarse){
  #joystick-zone,#btns{display:flex;}
  #hint,#skills{display:none;}
}
</style>
</head>
<body>

<div id="loading">
  <h1>⚔️ Blade &amp; Spell</h1>
  <p class="sub">LOADING WORLD</p>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="load-status">Initializing…</div>
</div>

<div id="hud">
  <div>
    <div class="stat-row"><span class="stat-label hp-lbl">HP</span>
      <div class="stat-track hp-track"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div></div>
    <div class="stat-row"><span class="stat-label mp-lbl">MP</span>
      <div class="stat-track mp-track"><div class="mp-fill" id="mp-fill" style="width:100%"></div></div></div>
  </div>
</div>

<div id="combo"><div id="combo-main"></div><div id="combo-sub">COMBO!</div></div>

<div id="skills">
  <div class="skill">⚔️<span class="skill-key">J</span></div>
  <div class="skill">🗡️<span class="skill-key">K</span></div>
  <div class="skill">✨<span class="skill-key">L</span></div>
  <div class="skill">🔄<span class="skill-key">R</span></div>
</div>

<div id="hint">
  WASD 移動 &nbsp;|&nbsp; 滑鼠拖曳 旋轉視角<br>
  空白鍵 跳躍 &nbsp;|&nbsp; Shift 加速衝刺<br>
  J / K 攻擊 &nbsp;|&nbsp; L 魔法激光<br>
  R / Ctrl 翻滾迴避
</div>

<div id="joystick-zone"><div id="joy-base"><div id="joy-knob"></div></div></div>

<div id="btns">
  <div class="btn-row">
    <button class="gbtn" id="gb-spell">✨</button>
    <button class="gbtn" id="gb-jump">↑</button>
  </div>
  <div class="btn-row">
    <button class="gbtn" id="gb-roll">🔄</button>
    <button class="gbtn" id="gb-atk2">🗡️</button>
    <button class="gbtn" id="gb-atk1">⚔️</button>
  </div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── Renderer ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08000f);
scene.fog = new THREE.FogExp2(0x08000f, 0.028);

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.05, 250);

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x3a2060, 2.5));
const sun = new THREE.DirectionalLight(0xffe8ff, 2.2);
sun.position.set(6,12,4); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{near:.5,far:60,left:-18,right:18,top:18,bottom:-18});
scene.add(sun);
const rim = new THREE.DirectionalLight(0x4050ff,1.2);
rim.position.set(-4,6,-6); scene.add(rim);

// ── Ground & Scene ────────────────────────────────────────────────────────────
{
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100,1,1),
    new THREE.MeshStandardMaterial({color:0x180826,roughness:.95,metalness:.05})
  );
  ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

  // Magic circle
  const addCircle = (r,w,col,alpha=.35)=>{
    const m=new THREE.Mesh(new THREE.RingGeometry(r-w,r,64),
      new THREE.MeshBasicMaterial({color:col,side:THREE.DoubleSide,transparent:true,opacity:alpha}));
    m.rotation.x=-Math.PI/2; m.position.y=.005; scene.add(m);
  };
  addCircle(3,.04,0x8040ff); addCircle(2.5,.025,0x6030cc,.2); addCircle(4,.02,0x4020aa,.15);

  // Rune dots
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2, R=3;
    const d=new THREE.Mesh(new THREE.CircleGeometry(.055,8),
      new THREE.MeshBasicMaterial({color:0xff90ff,transparent:true,opacity:.8,side:THREE.DoubleSide}));
    d.position.set(Math.cos(a)*R,.008,Math.sin(a)*R);
    d.rotation.x=-Math.PI/2; scene.add(d);
  }

  // Pillars
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2, R=14;
    const p=new THREE.Mesh(new THREE.CylinderGeometry(.28,.38,7,8),
      new THREE.MeshStandardMaterial({color:0x221530,roughness:.85}));
    p.position.set(Math.cos(a)*R,3.5,Math.sin(a)*R);
    p.castShadow=true; scene.add(p);
    const cap=new THREE.Mesh(new THREE.CylinderGeometry(.35,.28,.3,8),
      new THREE.MeshStandardMaterial({color:0x331a44,roughness:.7}));
    cap.position.set(Math.cos(a)*R,7.15,Math.sin(a)*R); scene.add(cap);
    const orb=new THREE.Mesh(new THREE.SphereGeometry(.22,10,10),
      new THREE.MeshBasicMaterial({color:0x9050ff}));
    orb.position.set(Math.cos(a)*R,7.65,Math.sin(a)*R); scene.add(orb);
    const pl=new THREE.PointLight(0x8040ff,2.5,9);
    pl.position.copy(orb.position); scene.add(pl);
  }

  // Floating particles in scene
  const pts=new THREE.BufferGeometry();
  const ppos=new Float32Array(300);
  for(let i=0;i<100;i++){
    ppos[i*3]=(Math.random()-.5)*30;
    ppos[i*3+1]=Math.random()*6+.5;
    ppos[i*3+2]=(Math.random()-.5)*30;
  }
  pts.setAttribute('position',new THREE.BufferAttribute(ppos,3));
  scene.add(new THREE.Points(pts,new THREE.PointsMaterial({color:0x9060ff,size:.06,transparent:true,opacity:.6,blending:THREE.AdditiveBlending,depthWrite:false})));
  scene._ambientPts = {geo:pts, ppos};
}

// ── Burning Sword ─────────────────────────────────────────────────────────────
function makeSword(){
  const g=new THREE.Group();
  // Blade
  const blade=new THREE.Mesh(new THREE.BoxGeometry(.045,1.1,.007),
    new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xff6800,emissiveIntensity:.9,metalness:.95,roughness:.08}));
  blade.position.y=.65; g.add(blade);
  // Edge glow strip
  const glow=new THREE.Mesh(new THREE.BoxGeometry(.012,1.05,.001),
    new THREE.MeshBasicMaterial({color:0xff9900,transparent:true,opacity:.8,blending:THREE.AdditiveBlending,depthWrite:false}));
  glow.position.set(.025,.65,.005); g.add(glow);
  // Guard
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.28,.038,.038),
    new THREE.MeshStandardMaterial({color:0xd4a017,metalness:.95,roughness:.15})),{position:{set:(x,y,z)=>{}}});
  const guard=new THREE.Mesh(new THREE.BoxGeometry(.28,.038,.038),
    new THREE.MeshStandardMaterial({color:0xd4a017,metalness:.95,roughness:.15}));
  guard.position.y=.07; g.add(guard);
  // Handle
  const handle=new THREE.Mesh(new THREE.CylinderGeometry(.022,.022,.28,8),
    new THREE.MeshStandardMaterial({color:0x3a1800,roughness:.85}));
  handle.position.y=-.07; g.add(handle);
  // Pommel
  const pommel=new THREE.Mesh(new THREE.SphereGeometry(.038,8,8),
    new THREE.MeshStandardMaterial({color:0xd4a017,metalness:.95,roughness:.15}));
  pommel.position.y=-.22; g.add(pommel);
  // Flame light
  const fl=new THREE.PointLight(0xff6600,4,1.8);
  fl.position.y=1; g.add(fl);
  g._flameLight=fl;
  // Fire particles
  const N=50, fp=new Float32Array(N*3);
  const fd=Array.from({length:N},(_,i)=>({t:Math.random(),s:.6+Math.random()*1.8,ox:(Math.random()-.5)*.035,oz:(Math.random()-.5)*.006,by:.1+Math.random()*.9}));
  const fg=new THREE.BufferGeometry();
  fg.setAttribute('position',new THREE.BufferAttribute(fp,3));
  const firePts=new THREE.Points(fg,new THREE.PointsMaterial({color:0xff8800,size:.038,transparent:true,opacity:.9,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
  g.add(firePts); g._firePts=firePts; g._fd=fd;
  g.visible=false; scene.add(g); return g;
}

// ── Laser Beam ────────────────────────────────────────────────────────────────
function makeLaser(){
  const g=new THREE.Group();
  const LEN=22;
  // Outer glow
  const outer=new THREE.Mesh(new THREE.CylinderGeometry(.045,.045,LEN,8),
    new THREE.MeshBasicMaterial({color:0x40ddff,transparent:true,opacity:.55,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide}));
  outer.rotation.x=Math.PI/2; outer.position.z=-LEN/2; g.add(outer);
  // Core
  const core=new THREE.Mesh(new THREE.CylinderGeometry(.012,.012,LEN,6),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.95,blending:THREE.AdditiveBlending,depthWrite:false}));
  core.rotation.x=Math.PI/2; core.position.z=-LEN/2; g.add(core);
  // Impact
  const imp=new THREE.Mesh(new THREE.SphereGeometry(.35,8,8),
    new THREE.MeshBasicMaterial({color:0x60eeff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false}));
  imp.position.z=-LEN; g.add(imp);
  // Light
  const ll=new THREE.PointLight(0x00ddff,0,10); g.add(ll);
  g._outer=outer; g._core=core; g._imp=imp; g._ll=ll;
  g.visible=false; scene.add(g); return g;
}

// ── Assets ────────────────────────────────────────────────────────────────────
let character, mixer, actions={}, sword, laser;
let rHandBone=null, lHandBone=null;
const clock=new THREE.Clock();
const loader=new THREE.GLTFLoader?.() || (() => {throw new Error('No loader');})();
// Re-import properly:
let gltfLoader;

const ASSETS=[
  'models/character.glb',
  'models/Idle.glb','models/Walking.glb','models/Running.glb','models/Sprint.glb',
  'models/Attack1.glb','models/Attack2.glb','models/CastSpell.glb','models/Roll.glb',
];
const barEl=document.getElementById('bar');
const statusEl=document.getElementById('load-status');
let loaded=0;

async function loadAll(){
  const {GLTFLoader}=await import('three/addons/loaders/GLTFLoader.js');
  gltfLoader=new GLTFLoader();

  function load(url){
    return new Promise((res,rej)=>gltfLoader.load(url,g=>{
      loaded++; barEl.style.width=(loaded/ASSETS.length*100)+'%';
      statusEl.textContent='Loaded: '+url.split('/').pop(); res(g);
    },undefined,rej));
  }

  const [charG,idleG,walkG,runG,sprintG,atk1G,atk2G,spellG,rollG]=await Promise.all(ASSETS.map(load));

  character=charG.scene;
  character.scale.setScalar(.01);
  character.traverse(o=>{
    if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}
    if(o.isBone){
      if(o.name==='mixamorig7RightHand') rHandBone=o;
      if(o.name==='mixamorig7LeftHand')  lHandBone=o;
    }
  });
  scene.add(character);

  sword=makeSword(); laser=makeLaser();

  mixer=new THREE.AnimationMixer(character);

  const clips={
    idle:  idleG.animations[0],
    walk:  walkG.animations[0],
    run:   runG.animations[0],
    sprint:sprintG.animations[0],
    atk1:  atk1G.animations[0],
    atk2:  atk2G.animations[0],
    spell: spellG.animations[0],
    roll:  rollG.animations[0],
  };

  for(const[n,clip]of Object.entries(clips)){
    if(!clip){console.warn('Missing clip:',n);continue;}
    clip.name=n;
    actions[n]=mixer.clipAction(clip);
  }
  // One-shot animations
  for(const n of['atk1','atk2','spell','roll']){
    if(actions[n]){actions[n].setLoop(THREE.LoopOnce);actions[n].clampWhenFinished=true;}
  }

  // Finished event
  mixer.addEventListener('finished',e=>{
    const n=e.action._clip.name;
    if(n==='atk1'||n==='atk2'){isAttacking=false;}
    if(n==='spell'){isCasting=false;}
    if(n==='roll'){isRolling=false;charVelY=0;}
  });

  barEl.style.width='100%';
  statusEl.textContent='Ready!';
  setTimeout(()=>{document.getElementById('loading').style.display='none';},350);

  actions.idle?.play();
  currentAnim='idle';
}

loadAll().catch(e=>{statusEl.textContent='ERROR: '+e.message;console.error(e);});

// ── State ─────────────────────────────────────────────────────────────────────
const keys={};
const joy={x:0,y:0};
let yaw=0,pitch=.32,camDist=5.5;
const camPos=new THREE.Vector3(), camTarget=new THREE.Vector3();
let charVelY=0, charY=0;
const GRAVITY=-22, JUMP_V=9.5;
let currentAnim='idle';
let isAttacking=false, isCasting=false, isRolling=false;
let hp=100, mp=100, mpRegen=0;
let comboCount=0, comboTimer=0;
let spellActive=false, spellLife=0;
let rollDir=new THREE.Vector3();

// Mouse / touch camera
let drag=false, lmx=0,lmy=0;
document.addEventListener('mousedown',e=>{drag=true;lmx=e.clientX;lmy=e.clientY;});
document.addEventListener('mouseup',()=>drag=false);
document.addEventListener('mousemove',e=>{
  if(!drag)return;
  yaw-=(e.clientX-lmx)*.005; pitch-=(e.clientY-lmy)*.004;
  pitch=Math.max(.05,Math.min(.82,pitch));
  lmx=e.clientX;lmy=e.clientY;
});
document.addEventListener('wheel',e=>{camDist=Math.max(2,Math.min(10,camDist+e.deltaY*.008));},{passive:true});
document.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault?.();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// Joystick
const jBase=document.getElementById('joy-base');
const jKnob=document.getElementById('joy-knob');
const JR=35; let jActive=false,jCX=0,jCY=0;
jBase.addEventListener('touchstart',e=>{
  e.preventDefault(); jActive=true;
  const r=jBase.getBoundingClientRect();
  jCX=r.left+r.width/2; jCY=r.top+r.height/2;
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(!jActive)return; e.preventDefault();
  let dx=e.touches[0].clientX-jCX, dy=e.touches[0].clientY-jCY;
  const d=Math.hypot(dx,dy); if(d>JR){dx*=JR/d;dy*=JR/d;}
  jKnob.style.left=(60+dx)+'px'; jKnob.style.top=(60+dy)+'px';
  joy.x=dx/JR; joy.y=dy/JR;
},{passive:false});
document.addEventListener('touchend',e=>{
  if(!e.touches.length){jActive=false; jKnob.style.left='37px'; jKnob.style.top='37px'; joy.x=0;joy.y=0;}
});

// Camera touch (center area)
let cTouch=null;
document.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    const cx=t.clientX/innerWidth;
    if(cx>.3&&cx<.7) cTouch={id:t.identifier,x:t.clientX,y:t.clientY};
  }
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!cTouch)return;
  for(const t of e.changedTouches){
    if(t.identifier!==cTouch.id)continue;
    yaw-=(t.clientX-cTouch.x)*.006; pitch-=(t.clientY-cTouch.y)*.004;
    pitch=Math.max(.05,Math.min(.82,pitch));
    cTouch.x=t.clientX; cTouch.y=t.clientY;
  }
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!cTouch)return;
  for(const t of e.changedTouches) if(t.identifier===cTouch.id) cTouch=null;
});

// Mobile buttons
function mbtn(id,code){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();
    keys[code]=true; el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',e=>{keys[code]=false; el.classList.remove('pressed');});
}
mbtn('gb-jump','Space');
mbtn('gb-atk1','KeyJ');
mbtn('gb-atk2','KeyK');
mbtn('gb-spell','KeyL');
mbtn('gb-roll','KeyR');

// ── Animation FSM ─────────────────────────────────────────────────────────────
function fadeTo(name,dur=.15){
  if(currentAnim===name||!actions[name])return;
  actions[currentAnim]?.fadeOut(dur);
  actions[name].reset().fadeIn(dur).play();
  currentAnim=name;
}

function oneShot(name,blend=.12){
  if(!actions[name])return;
  actions[currentAnim]?.fadeOut(blend);
  actions[name].reset().fadeIn(blend).play();
  currentAnim=name;
}

// ── Update HUD ────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hp-fill').style.width=hp+'%';
  document.getElementById('mp-fill').style.width=mp+'%';
}

// ── Combo Display ─────────────────────────────────────────────────────────────
let comboTimeout=null;
function showCombo(n){
  const el=document.getElementById('combo');
  const main=document.getElementById('combo-main');
  const colors=['#ffcc00','#ff8800','#ff4400','#ff00aa','#aa00ff'];
  main.textContent='⚔️ '+n+'x COMBO';
  main.style.color=colors[Math.min(n-2,colors.length-1)];
  el.style.transform='translate(-50%,-50%) scale(1)';
  el.style.opacity='1';
  clearTimeout(comboTimeout);
  comboTimeout=setTimeout(()=>{el.style.transform='translate(-50%,-50%) scale(0)';el.style.opacity='0';},900);
}

// ── Roll direction helper ─────────────────────────────────────────────────────
let rollProgress=0, rollStartPos=new THREE.Vector3(), rollEndPos=new THREE.Vector3();

// ── Main Loop ─────────────────────────────────────────────────────────────────
function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),.05);
  if(!character){renderer.render(scene,camera);return;}

  // ── Input ────────────────────────────────────────────────────────────
  let mx=joy.x, mz=joy.y;
  if(keys['KeyA']||keys['ArrowLeft'])  mx-=1;
  if(keys['KeyD']||keys['ArrowRight']) mx+=1;
  if(keys['KeyW']||keys['ArrowUp'])    mz-=1;
  if(keys['KeyS']||keys['ArrowDown'])  mz+=1;
  const moving=Math.hypot(mx,mz)>.05;
  const sprinting=moving&&(keys['ShiftLeft']||keys['ShiftRight']);
  const spd=sprinting?9.5:(moving?(Math.hypot(mx,mz)>.6?5.5:2.5):0);

  // ── Move & Rotate ────────────────────────────────────────────────────
  if(moving&&!isRolling){
    const len=Math.hypot(mx,mz);
    const nx=mx/len, nz=mz/len;
    // World direction (rotate by camera yaw)
    const wx= nx*Math.cos(yaw)+nz*Math.sin(yaw);
    const wz=-nx*Math.sin(yaw)+nz*Math.cos(yaw);
    character.position.x+=wx*spd*dt;
    character.position.z+=wz*spd*dt;
    // Smooth face direction
    const ty=Math.atan2(wx,wz);
    let diff=ty-character.rotation.y;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    character.rotation.y+=diff*12*dt;
  }

  // ── Gravity / Jump ───────────────────────────────────────────────────
  if(!isRolling){
    charVelY+=GRAVITY*dt;
    charY+=charVelY*dt;
    if(charY<0){charY=0;charVelY=0;}
  }
  character.position.y=charY;

  if(keys['Space']&&charY<.05&&!isAttacking&&!isRolling&&!isCasting){
    charVelY=JUMP_V; keys['Space']=false;
  }

  // ── Actions ──────────────────────────────────────────────────────────
  if(!isAttacking&&!isCasting&&!isRolling){

    if(keys['KeyJ']){
      keys['KeyJ']=false;
      isAttacking=true;
      sword.visible=true;
      comboCount++;
      comboTimer=1.8;
      if(comboCount>=2) showCombo(comboCount);
      oneShot('atk1');
    }
    else if(keys['KeyK']){
      keys['KeyK']=false;
      isAttacking=true;
      sword.visible=true;
      comboCount++;
      comboTimer=1.8;
      if(comboCount>=2) showCombo(comboCount);
      oneShot('atk2');
    }
    else if(keys['KeyL']&&mp>=25){
      keys['KeyL']=false;
      isCasting=true;
      mp=Math.max(0,mp-25);
      updateHUD();
      spellActive=true;
      spellLife=1.4;
      laser.visible=true;
      laser._ll.intensity=10;
      oneShot('spell');
    }
    else if(keys['KeyR']||keys['ControlLeft']){
      keys['KeyR']=false;
      keys['ControlLeft']=false;
      isRolling=true;
      rollProgress=0;
      rollStartPos.copy(character.position);
      const fwd=new THREE.Vector3(Math.sin(character.rotation.y),0,Math.cos(character.rotation.y));
      rollEndPos.copy(character.position).addScaledVector(fwd,3.2);
      rollEndPos.y=0;
      oneShot('roll');
    }
  }

  // ── Roll movement ────────────────────────────────────────────────────
  if(isRolling){
    rollProgress=Math.min(1,rollProgress+dt*2.8);
    const t=rollProgress;
    character.position.lerpVectors(rollStartPos,rollEndPos,t);
    character.position.y=Math.sin(t*Math.PI)*.35;
    charY=character.position.y;
  }

  // ── Combo timer ──────────────────────────────────────────────────────
  comboTimer-=dt;
  if(comboTimer<0){comboTimer=0;comboCount=0;}

  // ── Mana regen ───────────────────────────────────────────────────────
  mpRegen+=dt;
  if(mpRegen>.4){mpRegen=0;mp=Math.min(100,mp+4);updateHUD();}

  // ── Anim state machine ───────────────────────────────────────────────
  if(!isAttacking&&!isCasting&&!isRolling){
    sword.visible=false;
    if(charY>.15){ /* keep current */ }
    else if(sprinting) fadeTo('sprint');
    else if(spd>3)     fadeTo('run');
    else if(spd>0)     fadeTo('walk');
    else               fadeTo('idle');
  }

  // ── Update sword position ────────────────────────────────────────────
  if(rHandBone){
    const wp=new THREE.Vector3(), wq=new THREE.Quaternion();
    rHandBone.getWorldPosition(wp); rHandBone.getWorldQuaternion(wq);
    sword.position.copy(wp);
    sword.quaternion.copy(wq);
    sword.rotateX(Math.PI*.5);
    sword.rotateZ(-Math.PI*.08);
  } else {
    const fwd=new THREE.Vector3(Math.sin(character.rotation.y),0,Math.cos(character.rotation.y));
    sword.position.copy(character.position).addScaledVector(fwd,.35);
    sword.position.y+=1.15; sword.rotation.y=character.rotation.y; sword.rotateX(Math.PI*.5);
  }

  // ── Laser position ───────────────────────────────────────────────────
  if(lHandBone){
    const wp=new THREE.Vector3(), wq=new THREE.Quaternion();
    lHandBone.getWorldPosition(wp); lHandBone.getWorldQuaternion(wq);
    laser.position.copy(wp);
    laser.quaternion.copy(wq);
    laser.rotateY(Math.PI);
    laser.rotateX(-Math.PI*.15);
  } else {
    laser.position.copy(character.position);
    laser.position.y+=1.4;
    laser.rotation.y=character.rotation.y+Math.PI;
  }

  // ── Fire particles ───────────────────────────────────────────────────
  if(sword.visible){
    const pa=sword._firePts.geometry.attributes.position;
    const fd=sword._fd; const t=performance.now()*.001;
    for(let i=0;i<fd.length;i++){
      fd[i].t+=fd[i].s*dt; if(fd[i].t>1)fd[i].t=0;
      pa.array[i*3]  =fd[i].ox+Math.sin(t*4+i*.7)*.018;
      pa.array[i*3+1]=fd[i].by+fd[i].t*.3;
      pa.array[i*3+2]=fd[i].oz+Math.cos(t*3+i)*.006;
    }
    pa.needsUpdate=true;
    sword._flameLight.intensity=3+Math.sin(t*9)*.8;
    sword._flameLight.color.setHSL(.07+Math.sin(t*5)*.03,1,.55);
  }

  // ── Laser effect ─────────────────────────────────────────────────────
  if(spellActive){
    spellLife-=dt;
    const pulse=.75+Math.sin(performance.now()*.025)*.25;
    laser._outer.material.opacity=.55*pulse;
    laser._core.material.opacity=.95*pulse;
    laser._imp.material.opacity=.45*pulse;
    laser._ll.intensity=9*pulse;
    if(spellLife<=0){
      laser.visible=false; spellActive=false; laser._ll.intensity=0;
    }
  }

  // ── Ambient particles float ──────────────────────────────────────────
  {
    const ppos=scene._ambientPts.ppos;
    const t=performance.now()*.0003;
    for(let i=0;i<100;i++){
      ppos[i*3+1]+=.005*dt*60;
      if(ppos[i*3+1]>7) ppos[i*3+1]=.3;
    }
    scene._ambientPts.geo.attributes.position.needsUpdate=true;
  }

  // ── Mixer ────────────────────────────────────────────────────────────
  mixer.update(dt);

  // ── Camera ───────────────────────────────────────────────────────────
  const cTgt=character.position.clone().add(new THREE.Vector3(0,1.1,0));
  camTarget.lerp(cTgt,10*dt);
  const cx=camTarget.x+Math.sin(yaw)*Math.cos(pitch)*camDist;
  const cy=camTarget.y+Math.sin(pitch)*camDist;
  const cz=camTarget.z+Math.cos(yaw)*Math.cos(pitch)*camDist;
  camera.position.set(cx,cy,cz);
  camera.lookAt(camTarget);

  renderer.render(scene,camera);
}

tick();
</script>
