<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ Blade &amp; Spell</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0e0818; overflow:hidden; font-family:system-ui,sans-serif; touch-action:none; }
canvas { display:block; width:100vw; height:100vh; }

#loading {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at center,#140022 0%,#04000e 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;
}
#loading h1 {
  font-size:clamp(1.5rem,5vw,2.8rem); letter-spacing:.2em; color:#c090ff;
  margin-bottom:.4rem; text-shadow:0 0 30px #7030ff;
}
#loading p { color:#444; font-size:.72rem; letter-spacing:.18em; margin-bottom:1.8rem; }
#bar-wrap { width:min(260px,68vw); height:4px; background:#18182a; border-radius:2px; overflow:hidden; }
#bar { height:100%; background:linear-gradient(90deg,#5010ee,#c060ff); width:0%; transition:width .2s; border-radius:2px; }
#load-status { margin-top:.9rem; font-size:.65rem; color:#555; max-width:88vw; text-align:center; }

#hud { position:fixed; top:0; left:0; pointer-events:none; z-index:10; padding:10px 12px; }
.stat-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.stat-label { font-size:.6rem; font-weight:700; width:18px; color:#aaa; }
.stat-track { height:5px; border-radius:3px; overflow:hidden; }
.hp-track { width:clamp(90px,18vw,160px); background:#2a0808; }
.mp-track { width:clamp(70px,14vw,120px); background:#080828; }
.hp-bar { height:100%; background:linear-gradient(90deg,#cc2222,#ff6666); border-radius:3px; transition:width .25s; }
.mp-bar { height:100%; background:linear-gradient(90deg,#2244cc,#6688ff); border-radius:3px; transition:width .25s; }

#combo {
  position:fixed; top:36%; left:50%; transform:translate(-50%,-50%) scale(0);
  pointer-events:none; z-index:20; text-align:center; opacity:0;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), opacity .18s;
}
#combo span { font-size:clamp(2rem,5.5vw,3.2rem); font-weight:900; color:#ffcc00; text-shadow:0 0 20px #ff8800; }

#fps { position:fixed; top:4px; right:8px; color:#2a2a2a; font-size:.55rem; z-index:10; pointer-events:none; }

/* ─── Mobile Controls ─────────────────────── */
#jzone {
  position:fixed; bottom:22px; left:16px;
  width:118px; height:118px;
  pointer-events:all; z-index:15; display:none;
}
#jbase {
  width:118px; height:118px; border-radius:50%;
  background:rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.16);
  position:relative;
}
#jknob {
  width:44px; height:44px; border-radius:50%;
  background:rgba(150,90,255,.55); border:2px solid rgba(170,110,255,.8);
  position:absolute; top:37px; left:37px;
  box-shadow:0 0 12px rgba(110,50,255,.6);
}

#btns {
  position:fixed; bottom:22px; right:12px;
  display:none; flex-direction:column; gap:8px; align-items:flex-end; z-index:15;
}
.brow { display:flex; gap:8px; }
.gb {
  width:52px; height:52px; border-radius:50%;
  border:2px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.6); color:#fff; font-size:1.15rem;
  display:flex; align-items:center; justify-content:center;
  touch-action:manipulation; -webkit-user-select:none; user-select:none;
  box-shadow:0 2px 12px rgba(0,0,0,.5); transition:opacity .1s, transform .1s;
}
.gb.on, .gb:active { opacity:.5; transform:scale(.87); }
#btn-jump  { background:rgba(40,110,255,.38); border-color:rgba(60,130,255,.55); }
#btn-atk1  { background:rgba(210,40,40,.38);  border-color:rgba(230,60,60,.55); }
#btn-atk2  { background:rgba(210,120,0,.33);  border-color:rgba(230,140,0,.55); }
#btn-spell { background:rgba(30,30,210,.38);  border-color:rgba(50,50,230,.55); }
#btn-roll  { background:rgba(30,160,30,.33);  border-color:rgba(50,180,50,.55); }

#hint {
  position:fixed; bottom:14px; right:14px;
  color:#1e1e1e; font-size:.6rem; line-height:1.85;
  text-align:right; pointer-events:none; z-index:10;
}
@media (hover:none) and (pointer:coarse) {
  #jzone, #btns { display:flex; }
  #hint { display:none; }
}
</style>
</head>
<body>

<div id="loading">
  <h1>⚔️ BLADE &amp; SPELL</h1>
  <p>LOADING WORLD</p>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="load-status">Initializing…</div>
</div>

<div id="hud">
  <div class="stat-row">
    <span class="stat-label" style="color:#f55">HP</span>
    <div class="stat-track hp-track"><div class="hp-bar" id="hp-bar" style="width:100%"></div></div>
  </div>
  <div class="stat-row">
    <span class="stat-label" style="color:#55f">MP</span>
    <div class="stat-track mp-track"><div class="mp-bar" id="mp-bar" style="width:100%"></div></div>
  </div>
</div>

<div id="combo"><span id="combo-txt"></span></div>
<div id="fps"></div>

<div id="hint">WASD 移動 ｜ 拖曳 視角<br>空白 跳躍 ｜ Shift 衝刺<br>J/K 攻擊 ｜ L 魔法 ｜ R 翻滾</div>

<div id="jzone"><div id="jbase"><div id="jknob"></div></div></div>
<div id="btns">
  <div class="brow">
    <button class="gb" id="btn-spell">✨</button>
    <button class="gb" id="btn-jump">↑</button>
  </div>
  <div class="brow">
    <button class="gb" id="btn-roll">🔄</button>
    <button class="gb" id="btn-atk2">🗡️</button>
    <button class="gb" id="btn-atk1">⚔️</button>
  </div>
</div>

<script src="three.bundle.js"></script>
<script>
'use strict';

// ─── Sanity check ────────────────────────────────────────────────────────────
var statusEl = document.getElementById('load-status');
var barEl    = document.getElementById('bar');
function setStatus(msg, col) { statusEl.textContent = msg; statusEl.style.color = col || '#555'; }

if (typeof THREE === 'undefined' || typeof THREE.GLTFLoader === 'undefined') {
  setStatus('ERROR: three.bundle.js missing or broken', '#f44');
  throw new Error('THREE / GLTFLoader not found');
}

// ─── Mobile detection ─────────────────────────────────────────────────────────
var IS_MOBILE = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
             || (navigator.maxTouchPoints > 0 && window.innerWidth < 1200);

if (IS_MOBILE) {
  document.getElementById('jzone').style.display = 'flex';
  document.getElementById('btns').style.display  = 'flex';
  document.getElementById('hint').style.display  = 'none';
}

// ─── Renderer ─────────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: !IS_MOBILE, powerPreference: 'high-performance' });
renderer.setPixelRatio(IS_MOBILE ? Math.min(devicePixelRatio, 1.5) : Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── Scene / Camera ────────────────────────────────────────────────────────────
var scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0e0818);
var camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.05, 180);

// ─── Lights ───────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 2.8));

var keyLight = new THREE.DirectionalLight(0xffeeff, 2.2);
keyLight.position.set(3, 6, 5);
scene.add(keyLight);

var fillLight = new THREE.DirectionalLight(0x8888ff, 1.4);
fillLight.position.set(-4, 4, 2);
scene.add(fillLight);

var rimLight = new THREE.DirectionalLight(0xff80ff, 1.0);
rimLight.position.set(0, 5, -7);
scene.add(rimLight);

// ─── Environment ──────────────────────────────────────────────────────────────
// Ground
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({ color: 0x231040, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// Magic rings
[
  [3.0, 0.05, 0x9955ff, 0.55],
  [2.4, 0.03, 0x6633cc, 0.30],
  [3.8, 0.02, 0x4422aa, 0.18],
].forEach(function(c) {
  var mesh = new THREE.Mesh(
    new THREE.RingGeometry(c[0]-c[1], c[0], 64),
    new THREE.MeshBasicMaterial({ color:c[2], side:THREE.DoubleSide, transparent:true, opacity:c[3] })
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = 0.005;
  scene.add(mesh);
});

// Rune dots
for (var ri = 0; ri < 12; ri++) {
  var ra = (ri / 12) * Math.PI * 2;
  var dot = new THREE.Mesh(
    new THREE.CircleGeometry(0.06, 8),
    new THREE.MeshBasicMaterial({ color:0xff99ff, transparent:true, opacity:0.85, side:THREE.DoubleSide })
  );
  dot.rotation.x = -Math.PI / 2;
  dot.position.set(Math.cos(ra)*3, 0.006, Math.sin(ra)*3);
  scene.add(dot);
}

// Pillars
var PILLAR_N = IS_MOBILE ? 4 : 6;
for (var pi = 0; pi < PILLAR_N; pi++) {
  var pa = (pi / PILLAR_N) * Math.PI * 2, PR = 12;
  var pillar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.27, 0.36, 7, 8),
    new THREE.MeshStandardMaterial({ color:0x221430, roughness:0.85 })
  );
  pillar.position.set(Math.cos(pa)*PR, 3.5, Math.sin(pa)*PR);
  scene.add(pillar);
  var orb = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 9, 9),
    new THREE.MeshBasicMaterial({ color:0xaa66ff })
  );
  orb.position.set(Math.cos(pa)*PR, 7.4, Math.sin(pa)*PR);
  scene.add(orb);
  if (!IS_MOBILE || pi % 2 === 0) {
    var pl = new THREE.PointLight(0x8844ee, 2.8, 11);
    pl.position.copy(orb.position);
    scene.add(pl);
  }
}

// Floating particles
var PCOUNT  = IS_MOBILE ? 35 : 75;
var pBuf    = new Float32Array(PCOUNT * 3);
for (var pp = 0; pp < PCOUNT; pp++) {
  pBuf[pp*3]   = (Math.random()-.5)*28;
  pBuf[pp*3+1] = Math.random()*5 + 0.5;
  pBuf[pp*3+2] = (Math.random()-.5)*28;
}
var pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pBuf, 3));
scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
  color:0xaa77ff, size:0.08, transparent:true, opacity:0.55,
  blending:THREE.AdditiveBlending, depthWrite:false
})));

// ─── Burning Sword (procedural geometry) ──────────────────────────────────────
var swordRoot = new THREE.Group();

var blade = new THREE.Mesh(
  new THREE.BoxGeometry(0.048, 1.1, 0.01),
  new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xff6600, emissiveIntensity:1.1, metalness:0.97, roughness:0.04 })
);
blade.position.y = 0.66;
swordRoot.add(blade);

var bladeGlow = new THREE.Mesh(
  new THREE.BoxGeometry(0.014, 1.08, 0.001),
  new THREE.MeshBasicMaterial({ color:0xffaa00, transparent:true, opacity:0.75, blending:THREE.AdditiveBlending, depthWrite:false })
);
bladeGlow.position.set(0.026, 0.66, 0.006);
swordRoot.add(bladeGlow);

var guard = new THREE.Mesh(
  new THREE.BoxGeometry(0.29, 0.038, 0.038),
  new THREE.MeshStandardMaterial({ color:0xd4a017, metalness:0.95, roughness:0.12 })
);
guard.position.y = 0.07;
swordRoot.add(guard);

var handle = new THREE.Mesh(
  new THREE.CylinderGeometry(0.024, 0.024, 0.27, 8),
  new THREE.MeshStandardMaterial({ color:0x3a1600, roughness:0.88 })
);
handle.position.y = -0.075;
swordRoot.add(handle);

var pommel = new THREE.Mesh(
  new THREE.SphereGeometry(0.038, 8, 8),
  new THREE.MeshStandardMaterial({ color:0xd4a017, metalness:0.95, roughness:0.12 })
);
pommel.position.y = -0.215;
swordRoot.add(pommel);

var swordFlame = new THREE.PointLight(0xff6600, 4.5, 2.0);
swordFlame.position.y = 0.9;
swordRoot.add(swordFlame);

var FIRE_N   = IS_MOBILE ? 22 : 50;
var fireBuf  = new Float32Array(FIRE_N * 3);
var fireData = [];
for (var fi = 0; fi < FIRE_N; fi++) {
  fireData.push({ t: Math.random(), sp: 0.5+Math.random()*1.6, ox:(Math.random()-.5)*0.034, oz:(Math.random()-.5)*0.007, by:0.1+Math.random()*0.88 });
}
var fireGeo = new THREE.BufferGeometry();
fireGeo.setAttribute('position', new THREE.BufferAttribute(fireBuf, 3));
swordRoot.add(new THREE.Points(fireGeo, new THREE.PointsMaterial({
  color:0xff8800, size:0.042, transparent:true, opacity:0.88,
  blending:THREE.AdditiveBlending, depthWrite:false
})));
swordRoot.visible = false;
scene.add(swordRoot);

// ─── Laser Beam ───────────────────────────────────────────────────────────────
var laserRoot = new THREE.Group();
var LLEN = 20;

var laserOuter = new THREE.Mesh(
  new THREE.CylinderGeometry(0.048, 0.048, LLEN, 8),
  new THREE.MeshBasicMaterial({ color:0x22ddff, transparent:true, opacity:0.5, blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.BackSide })
);
laserOuter.rotation.x = Math.PI/2;
laserOuter.position.z = -LLEN/2;
laserRoot.add(laserOuter);

var laserCore = new THREE.Mesh(
  new THREE.CylinderGeometry(0.012, 0.012, LLEN, 6),
  new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.92, blending:THREE.AdditiveBlending, depthWrite:false })
);
laserCore.rotation.x = Math.PI/2;
laserCore.position.z = -LLEN/2;
laserRoot.add(laserCore);

var laserImpact = new THREE.Mesh(
  new THREE.SphereGeometry(0.32, 8, 8),
  new THREE.MeshBasicMaterial({ color:0x44eeff, transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false })
);
laserImpact.position.z = -LLEN;
laserRoot.add(laserImpact);

var laserLight = new THREE.PointLight(0x00ddff, 0, 10);
laserRoot.add(laserLight);
laserRoot.visible = false;
scene.add(laserRoot);

// ─── Game State ────────────────────────────────────────────────────────────────
var character   = null;
var animMixer   = null;
var rHandBone   = null;
var lHandBone   = null;

// Actions map: name -> THREE.AnimationAction
var animActions = {};

// Physics
var charY  = 0, velY = 0;
var GRAV   = -20, JUMP_V = 8.5;
var onGnd  = true;

// Camera orbit
var camYaw   = 0, camPitch = 0.18, camDist = 3.5;
var camFocus = new THREE.Vector3(0, 0.9, 0);

// Character state flags
var isAttacking = false;
var isCasting   = false;
var isRolling   = false;
var curAnim     = 'idle';

// Roll data
var rollT     = 0;
var rollFrom  = new THREE.Vector3();
var rollTo    = new THREE.Vector3();

// Spell
var spellOn   = false;
var spellLife = 0;

// Stats
var hp = 100, mp = 100, mpRegen = 0;
var comboN = 0, comboT = 0, comboTO = null;

// Input
var keys = {};
var joyX = 0, joyY = 0;

// Reused vectors
var _v3a = new THREE.Vector3();
var _v3b = new THREE.Vector3();
var _qua = new THREE.Quaternion();
var _fwd = new THREE.Vector3();

var clock = new THREE.Clock();

// ─── Load assets ──────────────────────────────────────────────────────────────
var ASSETS = [
  { key:'char',   url:'character.glb?v=3' },
  { key:'idle',   url:'Idle.glb?v=3'      },
  { key:'walk',   url:'Walking.glb?v=3'   },
  { key:'run',    url:'Running.glb?v=3'   },
  { key:'sprint', url:'Sprint.glb?v=3'    },
  { key:'atk1',   url:'Attack1.glb?v=3'   },
  { key:'atk2',   url:'Attack2.glb?v=3'   },
  { key:'spell',  url:'CastSpell.glb?v=3' },
  { key:'roll',   url:'Roll.glb?v=3'      },
];
var loaded = {}, loadIdx = 0;
var gltfLoader = new THREE.GLTFLoader();

function loadNext() {
  if (loadIdx >= ASSETS.length) { onAllLoaded(); return; }
  var a = ASSETS[loadIdx];
  setStatus('Loading ' + a.url + '  (' + (loadIdx+1) + '/' + ASSETS.length + ')');
  gltfLoader.load(a.url,
    function(gltf) { loaded[a.key] = gltf; barEl.style.width = (++loadIdx / ASSETS.length * 100) + '%'; loadNext(); },
    function(xhr)  { if (xhr.total) setStatus(a.url + '  ' + Math.round(xhr.loaded/xhr.total*100) + '%'); },
    function(err)  { setStatus('FAILED: ' + a.url + ' — ' + (err.message||err), '#f44'); }
  );
}
loadNext();

// ─── After all loaded ─────────────────────────────────────────────────────────
function onAllLoaded() {
  setStatus('Setting up character…');

  // ── Character mesh ──
  character = loaded.char.scene;
  character.scale.setScalar(0.01);   // Mixamo FBX is in cm
  character.position.set(0, 0, 0);

  character.traverse(function(obj) {
    if (obj.isMesh) {
      // Ensure skinned mesh renders correctly with bright materials
      var mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(function(m) {
        m.roughness   = 0.85;
        m.metalness   = 0.0;
        m.needsUpdate = true;
      });
    }
    if (obj.isBone) {
      // Note: character GLB has duplicate bone names with _1 suffix
      // Use the first match (without suffix)
      if (!rHandBone && obj.name === 'mixamorig7RightHand') rHandBone = obj;
      if (!lHandBone && obj.name === 'mixamorig7LeftHand')  lHandBone = obj;
    }
  });
  scene.add(character);

  // ── Animation mixer ──
  animMixer = new THREE.AnimationMixer(character);

  // When a one-shot animation finishes, automatically return to locomotion
  animMixer.addEventListener('finished', function(e) {
    var name = e.action._clip.name;
    console.log('Finished:', name);
    isAttacking = false;
    isCasting   = false;
    isRolling   = false;
    swordRoot.visible = false;
    // Fade all actions out, let locomotion FSM take over next frame
    Object.keys(animActions).forEach(function(k) {
      if (animActions[k] && animActions[k] !== e.action) {
        animActions[k].stop();
      }
    });
    e.action.stop();
    curAnim = '';  // force FSM to re-evaluate
  });

  // ── Build actions ──
  var defs = [
    { key:'idle',   name:'idle',   loop:true  },
    { key:'walk',   name:'walk',   loop:true  },
    { key:'run',    name:'run',    loop:true  },
    { key:'sprint', name:'sprint', loop:true  },
    { key:'atk1',   name:'atk1',   loop:false },
    { key:'atk2',   name:'atk2',   loop:false },
    { key:'spell',  name:'spell',  loop:false },
    { key:'roll',   name:'roll',   loop:false },
  ];

  defs.forEach(function(d) {
    var gltf = loaded[d.key];
    if (!gltf || !gltf.animations || !gltf.animations.length) {
      console.warn('No animation for:', d.key);
      return;
    }
    var clip   = gltf.animations[0].clone();
    clip.name  = d.name;
    var action = animMixer.clipAction(clip);
    if (d.loop) {
      action.setLoop(THREE.LoopRepeat, Infinity);
    } else {
      action.setLoop(THREE.LoopOnce, 1);
      action.clampWhenFinished = true;
    }
    action.setEffectiveWeight(1);
    action.stop();
    animActions[d.name] = action;
    console.log('Action ready:', d.name, 'dur=' + clip.duration.toFixed(2) + 's');
  });

  // Start idle
  if (animActions.idle) {
    animActions.idle.play();
    curAnim = 'idle';
  }

  barEl.style.width = '100%';
  setStatus('Ready!', '#66ee88');
  setTimeout(function() {
    document.getElementById('loading').style.display = 'none';
  }, 300);
}

// ─── Animation helpers ─────────────────────────────────────────────────────────

// Smoothly transition to a looping animation
function playLoop(name) {
  if (!animActions[name]) return;
  if (curAnim === name && animActions[name].isRunning()) return;

  var FADE = 0.15;
  // Fade out current
  if (curAnim && curAnim !== name && animActions[curAnim]) {
    animActions[curAnim].fadeOut(FADE);
  }
  animActions[name].reset();
  animActions[name].setEffectiveWeight(1);
  animActions[name].setLoop(THREE.LoopRepeat, Infinity);
  animActions[name].fadeIn(FADE);
  animActions[name].play();
  curAnim = name;
}

// Play a one-shot action (attack / spell / roll)
function playOnce(name) {
  if (!animActions[name]) {
    console.warn('No action:', name);
    return;
  }
  var FADE = 0.1;
  // Stop all currently running actions
  Object.keys(animActions).forEach(function(k) {
    if (animActions[k] && animActions[k].isRunning()) {
      animActions[k].fadeOut(FADE);
    }
  });
  animActions[name].stop();
  animActions[name].reset();
  animActions[name].setEffectiveWeight(1);
  animActions[name].setLoop(THREE.LoopOnce, 1);
  animActions[name].clampWhenFinished = true;
  animActions[name].fadeIn(FADE);
  animActions[name].play();
  curAnim = name;
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup',   function(e) { keys[e.code] = false; });

// Mouse camera
var drag = false, mx0 = 0, my0 = 0;
document.addEventListener('mousedown', function(e) { drag=true; mx0=e.clientX; my0=e.clientY; });
document.addEventListener('mouseup',   function() { drag=false; });
document.addEventListener('mousemove', function(e) {
  if (!drag) return;
  camYaw   -= (e.clientX-mx0) * 0.005;
  camPitch -= (e.clientY-my0) * 0.004;
  camPitch  = Math.max(0.04, Math.min(0.78, camPitch));
  mx0=e.clientX; my0=e.clientY;
});
document.addEventListener('wheel', function(e) {
  camDist = Math.max(1.5, Math.min(9, camDist + e.deltaY * 0.007));
}, { passive:true });
window.addEventListener('resize', function() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// ─── Joystick ──────────────────────────────────────────────────────────────────
var jBase = document.getElementById('jbase');
var jKnob = document.getElementById('jknob');
var JR = 36, jActive = false, jCX = 0, jCY = 0, jTID = -1;

jBase.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.changedTouches[0];
  jActive = true; jTID = t.identifier;
  var r = jBase.getBoundingClientRect();
  jCX = r.left + r.width/2; jCY = r.top + r.height/2;
}, { passive:false });

document.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var i=0; i<e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.identifier !== jTID || !jActive) continue;
    var dx = t.clientX-jCX, dy = t.clientY-jCY, d = Math.hypot(dx,dy);
    if (d > JR) { dx*=JR/d; dy*=JR/d; }
    jKnob.style.left = (37+dx)+'px'; jKnob.style.top = (37+dy)+'px';
    joyX=dx/JR; joyY=dy/JR;
  }
}, { passive:false });

function joyReset() { jActive=false; jTID=-1; jKnob.style.left='37px'; jKnob.style.top='37px'; joyX=0; joyY=0; }
document.addEventListener('touchend',    function(e) { for(var i=0;i<e.changedTouches.length;i++) if(e.changedTouches[i].identifier===jTID) joyReset(); });
document.addEventListener('touchcancel', function()  { joyReset(); });

// ─── Camera touch swipe ────────────────────────────────────────────────────────
var cTch = null;
document.addEventListener('touchstart', function(e) {
  for (var i=0;i<e.changedTouches.length;i++) {
    var t=e.changedTouches[i], rx=t.clientX/innerWidth;
    if (rx>0.33 && rx<0.72 && !cTch) cTch={id:t.identifier,x:t.clientX,y:t.clientY};
  }
}, { passive:true });
document.addEventListener('touchmove', function(e) {
  if (!cTch) return;
  for (var i=0;i<e.changedTouches.length;i++) {
    var t=e.changedTouches[i];
    if (t.identifier!==cTch.id) continue;
    camYaw   -= (t.clientX-cTch.x)*0.006;
    camPitch -= (t.clientY-cTch.y)*0.004;
    camPitch  = Math.max(0.04, Math.min(0.78, camPitch));
    cTch.x=t.clientX; cTch.y=t.clientY;
  }
}, { passive:true });
document.addEventListener('touchend', function(e) {
  if (!cTch) return;
  for (var i=0;i<e.changedTouches.length;i++) if(e.changedTouches[i].identifier===cTch.id) cTch=null;
});

// ─── Mobile buttons ────────────────────────────────────────────────────────────
function mBtn(id, code) {
  var el = document.getElementById(id);
  el.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); keys[code]=true; el.classList.add('on'); }, { passive:false });
  el.addEventListener('touchend',   function()  { keys[code]=false; el.classList.remove('on'); });
  el.addEventListener('touchcancel',function()  { keys[code]=false; el.classList.remove('on'); });
}
mBtn('btn-jump',  'Space');
mBtn('btn-atk1',  'KeyJ');
mBtn('btn-atk2',  'KeyK');
mBtn('btn-spell', 'KeyL');
mBtn('btn-roll',  'KeyR');

// ─── HUD helpers ───────────────────────────────────────────────────────────────
var hpEl = document.getElementById('hp-bar');
var mpEl = document.getElementById('mp-bar');
function hudUpdate() { hpEl.style.width=hp+'%'; mpEl.style.width=mp+'%'; }

function showCombo(n) {
  var el  = document.getElementById('combo');
  var txt = document.getElementById('combo-txt');
  var cols = ['#ffcc00','#ff8800','#ff4400','#ff00cc','#cc00ff'];
  txt.textContent  = '⚔️ ' + n + '× COMBO';
  txt.style.color  = cols[Math.min(n-2, cols.length-1)];
  el.style.transform = 'translate(-50%,-50%) scale(1)';
  el.style.opacity   = '1';
  clearTimeout(comboTO);
  comboTO = setTimeout(function() {
    el.style.transform = 'translate(-50%,-50%) scale(0)';
    el.style.opacity   = '0';
  }, 900);
}

// ─── Main Loop ─────────────────────────────────────────────────────────────────
var fpsFrames=0, fpsTime=0;
var fpsEl = document.getElementById('fps');

function gameLoop() {
  requestAnimationFrame(gameLoop);
  var dt = Math.min(clock.getDelta(), 0.05);

  // FPS
  fpsFrames++; fpsTime+=dt;
  if (fpsTime >= 1) { fpsEl.textContent=fpsFrames+' fps'; fpsFrames=0; fpsTime=0; }

  // Render scene even before character is ready
  if (!character || !animMixer) {
    renderer.render(scene, camera);
    return;
  }

  // ── Read input ──────────────────────────────────────────────────────────
  var ix = joyX, iz = joyY;
  if (keys['KeyA'] || keys['ArrowLeft'])  ix -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) ix += 1;
  if (keys['KeyW'] || keys['ArrowUp'])    iz -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  iz += 1;

  var inputLen   = Math.hypot(ix, iz);
  var moving     = inputLen > 0.04;
  var sprinting  = moving && (keys['ShiftLeft'] || keys['ShiftRight']);

  // ── Character movement ──────────────────────────────────────────────────
  var moveSpeed = 0;
  if (moving) {
    if (sprinting)          moveSpeed = 8.8;
    else if (inputLen>0.6)  moveSpeed = 5.0;
    else                    moveSpeed = 2.5;
  }

  if (moving && !isRolling) {
    var nx = ix/inputLen, nz = iz/inputLen;
    // Rotate by camera yaw so movement is relative to camera
    var wx =  nx*Math.cos(camYaw) + nz*Math.sin(camYaw);
    var wz = -nx*Math.sin(camYaw) + nz*Math.cos(camYaw);
    character.position.x += wx * moveSpeed * dt;
    character.position.z += wz * moveSpeed * dt;
    // Smoothly rotate character to face direction
    var tYaw = Math.atan2(wx, wz);
    var diff = tYaw - character.rotation.y;
    while (diff >  Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    character.rotation.y += diff * 12 * dt;
  }

  // ── Physics ─────────────────────────────────────────────────────────────
  if (!isRolling) {
    velY  += GRAV * dt;
    charY += velY * dt;
    if (charY <= 0) { charY=0; velY=0; onGnd=true; }
    else             { onGnd=false; }
  }
  character.position.y = charY;

  // Jump
  if (keys['Space'] && onGnd && !isAttacking && !isRolling && !isCasting) {
    velY=JUMP_V; charY=0.02; onGnd=false;
    keys['Space']=false;
  }

  // ── Roll physics ─────────────────────────────────────────────────────────
  if (isRolling) {
    rollT = Math.min(1, rollT + dt*2.8);
    character.position.lerpVectors(rollFrom, rollTo, rollT);
    character.position.y = Math.sin(rollT*Math.PI) * 0.3;
    charY = character.position.y;
  }

  // ── Trigger actions ───────────────────────────────────────────────────────
  if (!isAttacking && !isCasting && !isRolling) {

    if (keys['KeyJ']) {
      keys['KeyJ'] = false;
      isAttacking  = true;
      swordRoot.visible = true;
      comboN++; comboT=1.8;
      if (comboN >= 2) showCombo(comboN);
      playOnce('atk1');
    }
    else if (keys['KeyK']) {
      keys['KeyK'] = false;
      isAttacking  = true;
      swordRoot.visible = true;
      comboN++; comboT=1.8;
      if (comboN >= 2) showCombo(comboN);
      playOnce('atk2');
    }
    else if (keys['KeyL'] && mp >= 25) {
      keys['KeyL'] = false;
      isCasting    = true;
      mp = Math.max(0, mp-25);
      hudUpdate();
      spellOn=true; spellLife=1.5;
      laserRoot.visible=true; laserLight.intensity=9;
      playOnce('spell');
    }
    else if (keys['KeyR'] || keys['ControlLeft']) {
      keys['KeyR']=false; keys['ControlLeft']=false;
      isRolling=true; rollT=0;
      rollFrom.copy(character.position);
      _fwd.set(Math.sin(character.rotation.y), 0, Math.cos(character.rotation.y));
      rollTo.copy(character.position).addScaledVector(_fwd, 3.0);
      rollTo.y=0;
      playOnce('roll');
    }
  }

  // ── Timers ────────────────────────────────────────────────────────────────
  comboT -= dt;
  if (comboT <= 0) { comboT=0; comboN=0; }

  mpRegen += dt;
  if (mpRegen >= 0.44) { mpRegen=0; mp=Math.min(100,mp+4); hudUpdate(); }

  // ── Locomotion FSM ────────────────────────────────────────────────────────
  // Only update locomotion when no action is running
  if (!isAttacking && !isCasting && !isRolling) {
    swordRoot.visible = false;
    if (!onGnd) {
      // In air: keep run animation
      if (curAnim !== 'run') playLoop('run');
    } else if (sprinting) {
      playLoop('sprint');
    } else if (moveSpeed >= 4.0) {
      playLoop('run');
    } else if (moveSpeed > 0) {
      playLoop('walk');
    } else {
      playLoop('idle');
    }
  }

  // ── Attach sword to right hand bone ───────────────────────────────────────
  if (rHandBone) {
    rHandBone.getWorldPosition(_v3a);
    rHandBone.getWorldQuaternion(_qua);
    swordRoot.position.copy(_v3a);
    swordRoot.quaternion.copy(_qua);
    swordRoot.rotateX(Math.PI * 0.5);
    swordRoot.rotateZ(-0.08);
  } else {
    _fwd.set(Math.sin(character.rotation.y), 0, Math.cos(character.rotation.y));
    swordRoot.position.copy(character.position).addScaledVector(_fwd, 0.3);
    swordRoot.position.y = character.position.y + 1.1;
    swordRoot.rotation.y = character.rotation.y;
    swordRoot.rotateX(Math.PI * 0.5);
  }

  // ── Attach laser to left hand bone ────────────────────────────────────────
  if (lHandBone) {
    lHandBone.getWorldPosition(_v3a);
    lHandBone.getWorldQuaternion(_qua);
    laserRoot.position.copy(_v3a);
    laserRoot.quaternion.copy(_qua);
    laserRoot.rotateY(Math.PI);
    laserRoot.rotateX(-0.2);
  } else {
    laserRoot.position.copy(character.position);
    laserRoot.position.y = character.position.y + 1.3;
    laserRoot.rotation.y = character.rotation.y + Math.PI;
  }

  // ── Fire particle animation ────────────────────────────────────────────────
  if (swordRoot.visible) {
    var fpAttr = fireGeo.attributes.position;
    var now    = performance.now() * 0.001;
    for (var fi=0; fi<FIRE_N; fi++) {
      var fd  = fireData[fi];
      fd.t   += fd.sp * dt;
      if (fd.t > 1) fd.t = 0;
      fpAttr.array[fi*3]   = fd.ox + Math.sin(now*4 + fi*0.65)*0.016;
      fpAttr.array[fi*3+1] = fd.by + fd.t * 0.28;
      fpAttr.array[fi*3+2] = fd.oz;
    }
    fpAttr.needsUpdate = true;
    swordFlame.intensity = 3.8 + Math.sin(performance.now()*0.009)*0.8;
    swordFlame.color.setHSL(0.07+Math.sin(performance.now()*0.006)*0.025, 1, 0.54);
  }

  // ── Laser pulse ───────────────────────────────────────────────────────────
  if (spellOn) {
    spellLife -= dt;
    var pulse = 0.78 + Math.sin(performance.now()*0.022)*0.22;
    laserOuter.material.opacity   = 0.50*pulse;
    laserCore.material.opacity    = 0.92*pulse;
    laserImpact.material.opacity  = 0.42*pulse;
    laserLight.intensity          = 9*pulse;
    if (spellLife <= 0) {
      laserRoot.visible=false; spellOn=false; laserLight.intensity=0;
    }
  }

  // ── Float particles ───────────────────────────────────────────────────────
  for (var pi=0; pi<PCOUNT; pi++) {
    pBuf[pi*3+1] += 0.003 * dt * 60;
    if (pBuf[pi*3+1] > 6) pBuf[pi*3+1] = 0.35;
  }
  pGeo.attributes.position.needsUpdate = true;

  // ── Update mixer ──────────────────────────────────────────────────────────
  animMixer.update(dt);

  // ── Camera follow ─────────────────────────────────────────────────────────
  _v3b.copy(character.position);
  _v3b.y += 0.9;
  camFocus.lerp(_v3b, 10*dt);

  camera.position.set(
    camFocus.x + Math.sin(camYaw)  * Math.cos(camPitch) * camDist,
    camFocus.y + Math.sin(camPitch) * camDist,
    camFocus.z + Math.cos(camYaw)  * Math.cos(camPitch) * camDist
  );
  camera.lookAt(camFocus);

  renderer.render(scene, camera);
}

gameLoop();
</script>
