<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ Blade & Spell</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a0a2e; overflow:hidden; font-family:system-ui,sans-serif; touch-action:none; }
canvas { display:block; width:100vw; height:100vh; }

#loading {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at center, #140022 0%, #04000e 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;
}
#loading h1 { font-size:clamp(1.5rem,5vw,2.6rem); letter-spacing:.2em; color:#c090ff; margin-bottom:.4rem; text-shadow:0 0 25px #7030ff; }
#loading p { color:#444; font-size:.72rem; letter-spacing:.18em; margin-bottom:1.8rem; }
#bar-wrap { width:min(260px,68vw); height:4px; background:#18182a; border-radius:2px; overflow:hidden; }
#bar { height:100%; background:linear-gradient(90deg,#5010ee,#b050ff); width:0%; transition:width .2s; border-radius:2px; }
#load-status { margin-top:.9rem; font-size:.65rem; color:#555; max-width:92vw; text-align:center; }

#hud { position:fixed; top:0; left:0; pointer-events:none; z-index:10; padding:10px 12px; }
.srow { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.slbl { font-size:.6rem; font-weight:700; width:18px; color:#aaa; }
.strack { height:5px; border-radius:3px; overflow:hidden; }
.hp-t { width:130px; background:#2a0808; }
.mp-t { width:100px; background:#080828; }
.hp-f { height:100%; background:linear-gradient(90deg,#cc2222,#ff6666); border-radius:3px; transition:width .3s; }
.mp-f { height:100%; background:linear-gradient(90deg,#2244cc,#6688ff); border-radius:3px; transition:width .3s; }

#combo {
  position:fixed; top:35%; left:50%; transform:translate(-50%,-50%) scale(0);
  pointer-events:none; z-index:20; text-align:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1), opacity .2s;
  opacity:0;
}
#combo-txt { font-size:clamp(2rem,6vw,3.5rem); font-weight:900; color:#ffcc00; text-shadow:0 0 20px #ff8800; }

#fps { position:fixed; top:4px; right:8px; color:#333; font-size:.55rem; z-index:10; pointer-events:none; }

/* ── Mobile Controls ── */
#jzone {
  position:fixed; bottom:24px; left:18px;
  width:120px; height:120px;
  pointer-events:all; z-index:15; display:none;
}
#jbase {
  width:120px; height:120px; border-radius:50%;
  background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.18);
  position:relative;
}
#jknob {
  width:46px; height:46px; border-radius:50%;
  background:rgba(160,100,255,.6); border:2px solid rgba(180,120,255,.8);
  position:absolute; top:37px; left:37px;
  box-shadow:0 0 12px rgba(120,60,255,.6);
  transition:box-shadow .1s;
}

#btns {
  position:fixed; bottom:24px; right:14px;
  display:none; flex-direction:column; gap:9px; align-items:flex-end; z-index:15;
}
.brow { display:flex; gap:9px; }
.gb {
  width:52px; height:52px; border-radius:50%;
  border:2px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.65); color:#fff; font-size:1.15rem;
  display:flex; align-items:center; justify-content:center;
  touch-action:manipulation; user-select:none; -webkit-user-select:none;
  box-shadow:0 3px 12px rgba(0,0,0,.5);
  transition:opacity .1s, transform .1s;
}
.gb:active, .gb.on { opacity:.5; transform:scale(.88); }
#bb-j  { background:rgba(40,110,255,.4); border-color:rgba(60,130,255,.6); }
#bb-a  { background:rgba(200,40,40,.4);  border-color:rgba(220,60,60,.6); }
#bb-b  { background:rgba(200,110,0,.35); border-color:rgba(220,130,0,.6); }
#bb-s  { background:rgba(30,30,200,.4);  border-color:rgba(50,50,220,.6); }
#bb-r  { background:rgba(30,160,30,.35); border-color:rgba(50,180,50,.6); }

#hint {
  position:fixed; bottom:14px; right:14px; color:#222; font-size:.6rem;
  line-height:1.8; text-align:right; pointer-events:none; z-index:10;
}

@media (hover:none) and (pointer:coarse) {
  #jzone, #btns { display:flex; }
  #hint { display:none; }
}
</style>
</head>
<body>

<div id="loading">
  <h1>⚔️ BLADE &amp; SPELL</h1>
  <p>LOADING WORLD</p>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="load-status">Starting…</div>
</div>

<div id="hud">
  <div class="srow"><span class="slbl">HP</span><div class="strack hp-t"><div class="hp-f" id="hpf" style="width:100%"></div></div></div>
  <div class="srow"><span class="slbl">MP</span><div class="strack mp-t"><div class="mp-f" id="mpf" style="width:100%"></div></div></div>
</div>

<div id="combo"><div id="combo-txt"></div></div>
<div id="fps"></div>

<div id="hint">
  WASD 移動 | 滑鼠拖曳 視角<br>
  空白 跳躍 | Shift 衝刺<br>
  J/K 攻擊 | L 魔法 | R 翻滾
</div>

<div id="jzone"><div id="jbase"><div id="jknob"></div></div></div>
<div id="btns">
  <div class="brow">
    <button class="gb" id="bb-s">✨</button>
    <button class="gb" id="bb-j">↑</button>
  </div>
  <div class="brow">
    <button class="gb" id="bb-r">🔄</button>
    <button class="gb" id="bb-b">🗡️</button>
    <button class="gb" id="bb-a">⚔️</button>
  </div>
</div>

<script src="three.bundle.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  BLADE & SPELL  —  complete game script
// ═══════════════════════════════════════════════════════════════

var stEl  = document.getElementById('load-status');
var barEl = document.getElementById('bar');

function setStatus(msg, col) {
  stEl.textContent = msg;
  stEl.style.color = col || '#555';
}

if (typeof THREE === 'undefined') {
  setStatus('ERROR: three.bundle.js failed to load', '#f44');
  throw new Error('THREE not defined');
}
if (typeof THREE.GLTFLoader === 'undefined') {
  setStatus('ERROR: GLTFLoader missing', '#f44');
  throw new Error('GLTFLoader not defined');
}

setStatus('Initializing renderer…');

// ── Detect mobile ────────────────────────────────────────────────────────────
var MOBILE = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
             (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);

// Force-show mobile controls if on touch device
if (MOBILE || navigator.maxTouchPoints > 0) {
  document.getElementById('jzone').style.display = 'flex';
  document.getElementById('btns').style.display  = 'flex';
  document.getElementById('hint').style.display  = 'none';
}

// ── Renderer ─────────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({
  antialias: !MOBILE,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(MOBILE ? Math.min(window.devicePixelRatio, 1.5) : Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── Scene ────────────────────────────────────────────────────────────────────
var scene  = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a2e);

var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(0, 2, 5);
camera.lookAt(0, 1, 0);

// ── Lights ───────────────────────────────────────────────────────────────────
// Strong ambient so character is always visible
var ambLight = new THREE.AmbientLight(0xffffff, 2.5);
scene.add(ambLight);

// Front-facing key light
var keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
keyLight.position.set(2, 5, 5);
scene.add(keyLight);

// Fill light from left
var fillLight = new THREE.DirectionalLight(0x8888ff, 1.2);
fillLight.position.set(-4, 3, 2);
scene.add(fillLight);

// Back rim light
var rimLight = new THREE.DirectionalLight(0xff80ff, 0.8);
rimLight.position.set(0, 4, -6);
scene.add(rimLight);

// ── Ground ────────────────────────────────────────────────────────────────────
var groundGeo = new THREE.PlaneGeometry(80, 80);
var groundMat = new THREE.MeshStandardMaterial({ color: 0x2a1840, roughness: 0.9, metalness: 0.0 });
var ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.02;
scene.add(ground);

// Magic circles on ground
var circleDefs = [
  { r: 3.0, w: 0.05, color: 0x8844ff, opacity: 0.5 },
  { r: 2.4, w: 0.03, color: 0x6633cc, opacity: 0.3 },
  { r: 3.8, w: 0.02, color: 0x4422aa, opacity: 0.2 },
];
circleDefs.forEach(function(c) {
  var geo = new THREE.RingGeometry(c.r - c.w, c.r, 64);
  var mat = new THREE.MeshBasicMaterial({ color: c.color, side: THREE.DoubleSide, transparent: true, opacity: c.opacity });
  var ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.001;
  scene.add(ring);
});

// Rune dots
for (var ri = 0; ri < 12; ri++) {
  var ra = (ri / 12) * Math.PI * 2;
  var dotGeo = new THREE.CircleGeometry(0.06, 8);
  var dotMat = new THREE.MeshBasicMaterial({ color: 0xff88ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
  var dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.set(Math.cos(ra) * 3, 0.002, Math.sin(ra) * 3);
  dot.rotation.x = -Math.PI / 2;
  scene.add(dot);
}

// Pillars
var pillarCount = MOBILE ? 4 : 6;
for (var pi = 0; pi < pillarCount; pi++) {
  var pa = (pi / pillarCount) * Math.PI * 2;
  var PR = 12;
  var pillarGeo = new THREE.CylinderGeometry(0.28, 0.38, 7, 8);
  var pillarMat = new THREE.MeshStandardMaterial({ color: 0x221530, roughness: 0.85 });
  var pillar = new THREE.Mesh(pillarGeo, pillarMat);
  pillar.position.set(Math.cos(pa) * PR, 3.5, Math.sin(pa) * PR);
  scene.add(pillar);

  var orbGeo = new THREE.SphereGeometry(0.22, 8, 8);
  var orbMat = new THREE.MeshBasicMaterial({ color: 0x9955ff });
  var orb = new THREE.Mesh(orbGeo, orbMat);
  orb.position.set(Math.cos(pa) * PR, 7.4, Math.sin(pa) * PR);
  scene.add(orb);

  if (!MOBILE || pi % 2 === 0) {
    var orbPL = new THREE.PointLight(0x7733ee, 2.5, 10);
    orbPL.position.copy(orb.position);
    scene.add(orbPL);
  }
}

// Ambient floating particles
var PART_COUNT = MOBILE ? 30 : 70;
var partPos = new Float32Array(PART_COUNT * 3);
for (var ppi = 0; ppi < PART_COUNT; ppi++) {
  partPos[ppi * 3]     = (Math.random() - 0.5) * 26;
  partPos[ppi * 3 + 1] = Math.random() * 5 + 0.5;
  partPos[ppi * 3 + 2] = (Math.random() - 0.5) * 26;
}
var partGeo = new THREE.BufferGeometry();
partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
var partMesh = new THREE.Points(partGeo, new THREE.PointsMaterial({
  color: 0x9966ff, size: 0.08, transparent: true, opacity: 0.55,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
scene.add(partMesh);

// ── Burning Sword (procedural) ────────────────────────────────────────────────
var swordGroup = new THREE.Group();

// Blade
var bladeGeo = new THREE.BoxGeometry(0.05, 1.1, 0.01);
var bladeMat = new THREE.MeshStandardMaterial({
  color: 0xffffff, emissive: 0xff6600, emissiveIntensity: 1.0,
  metalness: 0.95, roughness: 0.05
});
var bladeMesh = new THREE.Mesh(bladeGeo, bladeMat);
bladeMesh.position.y = 0.65;
swordGroup.add(bladeMesh);

// Blade glow
var bladeGlowGeo = new THREE.BoxGeometry(0.015, 1.08, 0.001);
var bladeGlowMat = new THREE.MeshBasicMaterial({
  color: 0xff9900, transparent: true, opacity: 0.8,
  blending: THREE.AdditiveBlending, depthWrite: false
});
var bladeGlow = new THREE.Mesh(bladeGlowGeo, bladeGlowMat);
bladeGlow.position.set(0.025, 0.65, 0.006);
swordGroup.add(bladeGlow);

// Guard
var guardGeo = new THREE.BoxGeometry(0.30, 0.04, 0.04);
var guardMat = new THREE.MeshStandardMaterial({ color: 0xd4a017, metalness: 0.95, roughness: 0.1 });
var guardMesh = new THREE.Mesh(guardGeo, guardMat);
guardMesh.position.y = 0.07;
swordGroup.add(guardMesh);

// Handle
var handleGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.28, 8);
var handleMat = new THREE.MeshStandardMaterial({ color: 0x3a1600, roughness: 0.9 });
var handleMesh = new THREE.Mesh(handleGeo, handleMat);
handleMesh.position.y = -0.075;
swordGroup.add(handleMesh);

// Pommel
var pommelGeo = new THREE.SphereGeometry(0.04, 8, 8);
var pommelMat = new THREE.MeshStandardMaterial({ color: 0xd4a017, metalness: 0.95, roughness: 0.1 });
var pommelMesh = new THREE.Mesh(pommelGeo, pommelMat);
pommelMesh.position.y = -0.22;
swordGroup.add(pommelMesh);

// Flame point light
var swordLight = new THREE.PointLight(0xff6600, 4.0, 2.0);
swordLight.position.y = 0.9;
swordGroup.add(swordLight);

// Fire particles
var FIRE_COUNT = MOBILE ? 22 : 48;
var firePos = new Float32Array(FIRE_COUNT * 3);
var fireData = [];
for (var fi = 0; fi < FIRE_COUNT; fi++) {
  fireData.push({
    t:  Math.random(),
    sp: 0.5 + Math.random() * 1.5,
    ox: (Math.random() - 0.5) * 0.035,
    oz: (Math.random() - 0.5) * 0.008,
    by: 0.1 + Math.random() * 0.9
  });
}
var fireGeo = new THREE.BufferGeometry();
fireGeo.setAttribute('position', new THREE.BufferAttribute(firePos, 3));
var firePts = new THREE.Points(fireGeo, new THREE.PointsMaterial({
  color: 0xff8800, size: 0.04, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
swordGroup.add(firePts);
swordGroup.visible = false;
scene.add(swordGroup);

// ── Laser Beam ────────────────────────────────────────────────────────────────
var laserGroup = new THREE.Group();
var LASER_LEN = 20;

var laserOuterGeo = new THREE.CylinderGeometry(0.05, 0.05, LASER_LEN, 8);
var laserOuterMat = new THREE.MeshBasicMaterial({
  color: 0x22ddff, transparent: true, opacity: 0.5,
  blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide
});
var laserOuter = new THREE.Mesh(laserOuterGeo, laserOuterMat);
laserOuter.rotation.x = Math.PI / 2;
laserOuter.position.z = -LASER_LEN / 2;
laserGroup.add(laserOuter);

var laserCoreGeo = new THREE.CylinderGeometry(0.012, 0.012, LASER_LEN, 6);
var laserCoreMat = new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0.95,
  blending: THREE.AdditiveBlending, depthWrite: false
});
var laserCore = new THREE.Mesh(laserCoreGeo, laserCoreMat);
laserCore.rotation.x = Math.PI / 2;
laserCore.position.z = -LASER_LEN / 2;
laserGroup.add(laserCore);

var laserImpGeo = new THREE.SphereGeometry(0.35, 8, 8);
var laserImpMat = new THREE.MeshBasicMaterial({
  color: 0x44eeff, transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, depthWrite: false
});
var laserImp = new THREE.Mesh(laserImpGeo, laserImpMat);
laserImp.position.z = -LASER_LEN;
laserGroup.add(laserImp);

var laserLight = new THREE.PointLight(0x00ddff, 0, 10);
laserGroup.add(laserLight);

laserGroup.visible = false;
scene.add(laserGroup);

// ── Game State ────────────────────────────────────────────────────────────────
var character   = null;
var mixer       = null;
var rightHand   = null;
var leftHand    = null;

// Animation actions map
var acts = {};
// action names: idle, walk, run, sprint, atk1, atk2, spell, roll

var clock     = new THREE.Clock();
var camYaw    = 0;
var camPitch  = 0.18;
var camDist   = 3.5;
var camTarget = new THREE.Vector3(0, 0.9, 0);

// Physics
var charY  = 0;
var velY   = 0;
var GRAVITY = -20;
var JUMP_V  = 8.5;

// Character state
var STATE = {
  IDLE:     'idle',
  WALK:     'walk',
  RUN:      'run',
  SPRINT:   'sprint',
  JUMP:     'jump',
  ATK1:     'atk1',
  ATK2:     'atk2',
  SPELL:    'spell',
  ROLL:     'roll'
};

var currentState  = STATE.IDLE;
var isAttacking   = false;
var isCasting     = false;
var isRolling     = false;
var isGrounded    = true;

// Roll vars
var rollProgress  = 0;
var rollStartPos  = new THREE.Vector3();
var rollEndPos    = new THREE.Vector3();

// Spell vars
var spellActive   = false;
var spellTimer    = 0;

// Stats
var hp = 100, mp = 100, mpRegen = 0;
var comboCount = 0, comboTimer = 0;
var comboTO = null;

// Pre-alloc vectors
var _vecA = new THREE.Vector3();
var _vecB = new THREE.Vector3();
var _quatA = new THREE.Quaternion();
var _fwd   = new THREE.Vector3();

// Input
var keys = {};
var joyX = 0, joyY = 0;

// FPS counter
var fpsFrames = 0, fpsTime = 0;
var fpsEl = document.getElementById('fps');

// HUD elements
var hpFill = document.getElementById('hpf');
var mpFill = document.getElementById('mpf');

function updateHUD() {
  hpFill.style.width = hp + '%';
  mpFill.style.width = mp + '%';
}

function showCombo(n) {
  var el  = document.getElementById('combo');
  var txt = document.getElementById('combo-txt');
  var colors = ['#ffcc00','#ff8800','#ff4400','#ff00bb','#aa00ff'];
  txt.textContent = '⚔️ ' + n + '× COMBO';
  txt.style.color = colors[Math.min(n - 2, colors.length - 1)];
  el.style.transform = 'translate(-50%,-50%) scale(1)';
  el.style.opacity   = '1';
  clearTimeout(comboTO);
  comboTO = setTimeout(function() {
    el.style.transform = 'translate(-50%,-50%) scale(0)';
    el.style.opacity   = '0';
  }, 900);
}

// ── Animation helpers ─────────────────────────────────────────────────────────

function stopAllAnims() {
  Object.keys(acts).forEach(function(k) {
    if (acts[k]) acts[k].stop();
  });
}

// Crossfade to a looping animation
function playAnim(name, fadeDur) {
  if (!acts[name]) return;
  if (fadeDur === undefined) fadeDur = 0.15;

  // Already playing this animation
  if (currentState === name && acts[name].isRunning()) return;

  // Fade out current
  var prev = acts[currentState];
  if (prev && prev !== acts[name] && prev.isRunning()) {
    prev.fadeOut(fadeDur);
  }

  // Fade in new
  acts[name].reset();
  acts[name].setEffectiveWeight(1);
  acts[name].fadeIn(fadeDur);
  acts[name].play();
  currentState = name;
}

// Play a one-shot animation then return to idle
function playOnceAnim(name, fadeDur) {
  if (!acts[name]) {
    console.warn('No action for:', name);
    return;
  }
  if (fadeDur === undefined) fadeDur = 0.1;

  // Fade out all currently running
  Object.keys(acts).forEach(function(k) {
    if (acts[k] && acts[k] !== acts[name] && acts[k].isRunning()) {
      acts[k].fadeOut(fadeDur);
    }
  });

  acts[name].stop();
  acts[name].reset();
  acts[name].setLoop(THREE.LoopOnce);
  acts[name].clampWhenFinished = true;
  acts[name].setEffectiveWeight(1);
  acts[name].fadeIn(fadeDur);
  acts[name].play();
  currentState = name;
}

// Return to idle from a one-shot
function returnToIdle() {
  isAttacking = false;
  isCasting   = false;
  isRolling   = false;
  swordGroup.visible = false;
  if (acts.idle) {
    var cur = acts[currentState];
    if (cur && cur !== acts.idle) cur.fadeOut(0.15);
    acts.idle.reset();
    acts.idle.setEffectiveWeight(1);
    acts.idle.setLoop(THREE.LoopRepeat);
    acts.idle.fadeIn(0.15);
    acts.idle.play();
    currentState = STATE.IDLE;
  }
}

// ── Load all GLBs ─────────────────────────────────────────────────────────────
var ASSET_LIST = [
  { key: 'char',   url: 'character.glb?v=2' },
  { key: 'idle',   url: 'Idle.glb?v=2'      },
  { key: 'walk',   url: 'Walking.glb?v=2'   },
  { key: 'run',    url: 'Running.glb?v=2'   },
  { key: 'sprint', url: 'Sprint.glb?v=2'    },
  { key: 'atk1',   url: 'Attack1.glb?v=2'   },
  { key: 'atk2',   url: 'Attack2.glb?v=2'   },
  { key: 'spell',  url: 'CastSpell.glb?v=2' },
  { key: 'roll',   url: 'Roll.glb?v=2'      },
];

var loaded = {};
var loadCount = 0;
var loader = new THREE.GLTFLoader();

function loadAsset(i) {
  if (i >= ASSET_LIST.length) {
    onAllLoaded();
    return;
  }
  var item = ASSET_LIST[i];
  setStatus('Loading ' + item.url + ' (' + (i + 1) + '/' + ASSET_LIST.length + ')');

  loader.load(
    item.url,
    function(gltf) {
      loaded[item.key] = gltf;
      loadCount++;
      barEl.style.width = (loadCount / ASSET_LIST.length * 100) + '%';
      loadAsset(i + 1);
    },
    function(xhr) {
      if (xhr.total) setStatus(item.url + ' ' + Math.round(xhr.loaded / xhr.total * 100) + '%');
    },
    function(err) {
      setStatus('FAILED: ' + item.url + ' — ' + (err.message || err), '#f44');
    }
  );
}

loadAsset(0);

// ── After all assets loaded ───────────────────────────────────────────────────
function onAllLoaded() {
  setStatus('Building character…');

  // ── Setup character mesh ──────────────────────────────────────────────────
  character = loaded.char.scene;

  // Mixamo FBX is in centimeters, scale to meters
  character.scale.setScalar(0.01);

  // Traverse: set up bones, improve materials
  character.traverse(function(obj) {
    if (obj.isMesh) {
      // Ensure materials are visible and bright
      var mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(function(m) {
        m.roughness  = 0.85;
        m.metalness  = 0.0;
        m.needsUpdate = true;
      });
    }
    if (obj.isBone) {
      var n = obj.name;
      if (n === 'mixamorig7RightHand') rightHand = obj;
      if (n === 'mixamorig7LeftHand')  leftHand  = obj;
    }
  });

  // Place character at origin, feet on ground
  character.position.set(0, 0, 0);
  character.rotation.set(0, 0, 0);
  scene.add(character);

  // ── Setup AnimationMixer ──────────────────────────────────────────────────
  mixer = new THREE.AnimationMixer(character);

  // Listen for when one-shot animations finish
  mixer.addEventListener('finished', function(e) {
    var clipName = e.action._clip.name;
    console.log('Anim finished:', clipName);
    returnToIdle();
  });

  // Helper: get first animation clip from a loaded GLTF
  function getClip(key, name) {
    var g = loaded[key];
    if (!g || !g.animations || g.animations.length === 0) {
      console.warn('No animations in:', key);
      return null;
    }
    var clip = g.animations[0].clone();
    clip.name = name;
    return clip;
  }

  // Build action map
  var clipDefs = [
    { key: 'idle',   name: STATE.IDLE,   loop: true  },
    { key: 'walk',   name: STATE.WALK,   loop: true  },
    { key: 'run',    name: STATE.RUN,    loop: true  },
    { key: 'sprint', name: STATE.SPRINT, loop: true  },
    { key: 'atk1',   name: STATE.ATK1,   loop: false },
    { key: 'atk2',   name: STATE.ATK2,   loop: false },
    { key: 'spell',  name: STATE.SPELL,  loop: false },
    { key: 'roll',   name: STATE.ROLL,   loop: false },
  ];

  clipDefs.forEach(function(def) {
    var clip = getClip(def.key, def.name);
    if (!clip) return;

    var action = mixer.clipAction(clip);
    if (def.loop) {
      action.setLoop(THREE.LoopRepeat);
    } else {
      action.setLoop(THREE.LoopOnce);
      action.clampWhenFinished = true;
    }
    action.setEffectiveWeight(1);
    acts[def.name] = action;
    console.log('Action ready:', def.name, 'tracks:', clip.tracks.length);
  });

  // Start idle
  if (acts[STATE.IDLE]) {
    acts[STATE.IDLE].play();
    currentState = STATE.IDLE;
  }

  // ── Done ─────────────────────────────────────────────────────────────────
  barEl.style.width = '100%';
  setStatus('Ready!', '#66ff88');
  setTimeout(function() {
    document.getElementById('loading').style.display = 'none';
  }, 300);
}

// ── Controls ──────────────────────────────────────────────────────────────────

// Keyboard
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup',   function(e) { keys[e.code] = false; });

// Mouse camera
var isDragging = false, lastMX = 0, lastMY = 0;
document.addEventListener('mousedown', function(e) { isDragging = true; lastMX = e.clientX; lastMY = e.clientY; });
document.addEventListener('mouseup',   function() { isDragging = false; });
document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  camYaw   -= (e.clientX - lastMX) * 0.005;
  camPitch -= (e.clientY - lastMY) * 0.004;
  camPitch  = Math.max(0.05, Math.min(0.75, camPitch));
  lastMX = e.clientX; lastMY = e.clientY;
});
document.addEventListener('wheel', function(e) {
  camDist = Math.max(1.5, Math.min(8, camDist + e.deltaY * 0.007));
}, { passive: true });

// Resize
window.addEventListener('resize', function() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── Mobile Joystick ───────────────────────────────────────────────────────────
var jBase = document.getElementById('jbase');
var jKnob = document.getElementById('jknob');
var JOY_R = 37;
var joyActive = false, joyCX = 0, joyCY = 0;
var joyTouchId = -1;

jBase.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.changedTouches[0];
  joyTouchId = t.identifier;
  joyActive  = true;
  var r = jBase.getBoundingClientRect();
  joyCX = r.left + r.width  / 2;
  joyCY = r.top  + r.height / 2;
}, { passive: false });

document.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var t = e.changedTouches[ti];
    if (t.identifier === joyTouchId && joyActive) {
      var dx = t.clientX - joyCX;
      var dy = t.clientY - joyCY;
      var dist = Math.hypot(dx, dy);
      if (dist > JOY_R) { dx *= JOY_R / dist; dy *= JOY_R / dist; }
      jKnob.style.left = (37 + dx) + 'px';
      jKnob.style.top  = (37 + dy) + 'px';
      joyX = dx / JOY_R;
      joyY = dy / JOY_R;
    }
  }
}, { passive: false });

function resetJoy() {
  joyActive  = false;
  joyTouchId = -1;
  jKnob.style.left = '37px';
  jKnob.style.top  = '37px';
  joyX = 0; joyY = 0;
}
document.addEventListener('touchend', function(e) {
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    if (e.changedTouches[ti].identifier === joyTouchId) resetJoy();
  }
});
document.addEventListener('touchcancel', function() { resetJoy(); });

// ── Camera touch (swipe middle area) ─────────────────────────────────────────
var camTouch = null;
document.addEventListener('touchstart', function(e) {
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var t = e.changedTouches[ti];
    var rx = t.clientX / window.innerWidth;
    if (rx > 0.35 && rx < 0.70 && !camTouch) {
      camTouch = { id: t.identifier, x: t.clientX, y: t.clientY };
    }
  }
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  if (!camTouch) return;
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var t = e.changedTouches[ti];
    if (t.identifier !== camTouch.id) continue;
    camYaw   -= (t.clientX - camTouch.x) * 0.006;
    camPitch -= (t.clientY - camTouch.y) * 0.004;
    camPitch  = Math.max(0.05, Math.min(0.75, camPitch));
    camTouch.x = t.clientX; camTouch.y = t.clientY;
  }
}, { passive: true });
document.addEventListener('touchend', function(e) {
  if (!camTouch) return;
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    if (e.changedTouches[ti].identifier === camTouch.id) camTouch = null;
  }
});

// ── Mobile action buttons ─────────────────────────────────────────────────────
function makeMobileBtn(id, code) {
  var el = document.getElementById(id);
  el.addEventListener('touchstart', function(e) {
    e.preventDefault(); e.stopPropagation();
    keys[code] = true;
    el.classList.add('on');
  }, { passive: false });
  el.addEventListener('touchend', function() {
    keys[code] = false;
    el.classList.remove('on');
  });
  el.addEventListener('touchcancel', function() {
    keys[code] = false;
    el.classList.remove('on');
  });
}
makeMobileBtn('bb-j', 'Space');
makeMobileBtn('bb-a', 'KeyJ');
makeMobileBtn('bb-b', 'KeyK');
makeMobileBtn('bb-s', 'KeyL');
makeMobileBtn('bb-r', 'KeyR');

// ── Main Game Loop ────────────────────────────────────────────────────────────
function gameLoop() {
  requestAnimationFrame(gameLoop);
  var dt = Math.min(clock.getDelta(), 0.05);

  // FPS counter
  fpsFrames++;
  fpsTime += dt;
  if (fpsTime >= 1.0) {
    fpsEl.textContent = fpsFrames + ' fps';
    fpsFrames = 0; fpsTime = 0;
  }

  // Render even before character loads (so scene is visible)
  if (!character || !mixer) {
    renderer.render(scene, camera);
    return;
  }

  // ── Read movement input ────────────────────────────────────────────────
  var moveX = joyX;
  var moveZ = joyY;
  if (keys['KeyA'] || keys['ArrowLeft'])  moveX -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) moveX += 1;
  if (keys['KeyW'] || keys['ArrowUp'])    moveZ -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  moveZ += 1;

  var moveLen = Math.hypot(moveX, moveZ);
  var isMoving  = moveLen > 0.04;
  var isSprinting = isMoving && (keys['ShiftLeft'] || keys['ShiftRight']);

  // ── Movement ───────────────────────────────────────────────────────────
  var moveSpeed = 0;
  if (isMoving) {
    if (isSprinting)        moveSpeed = 8.5;
    else if (moveLen > 0.6) moveSpeed = 5.0;
    else                    moveSpeed = 2.5;
  }

  if (isMoving && !isRolling) {
    var nx = moveX / moveLen;
    var nz = moveZ / moveLen;
    // Rotate move direction by camera yaw
    var wx =  nx * Math.cos(camYaw) + nz * Math.sin(camYaw);
    var wz = -nx * Math.sin(camYaw) + nz * Math.cos(camYaw);

    character.position.x += wx * moveSpeed * dt;
    character.position.z += wz * moveSpeed * dt;

    // Smooth character turn to face movement direction
    var targetYaw = Math.atan2(wx, wz);
    var curYaw    = character.rotation.y;
    var diff = targetYaw - curYaw;
    while (diff >  Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    character.rotation.y += diff * 12 * dt;
  }

  // ── Gravity & Jump ─────────────────────────────────────────────────────
  if (!isRolling) {
    velY    += GRAVITY * dt;
    charY   += velY * dt;
    if (charY <= 0) {
      charY  = 0;
      velY   = 0;
      isGrounded = true;
    } else {
      isGrounded = false;
    }
  }
  character.position.y = charY;

  // Jump
  if (keys['Space'] && isGrounded && !isAttacking && !isRolling && !isCasting) {
    velY    = JUMP_V;
    charY   = 0.01;
    isGrounded = false;
    keys['Space'] = false;
  }

  // ── Roll movement ──────────────────────────────────────────────────────
  if (isRolling) {
    rollProgress = Math.min(1, rollProgress + dt * 2.8);
    character.position.lerpVectors(rollStartPos, rollEndPos, rollProgress);
    character.position.y = Math.sin(rollProgress * Math.PI) * 0.3;
    charY = character.position.y;
  }

  // ── Actions (only when free) ───────────────────────────────────────────
  if (!isAttacking && !isCasting && !isRolling) {

    // Attack 1 — J button
    if (keys['KeyJ']) {
      keys['KeyJ']  = false;
      isAttacking   = true;
      swordGroup.visible = true;
      comboCount++;
      comboTimer = 1.8;
      if (comboCount >= 2) showCombo(comboCount);
      playOnceAnim(STATE.ATK1);
    }

    // Attack 2 — K button
    else if (keys['KeyK']) {
      keys['KeyK']  = false;
      isAttacking   = true;
      swordGroup.visible = true;
      comboCount++;
      comboTimer = 1.8;
      if (comboCount >= 2) showCombo(comboCount);
      playOnceAnim(STATE.ATK2);
    }

    // Spell — L button (costs 25 MP)
    else if (keys['KeyL'] && mp >= 25) {
      keys['KeyL']  = false;
      isCasting     = true;
      mp = Math.max(0, mp - 25);
      updateHUD();
      spellActive   = true;
      spellTimer    = 1.5;
      laserGroup.visible = true;
      laserLight.intensity = 9;
      playOnceAnim(STATE.SPELL);
    }

    // Roll — R or Ctrl
    else if (keys['KeyR'] || keys['ControlLeft']) {
      keys['KeyR']       = false;
      keys['ControlLeft'] = false;
      isRolling      = true;
      rollProgress   = 0;
      rollStartPos.copy(character.position);
      _fwd.set(Math.sin(character.rotation.y), 0, Math.cos(character.rotation.y));
      rollEndPos.copy(character.position).addScaledVector(_fwd, 3.0);
      rollEndPos.y = 0;
      playOnceAnim(STATE.ROLL);
    }
  }

  // ── Combo timer ────────────────────────────────────────────────────────
  comboTimer -= dt;
  if (comboTimer <= 0) { comboTimer = 0; comboCount = 0; }

  // ── MP regen ───────────────────────────────────────────────────────────
  mpRegen += dt;
  if (mpRegen >= 0.45) {
    mpRegen = 0;
    mp = Math.min(100, mp + 4);
    updateHUD();
  }

  // ── Locomotion animation state machine ────────────────────────────────
  // Only change locomotion when not in a one-shot action
  if (!isAttacking && !isCasting && !isRolling) {
    swordGroup.visible = false;
    if (!isGrounded) {
      // In air — keep current anim or play run
      if (currentState !== STATE.RUN && currentState !== STATE.SPRINT) {
        playAnim(STATE.RUN, 0.1);
      }
    } else if (isSprinting) {
      playAnim(STATE.SPRINT, 0.15);
    } else if (moveSpeed >= 4.0) {
      playAnim(STATE.RUN, 0.15);
    } else if (moveSpeed > 0) {
      playAnim(STATE.WALK, 0.15);
    } else {
      playAnim(STATE.IDLE, 0.2);
    }
  }

  // ── Sword: attach to right hand bone ──────────────────────────────────
  if (rightHand) {
    rightHand.getWorldPosition(_vecA);
    rightHand.getWorldQuaternion(_quatA);
    swordGroup.position.copy(_vecA);
    swordGroup.quaternion.copy(_quatA);
    swordGroup.rotateX(Math.PI * 0.5);
    swordGroup.rotateZ(-0.08);
  } else {
    // Fallback: position sword in front of character
    _fwd.set(Math.sin(character.rotation.y), 0, Math.cos(character.rotation.y));
    swordGroup.position.copy(character.position).addScaledVector(_fwd, 0.3);
    swordGroup.position.y = character.position.y + 1.1;
    swordGroup.rotation.y = character.rotation.y;
    swordGroup.rotateX(Math.PI * 0.5);
  }

  // ── Laser: attach to left hand bone ───────────────────────────────────
  if (leftHand) {
    leftHand.getWorldPosition(_vecA);
    leftHand.getWorldQuaternion(_quatA);
    laserGroup.position.copy(_vecA);
    laserGroup.quaternion.copy(_quatA);
    laserGroup.rotateY(Math.PI);
    laserGroup.rotateX(-0.2);
  } else {
    laserGroup.position.copy(character.position);
    laserGroup.position.y = character.position.y + 1.35;
    laserGroup.rotation.y = character.rotation.y + Math.PI;
  }

  // ── Fire particles on sword ────────────────────────────────────────────
  if (swordGroup.visible) {
    var fp = fireGeo.attributes.position;
    var now = performance.now() * 0.001;
    for (var fIdx = 0; fIdx < fireData.length; fIdx++) {
      var fd = fireData[fIdx];
      fd.t += fd.sp * dt;
      if (fd.t > 1) fd.t = 0;
      fp.array[fIdx * 3]     = fd.ox + Math.sin(now * 4 + fIdx * 0.7) * 0.018;
      fp.array[fIdx * 3 + 1] = fd.by + fd.t * 0.28;
      fp.array[fIdx * 3 + 2] = fd.oz;
    }
    fp.needsUpdate = true;
    swordLight.intensity = 3.5 + Math.sin(now * 10) * 0.8;
    swordLight.color.setHSL(0.07 + Math.sin(now * 6) * 0.03, 1, 0.55);
  }

  // ── Laser pulse ────────────────────────────────────────────────────────
  if (spellActive) {
    spellTimer -= dt;
    var pulse = 0.75 + Math.sin(performance.now() * 0.022) * 0.25;
    laserOuterMat.opacity = 0.5  * pulse;
    laserCoreMat.opacity  = 0.95 * pulse;
    laserImpMat.opacity   = 0.4  * pulse;
    laserLight.intensity  = 9 * pulse;
    if (spellTimer <= 0) {
      laserGroup.visible = false;
      spellActive = false;
      laserLight.intensity = 0;
    }
  }

  // ── Float ambient particles ────────────────────────────────────────────
  for (var pIdx = 0; pIdx < PART_COUNT; pIdx++) {
    partPos[pIdx * 3 + 1] += 0.003 * dt * 60;
    if (partPos[pIdx * 3 + 1] > 6) partPos[pIdx * 3 + 1] = 0.3;
  }
  partGeo.attributes.position.needsUpdate = true;

  // ── Update mixer ───────────────────────────────────────────────────────
  mixer.update(dt);

  // ── Camera follow ──────────────────────────────────────────────────────
  _vecB.copy(character.position);
  _vecB.y += 0.9;  // aim at torso
  camTarget.lerp(_vecB, 10 * dt);

  var cpx = camTarget.x + Math.sin(camYaw)   * Math.cos(camPitch) * camDist;
  var cpy = camTarget.y + Math.sin(camPitch)  * camDist;
  var cpz = camTarget.z + Math.cos(camYaw)   * Math.cos(camPitch) * camDist;
  camera.position.set(cpx, cpy, cpz);
  camera.lookAt(camTarget);

  renderer.render(scene, camera);
}

gameLoop();
</script>
</body>
