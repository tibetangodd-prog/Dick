<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06000d">
<title>вҡ”пёҸ Blade &amp; Spell</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06000d;overflow:hidden;font-family:system-ui,sans-serif;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#loading{position:fixed;inset:0;background:radial-gradient(ellipse at center,#140022 0%,#04000e 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
#loading h1{font-size:clamp(1.5rem,5vw,2.6rem);letter-spacing:.2em;color:#c090ff;margin-bottom:.4rem;text-shadow:0 0 25px #7030ff;}

.slbl{font-size:.58rem;font-weight:700;width:16px;}

.hp-t{width:clamp(80px,16vw,150px);background:#280606;}
.mp-t{width:clamp(65px,12vw,110px);background:#060620;}
.hp-f{height:100%;background:linear-gradient(90deg,#bb2222,#ff5555);border-radius:2px;transition:width .25s;}
.mp-f{height:100%;background:linear-gradient(90deg,#2244bb,#5577ff);border-radius:2px;transition:width .25s;}
#combo{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:20;text-align:center;transition:transform .16s cubic-bezier(.34,1.56,.64,1),opacity .2s;}
#combo-main{font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:900;text-shadow:0 0 12px currentColor;color:#ffcc00;}

#jzone{position:fixed;bottom:22px;left:16px;width:108px;height:108px;pointer-events:all;z-index:15;display:none;}
#jbase{width:108px;height:108px;border-radius:50%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.13);position:relative;}
#jknob{width:40px;height:40px;border-radius:50%;background:rgba(160,110,255,.5);border:1.5px solid rgba(170,120,255,.7);position:absolute;top:34px;left:34px;box-shadow:0 0 8px rgba(120,60,255,.5);}

.brow{display:flex;gap:7px;}
.gb{width:48px;height:48px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);background:rgba(0,0,0,.6);color:#fff;font-size:1.05rem;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;-webkit-user-select:none;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.gb:active,.gb.on{opacity:.55;transform:scale(.88);}
#bb-j{background:rgba(50,120,255,.32);border-color:rgba(50,120,255,.5);}
#bb-a{background:rgba(210,50,50,.32);border-color:rgba(210,50,50,.5);}
#bb-b{background:rgba(210,120,0,.28);border-color:rgba(210,120,0,.5);}
#bb-s{background:rgba(40,40,220,.32);border-color:rgba(40,40,220,.55);}

@media(hover:none)and(pointer:coarse){#jzone,#btns{display:flex;}#hint{display:none;}}
</style>
</head>
<body>
<div id="ver">v13</div>
<div id="loading">
  <h1>вҡ”пёҸ BLADE &amp; SPELL</h1>
  <p>LOADING WORLD</p>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="load-status">v13 вҖ” StartingвҖҰ</div>
</div>
<div id="hud">
  <div class="srow"><span class="slbl hp-l">HP</span><div class="strack hp-t"><div class="hp-f" id="hpf" style="width:100%"></div></div></div>

</div>

<div id="jzone"><div id="jbase"><div id="jknob"></div></div></div>
<div id="btns">
  <div class="brow"><button class="gb" id="bb-s">вңЁ</button><button class="gb" id="bb-j">вҶ‘</button></div>
  <div class="brow"><button class="gb" id="bb-r">рҹ”„</button><button class="gb" id="bb-b">рҹ—ЎпёҸ</button><button class="gb" id="bb-a">вҡ”пёҸ</button></div>
</div>

<script>
// з«ӢеҚіиЁӯе®ҡзӢҖж…Ӣ
var stEl=document.getElementById('load-status');
var barEl=document.getElementById('bar');
function setStatus(msg,col){stEl.textContent='v13 вҖ” '+msg;stEl.style.color=col||'#555';}
setStatus('Loading bundleвҖҰ');

// е…ЁеұҖйҢҜиӘӨжҚ•жҚү
window.onerror=function(msg,src,line,col,err){
  setStatus('JS ERROR: '+msg+' ('+src.split('/').pop()+':'+line+')','#ff4444');
  return true;
};

// еӢ•ж…Ӣијүе…Ҙ bundleпјҢжҚ•жҚү onerror
var s=document.createElement('script');
s.src='three.bundle.js';
s.onload=function(){
  setStatus('Bundle loaded, checking THREEвҖҰ');
  if(typeof THREE==='undefined'){
    setStatus('ERROR: THREE undefined after load','#ff4444');
    return;
  }
  if(typeof THREE.GLTFLoader==='undefined'){
    setStatus('ERROR: GLTFLoader undefined, THREE keys: '+Object.keys(THREE).slice(0,5).join(','),'#ff4444');
    return;
  }
  setStatus('THREE OK! Starting gameвҖҰ','#88ff88');
  setTimeout(startGame,50);
};
s.onerror=function(e){
  setStatus('ERROR: Failed to load three.bundle.js вҖ” '+JSON.stringify(e.type),'#ff4444');
};
document.head.appendChild(s);
</script>

<script id="game-script">
function startGame(){
var stEl=document.getElementById('load-status');
var barEl=document.getElementById('bar');
function setStatus(msg,col){stEl.textContent='v13 вҖ” '+msg;stEl.style.color=col||'#555';}
try{
  var mobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&innerWidth<1024);

  // Force show mobile controls based on JS detection (more reliable than CSS)
  if(mobile){
    document.getElementById('jzone').style.display='flex';
    document.getElementById('btns').style.display='flex';
    document.getElementById('hint').style.display='none';
  }
  var renderer=new THREE.WebGLRenderer({antialias:!mobile,powerPreference:'high-performance'});
  renderer.setPixelRatio(mobile?Math.min(devicePixelRatio,1.5):Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=!mobile;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  var scene=new THREE.Scene();
  scene.background=new THREE.Color(0x06000d);
  // No fog for better visibility
  var camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.05,mobile?100:180);

  scene.add(new THREE.AmbientLight(0xffffff, mobile?3:2));

  var sun=new THREE.DirectionalLight(0xffffff, 2.5);
  sun.position.set(6,12,4); scene.add(sun);
  var front=new THREE.DirectionalLight(0xffffff, 2.0);
  front.position.set(0,3,8); scene.add(front);
  var fill=new THREE.DirectionalLight(0x8888ff, 1.5);
  fill.position.set(-5,5,-3); scene.add(fill);

  var ground=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshStandardMaterial({color:0x150720,roughness:.95,metalness:.05}));
  ground.rotation.x=-Math.PI/2;ground.receiveShadow=!mobile;scene.add(ground);
  [[3,.04,0x8040ff,.35],[2.5,.025,0x5028bb,.2],[3.8,.018,0x3818aa,.14]].forEach(function(c){var m=new THREE.Mesh(new THREE.RingGeometry(c[0]-c[1],c[0],48),new THREE.MeshBasicMaterial({color:c[2],side:THREE.DoubleSide,transparent:true,opacity:c[3]}));m.rotation.x=-Math.PI/2;m.position.y=.003;scene.add(m);});
  for(var ri=0;ri<12;ri++){var ra=(ri/12)*Math.PI*2;var rd=new THREE.Mesh(new THREE.CircleGeometry(.048,6),new THREE.MeshBasicMaterial({color:0xff88ff,transparent:true,opacity:.7,side:THREE.DoubleSide}));rd.position.set(Math.cos(ra)*3,.004,Math.sin(ra)*3);rd.rotation.x=-Math.PI/2;scene.add(rd);}
  var PC=mobile?4:6;
  for(var pi=0;pi<PC;pi++){var pa=(pi/PC)*Math.PI*2,PR=13;var pp=new THREE.Mesh(new THREE.CylinderGeometry(.25,.35,7,6),new THREE.MeshStandardMaterial({color:0x1e1028,roughness:.85}));pp.position.set(Math.cos(pa)*PR,3.5,Math.sin(pa)*PR);if(!mobile)pp.castShadow=true;scene.add(pp);var orb=new THREE.Mesh(new THREE.SphereGeometry(.19,7,6),new THREE.MeshBasicMaterial({color:0x8848ff}));orb.position.set(Math.cos(pa)*PR,7.4,Math.sin(pa)*PR);scene.add(orb);if(!mobile||(pi%2===0)){var pl=new THREE.PointLight(0x7838ee,2.2,8);pl.position.copy(orb.position);scene.add(pl);}}
  var PN=mobile?30:70,pPos=new Float32Array(PN*3);
  for(var ppi=0;ppi<PN;ppi++){pPos[ppi*3]=(Math.random()-.5)*26;pPos[ppi*3+1]=Math.random()*5+.5;pPos[ppi*3+2]=(Math.random()-.5)*26;}
  var pGeo=new THREE.BufferGeometry();pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
  scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x8858ff,size:.07,transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false})));

  var sword=new THREE.Group();
  var sb=new THREE.Mesh(new THREE.BoxGeometry(.042,1.08,.007),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xff6400,emissiveIntensity:.85,metalness:.95,roughness:.08}));sb.position.y=.63;sword.add(sb);
  var sg=new THREE.Mesh(new THREE.BoxGeometry(.26,.036,.036),new THREE.MeshStandardMaterial({color:0xd09e14,metalness:.95,roughness:.15}));sg.position.y=.065;sword.add(sg);
  var sh=new THREE.Mesh(new THREE.CylinderGeometry(.02,.02,.26,7),new THREE.MeshStandardMaterial({color:0x391600,roughness:.85}));sh.position.y=-.07;sword.add(sh);
  var sm=new THREE.Mesh(new THREE.SphereGeometry(.034,7,7),new THREE.MeshStandardMaterial({color:0xd09e14,metalness:.95,roughness:.15}));sm.position.y=-.2;sword.add(sm);
  var sfl=new THREE.PointLight(0xff6600,3.2,1.5);sfl.position.y=.9;sword.add(sfl);
  var FN=mobile?20:44,sfp=new Float32Array(FN*3);
  var sfd=[];for(var fi=0;fi<FN;fi++)sfd.push({t:Math.random(),s:.5+Math.random()*1.5,ox:(Math.random()-.5)*.032,oz:(Math.random()-.5)*.005,by:.1+Math.random()*.85});
  var sfgeo=new THREE.BufferGeometry();sfgeo.setAttribute('position',new THREE.BufferAttribute(sfp,3));
  sword.add(new THREE.Points(sfgeo,new THREE.PointsMaterial({color:0xff8000,size:.038,transparent:true,opacity:.85,blending:THREE.AdditiveBlending,depthWrite:false})));
  sword.visible=false;scene.add(sword);

  var laser=new THREE.Group(),LL=19;
  var lout=new THREE.Mesh(new THREE.CylinderGeometry(.042,.042,LL,7),new THREE.MeshBasicMaterial({color:0x28ccff,transparent:true,opacity:.48,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide}));lout.rotation.x=Math.PI/2;lout.position.z=-LL/2;laser.add(lout);
  var lcore=new THREE.Mesh(new THREE.CylinderGeometry(.01,.01,LL,5),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.9,blending:THREE.AdditiveBlending,depthWrite:false}));lcore.rotation.x=Math.PI/2;lcore.position.z=-LL/2;laser.add(lcore);
  var limp=new THREE.Mesh(new THREE.SphereGeometry(.3,7,7),new THREE.MeshBasicMaterial({color:0x44eeff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false}));limp.position.z=-LL;laser.add(limp);
  var lll=new THREE.PointLight(0x00ccff,0,8);laser.add(lll);
  laser.visible=false;scene.add(laser);

  var character=null,mixer=null,rHand=null,lHand=null,acts={};
  var clock=new THREE.Clock();
  var yaw=0,pitch=.2,cDist=4;
  var cTgt=new THREE.Vector3();
  var velY=0,charY=0,GV=-22,JV=9;
  var curAnim='idle',attacking=false,casting=false,rolling=false;
  var hp=100,mp=100,mpT=0,combo=0,comboT=0;
  var spellOn=false,spellT=0,rollP=0;
  var rS=new THREE.Vector3(),rE=new THREE.Vector3();
  var _p=new THREE.Vector3(),_q=new THREE.Quaternion(),_f=new THREE.Vector3(),_c=new THREE.Vector3();
  var keys={},joy={x:0,y:0};

  var URLS=['character.glb?v=2','Idle.glb?v=2','Walking.glb?v=2','Running.glb?v=2','Sprint.glb?v=2','Attack1.glb?v=2','Attack2.glb?v=2','CastSpell.glb?v=2','Roll.glb?v=2'];
  var gltfs=[],ldr=new THREE.GLTFLoader();
  function loadNext(i){
    if(i>=URLS.length){onAllLoaded();return;}
    setStatus('Loading '+URLS[i]+' ('+(i+1)+'/'+URLS.length+')');
    ldr.load(URLS[i],function(g){gltfs.push(g);barEl.style.width=((i+1)/URLS.length*100)+'%';loadNext(i+1);},
      function(xhr){if(xhr.total)setStatus(URLS[i]+' '+(xhr.loaded/xhr.total*100|0)+'%');},
      function(err){setStatus('FAILED: '+URLS[i]+' вҖ” '+err,'#ff4444');});
  }
  loadNext(0);

  function onAllLoaded(){
    setStatus('Building sceneвҖҰ');
    character=gltfs[0].scene;character.scale.setScalar(.01);
    character.traverse(function(o){
      if(o.isMesh){o.castShadow=false;o.receiveShadow=false;
        var mats=Array.isArray(o.material)?o.material:[o.material];
        mats.forEach(function(m){m.roughness=1;m.metalness=0;m.needsUpdate=true;});}
      if(o.isBone){if(o.name==='mixamorig7RightHand')rHand=o;if(o.name==='mixamorig7LeftHand')lHand=o;}
    });
    scene.add(character);
    mixer=new THREE.AnimationMixer(character);
    [['idle',1],['walk',2],['run',3],['sprint',4],['atk1',5],['atk2',6],['spell',7],['roll',8]].forEach(function(p){var cl=gltfs[p[1]].animations&&gltfs[p[1]].animations[0];if(!cl)return;cl.name=p[0];acts[p[0]]=mixer.clipAction(cl);});
    ['atk1','atk2','spell','roll'].forEach(function(n){if(acts[n]){acts[n].setLoop(THREE.LoopOnce);acts[n].clampWhenFinished=true;}});
    mixer.addEventListener('finished',function(e){var n=e.action._clip.name;if(n==='atk1'||n==='atk2')attacking=false;if(n==='spell')casting=false;if(n==='roll'){rolling=false;velY=0;}});
    if(acts.idle)acts.idle.play();curAnim='idle';
    barEl.style.width='100%';setStatus('Ready!','#66ff88');
    setTimeout(function(){document.getElementById('loading').style.display='none';},350);
    tick();
  }

  var drag=false,lx=0,ly=0;
  document.addEventListener('mousedown',function(e){drag=true;lx=e.clientX;ly=e.clientY;});
  document.addEventListener('mouseup',function(){drag=false;});
  document.addEventListener('mousemove',function(e){if(!drag)return;yaw-=(e.clientX-lx)*.005;pitch-=(e.clientY-ly)*.004;pitch=Math.max(.04,Math.min(.82,pitch));lx=e.clientX;ly=e.clientY;});
  document.addEventListener('wheel',function(e){cDist=Math.max(2,Math.min(10,cDist+e.deltaY*.008));},{passive:true});
  document.addEventListener('keydown',function(e){keys[e.code]=true;});
  document.addEventListener('keyup',function(e){keys[e.code]=false;});
  window.addEventListener('resize',function(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});
  var jb=document.getElementById('jbase'),jk=document.getElementById('jknob'),JR=34,ja=false,jcx=0,jcy=0;
  jb.addEventListener('touchstart',function(e){e.preventDefault();ja=true;var r=jb.getBoundingClientRect();jcx=r.left+r.width/2;jcy=r.top+r.height/2;},{passive:false});
  document.addEventListener('touchmove',function(e){e.preventDefault();for(var ti=0;ti<e.changedTouches.length;ti++){var t=e.changedTouches[ti];if(t.clientX/innerWidth<.42&&ja){var dx=t.clientX-jcx,dy=t.clientY-jcy,dd=Math.hypot(dx,dy);if(dd>JR){dx*=JR/dd;dy*=JR/dd;}jk.style.left=(34+dx)+'px';jk.style.top=(34+dy)+'px';joy.x=dx/JR;joy.y=dy/JR;}}},{passive:false});
  document.addEventListener('touchend',function(e){var h=false;for(var ti=0;ti<e.touches.length;ti++)if(e.touches[ti].clientX/innerWidth<.42)h=true;if(!h&&ja){ja=false;jk.style.left='34px';jk.style.top='34px';joy.x=0;joy.y=0;}});
  var ct=null;
  document.addEventListener('touchstart',function(e){for(var ti=0;ti<e.changedTouches.length;ti++){var t=e.changedTouches[ti],rx=t.clientX/innerWidth;if(rx>.38&&rx<.72&&!ct)ct={id:t.identifier,x:t.clientX,y:t.clientY};}},{passive:true});
  document.addEventListener('touchmove',function(e){if(!ct)return;for(var ti=0;ti<e.changedTouches.length;ti++){var t=e.changedTouches[ti];if(t.identifier!==ct.id)continue;yaw-=(t.clientX-ct.x)*.006;pitch-=(t.clientY-ct.y)*.004;pitch=Math.max(.04,Math.min(.82,pitch));ct.x=t.clientX;ct.y=t.clientY;}},{passive:true});
  document.addEventListener('touchend',function(e){if(!ct)return;for(var ti=0;ti<e.changedTouches.length;ti++)if(e.changedTouches[ti].identifier===ct.id)ct=null;},{passive:true});
  function gbtn(id,code){var el=document.getElementById(id);el.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();keys[code]=true;el.classList.add('on');},{passive:false});el.addEventListener('touchend',function(){keys[code]=false;el.classList.remove('on');});el.addEventListener('touchcancel',function(){keys[code]=false;el.classList.remove('on');});}
  gbtn('bb-j','Space');gbtn('bb-a','KeyJ');gbtn('bb-b','KeyK');gbtn('bb-s','KeyL');gbtn('bb-r','KeyR');
  function fadeTo(n,d){d=d||.13;if(curAnim===n||!acts[n])return;if(acts[curAnim])acts[curAnim].fadeOut(d);acts[n].reset().fadeIn(d).play();curAnim=n;}
  function oneShot(n){if(!acts[n])return;if(acts[curAnim])acts[curAnim].fadeOut(.1);acts[n].reset().fadeIn(.1).play();curAnim=n;}
  var hpf=document.getElementById('hpf'),mpf=document.getElementById('mpf');
  function hudUpdate(){hpf.style.width=hp+'%';mpf.style.width=mp+'%';}
  var cTO=null;
  function showCombo(n){var el=document.getElementById('combo'),m=document.getElementById('combo-main');var cols=['#ffcc00','#ff8800','#ff3300','#ff00aa','#aa00ff'];m.textContent='вҡ”пёҸ '+n+'Г— COMBO';m.style.color=cols[Math.min(n-2,4)];el.style.transform='translate(-50%,-50%) scale(1)';el.style.opacity='1';clearTimeout(cTO);cTO=setTimeout(function(){el.style.transform='translate(-50%,-50%) scale(0)';el.style.opacity='0';},800);}
  var fpsEl=document.getElementById('fps'),fF=0,fT=0;
  function tick(){
    requestAnimationFrame(tick);if(!character)return;
    var dt=Math.min(clock.getDelta(),.05);
    fF++;fT+=dt;if(fT>=1){fpsEl.textContent=fF+'fps';fF=0;fT=0;}
    var mx=joy.x,mz=joy.y;
    if(keys.KeyA||keys.ArrowLeft)mx-=1;if(keys.KeyD||keys.ArrowRight)mx+=1;if(keys.KeyW||keys.ArrowUp)mz-=1;if(keys.KeyS||keys.ArrowDown)mz+=1;
    var mv=Math.hypot(mx,mz)>.04,sp=mv&&(keys.ShiftLeft||keys.ShiftRight);
    var spd=sp?9.5:(mv?(Math.hypot(mx,mz)>.55?5.5:2.5):0);
    if(mv&&!rolling){var l=Math.hypot(mx,mz),nx=mx/l,nz=mz/l,wx=nx*Math.cos(yaw)+nz*Math.sin(yaw),wz=-nx*Math.sin(yaw)+nz*Math.cos(yaw);character.position.x+=wx*spd*dt;character.position.z+=wz*spd*dt;var td=Math.atan2(wx,wz)-character.rotation.y;while(td>Math.PI)td-=Math.PI*2;while(td<-Math.PI)td+=Math.PI*2;character.rotation.y+=td*12*dt;}
    if(!rolling){velY+=GV*dt;charY+=velY*dt;if(charY<0){charY=0;velY=0;}}
    character.position.y=charY;
    if(keys.Space&&charY<.05&&!attacking&&!rolling&&!casting){velY=JV;keys.Space=false;}
    if(!attacking&&!casting&&!rolling){
      if(keys.KeyJ){keys.KeyJ=false;attacking=true;sword.visible=true;combo++;comboT=1.8;if(combo>=2)showCombo(combo);oneShot('atk1');}
      else if(keys.KeyK){keys.KeyK=false;attacking=true;sword.visible=true;combo++;comboT=1.8;if(combo>=2)showCombo(combo);oneShot('atk2');}
      else if(keys.KeyL&&mp>=25){keys.KeyL=false;casting=true;mp=Math.max(0,mp-25);hudUpdate();spellOn=true;spellT=1.4;laser.visible=true;lll.intensity=8;oneShot('spell');}
      else if(keys.KeyR||keys.ControlLeft){keys.KeyR=keys.ControlLeft=false;rolling=true;rollP=0;rS.copy(character.position);_f.set(Math.sin(character.rotation.y),0,Math.cos(character.rotation.y));rE.copy(character.position).addScaledVector(_f,3);rE.y=0;oneShot('roll');}
    }
    if(rolling){rollP=Math.min(1,rollP+dt*2.8);character.position.lerpVectors(rS,rE,rollP);character.position.y=Math.sin(rollP*Math.PI)*.28;charY=character.position.y;}
    comboT-=dt;if(comboT<0){comboT=0;combo=0;}
    mpT+=dt;if(mpT>.44){mpT=0;mp=Math.min(100,mp+4);hudUpdate();}
    if(!attacking&&!casting&&!rolling){sword.visible=false;if(charY>.1){}else if(sp)fadeTo('sprint');else if(spd>3)fadeTo('run');else if(spd>0)fadeTo('walk');else fadeTo('idle');}
    if(rHand){rHand.getWorldPosition(_p);rHand.getWorldQuaternion(_q);sword.position.copy(_p);sword.quaternion.copy(_q);sword.rotateX(Math.PI*.5);sword.rotateZ(-.08);}
    else{_f.set(Math.sin(character.rotation.y),0,Math.cos(character.rotation.y));sword.position.copy(character.position).addScaledVector(_f,.34);sword.position.y+=1.1;sword.rotation.y=character.rotation.y;sword.rotateX(Math.PI*.5);}
    if(lHand){lHand.getWorldPosition(_p);lHand.getWorldQuaternion(_q);laser.position.copy(_p);laser.quaternion.copy(_q);laser.rotateY(Math.PI);laser.rotateX(-.18);}
    else{laser.position.copy(character.position);laser.position.y+=1.3;laser.rotation.y=character.rotation.y+Math.PI;}
    if(sword.visible){var pa=sfgeo.attributes.position,t=performance.now()*.001;for(var fi2=0;fi2<sfd.length;fi2++){var f=sfd[fi2];f.t+=f.s*dt;if(f.t>1)f.t=0;pa.array[fi2*3]=f.ox+Math.sin(t*4+fi2*.6)*.015;pa.array[fi2*3+1]=f.by+f.t*.27;pa.array[fi2*3+2]=f.oz;}pa.needsUpdate=true;sfl.intensity=3+Math.sin(performance.now()*.009)*.65;}
    if(spellOn){spellT-=dt;var pp=.78+Math.sin(performance.now()*.022)*.22;lout.material.opacity=.48*pp;lcore.material.opacity=.9*pp;limp.material.opacity=.4*pp;lll.intensity=8*pp;if(spellT<=0){laser.visible=false;spellOn=false;lll.intensity=0;}}
    for(var ppi2=0;ppi2<PN;ppi2++){pPos[ppi2*3+1]+=.003*dt*60;if(pPos[ppi2*3+1]>6)pPos[ppi2*3+1]=.3;}
    pGeo.attributes.position.needsUpdate=true;
    if(mixer)mixer.update(dt);
    _c.copy(character.position);_c.y+=0.8;cTgt.lerp(_c,10*dt);
    camera.position.set(cTgt.x+Math.sin(yaw)*Math.cos(pitch)*cDist,cTgt.y+Math.sin(pitch)*cDist,cTgt.z+Math.cos(yaw)*Math.cos(pitch)*cDist);
    camera.lookAt(cTgt);renderer.render(scene,camera);
  }
}catch(err){
  document.getElementById('load-status').textContent='v13 вҖ” ERROR: '+err.message;
  document.getElementById('load-status').style.color='#ff4444';
  console.error(err);
}}
